<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0d0d0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Training v1.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0c;--bg2:#161614;--bg3:#1e1e1c;--bg4:#272724;
  --bd:#2b2b28;--bd2:#363633;
  --tx:#eeebe4;--tx2:#a6a29b;--tx3:#66625c;
  --am:#e8a020;--amd:#291e07;--amm:#48340e;
  --gn:#3aaa80;--gnd:#091e16;
  --pu:#7c6fdf;--pud:#151338;
  --co:#df6b4a;--cod:#281209;
  --rd:#e04444;--rdd:#280a0a;
  --bl:#4a9fd4;--bld:#0a1e2e;
  --fl:#9b8fe8;--fld:#1a1835;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
input,textarea,button,select{font-family:inherit}button{cursor:pointer}
#app{height:100dvh;display:flex;flex-direction:column}
#hdr{background:var(--bg);border-bottom:1px solid var(--bd);padding:calc(var(--st) + 10px) 16px 0;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:4px}
.hdr-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.hdr-ver{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace}
.tabs{display:flex;margin:0 -16px}
.tab{flex:1;padding:10px 0 9px;font-size:12px;font-weight:500;color:var(--tx3);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--am);border-bottom-color:var(--am)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block}
.week-nav{display:flex;align-items:center;padding:10px 16px;gap:6px;background:var(--bg2);border-bottom:1px solid var(--bd)}
.wnav-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:6px 10px;color:var(--tx2);font-size:16px;line-height:1;transition:all .15s;flex-shrink:0}
.wnav-btn:active{opacity:.7}
.week-lbl{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--tx)}
.week-tag{font-size:10px;color:var(--am);font-family:'DM Mono',monospace;display:block;text-align:center;margin-top:1px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin:0 16px 10px;overflow:hidden}
.card-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.card-body{padding:14px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.05em;font-family:'DM Mono',monospace}
.bap{background:var(--pud);color:var(--pu)}.bal{background:var(--bld);color:var(--bl)}
.baf{background:var(--fld);color:var(--fl)}.bb{background:var(--gnd);color:var(--gn)}
.bc{background:var(--amd);color:var(--am)}.bd{background:var(--cod);color:var(--co)}
.bpre{background:var(--bg4);color:var(--tx2)}
.tier-pill{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;margin-left:5px;vertical-align:middle}
.tier-lite{background:var(--amd);color:var(--am);border:1px solid var(--amm)}
.tier-min{background:var(--cod);color:var(--co);border:1px solid var(--co)}
.dtype-row{display:flex;gap:5px;flex-wrap:wrap}
.dtype-btn{padding:7px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:11px;font-weight:500;transition:all .15s;flex:1;text-align:center;min-width:0}
.dtype-btn.on-perf{background:#2a0d1e;color:#e060a0;border-color:#e060a0}
.dtype-btn.on-off{background:var(--gnd);color:var(--gn);border-color:var(--gn)}
.dtype-btn.on-reh{background:var(--amd);color:var(--am);border-color:var(--am)}
.dtype-btn.on-per{background:var(--pud);color:var(--pu);border-color:var(--pu)}
.int-row{display:flex;gap:4px}
.int-btn{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:13px;font-weight:500;font-family:'DM Mono',monospace;transition:all .15s}
.int-btn.on{background:var(--am);color:var(--bg);border-color:var(--am);font-weight:600}
.week-grid{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.day-card{border-radius:11px;border:1px solid var(--bd);overflow:hidden;background:var(--bg2)}
.day-card-hdr{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.day-card-hdr:active{background:var(--bg3)}
.day-name{font-size:13px;font-weight:600}
.day-meta{font-size:11px;color:var(--tx3);margin-top:2px}
.day-status{display:flex;align-items:center;gap:6px}
.done-pill{background:var(--gnd);color:var(--gn);border:1px solid var(--gn);border-radius:20px;font-size:10px;font-weight:600;padding:2px 8px;font-family:'DM Mono',monospace}
.rest-pill{background:var(--bg4);color:var(--tx3);border-radius:20px;font-size:10px;padding:2px 8px}
.reason-text{font-size:11px;color:var(--tx3);padding:8px 13px 10px;line-height:1.4;border-top:1px solid var(--bd)}
.edit-mode-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--amd);border-bottom:1px solid var(--amm);margin-bottom:2px}
.edit-mode-lbl{font-size:12px;font-weight:600;color:var(--am)}
.edit-mode-actions{display:flex;gap:6px}
.btn-done{background:var(--am);color:var(--bg);border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:600}
.btn-undo{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500}
.day-card.editable{cursor:pointer;border-color:var(--bd2)}.day-card.editable:active{background:var(--bg3)}
.day-card.conflict{border-color:var(--rd) !important}
.conflict-note{font-size:11px;color:var(--rd);padding:0 13px 9px;line-height:1.4}
.session-menu{background:var(--bg3);border-radius:10px;margin:0 13px 10px;overflow:hidden;border:1px solid var(--bd2)}
.session-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.session-opt:last-child{border-bottom:none}.session-opt:active{background:var(--bg4)}
.session-opt-lbl{display:flex;align-items:center;gap:10px}
.session-tick{color:var(--gn);font-size:16px;font-weight:700;width:18px;text-align:center}
.session-tick-empty{width:18px;display:inline-block}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.lbl{font-size:12px;color:var(--tx3);margin-bottom:6px;display:block;letter-spacing:.02em;font-weight:500}
input[type=text],textarea{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;font-size:15px;color:var(--tx);outline:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--am)}textarea{resize:none;min-height:60px;line-height:1.4}
.rating{display:flex;gap:5px}
.rbtn{flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:13px;font-weight:500;transition:all .15s;font-family:'DM Mono',monospace}
.rbtn.on{background:var(--am);color:var(--bg);border-color:var(--am);font-weight:600}
.btn-p{width:100%;background:var(--am);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;letter-spacing:-.2px;transition:opacity .15s;margin:4px 0}
.btn-p:active{opacity:.8}
.btn-g{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--tx2);font-weight:500;transition:all .15s}
.btn-g:active{opacity:.7}
.btn-d{width:100%;background:none;border:1px dashed var(--bd2);border-radius:8px;padding:10px;color:var(--tx3);font-size:13px;transition:all .15s;margin-top:6px}
.btn-d:active{background:var(--bg3)}
.btn-back{background:none;border:none;color:var(--tx3);font-size:13px;padding:4px 0;display:flex;align-items:center;gap:4px}
.btn-skip{background:none;border:none;color:var(--tx3);font-size:12px;text-decoration:underline;padding:4px 0}
.sm{font-size:13px}.xs{font-size:12px}.dim{color:var(--tx2)}.dimmer{color:var(--tx3)}
.b6{font-weight:600}.b5{font-weight:500}.mono{font-family:'DM Mono',monospace}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mb1{margin-bottom:4px}
.row{display:flex;align-items:center;gap:8px}.jcb{justify-content:space-between}
.sec{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;padding:16px 18px 8px}
.bpad{height:calc(var(--sb) + 24px)}
.notice{margin:0 16px 10px;padding:11px 13px;background:var(--amd);border:1px solid var(--amm);border-radius:10px;font-size:12px;color:var(--am);line-height:1.5}
.notice strong{font-weight:600;display:block;margin-bottom:2px}
.ndim{margin:0 16px 10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;font-size:12px;color:var(--tx3);line-height:1.5}
.ndim strong{font-weight:600;color:var(--tx2);display:block;margin-bottom:2px}
.nred{margin:0 16px 10px;padding:11px 13px;background:var(--rdd);border:1px solid var(--rd);border-radius:10px;font-size:12px;color:var(--rd);line-height:1.5}
.nred strong{font-weight:600;display:block;margin-bottom:2px}
.week-sum-card{margin:8px 16px 4px;padding:12px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px}
.week-sum-title{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;font-family:'DM Mono',monospace}
.week-sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.week-sum-stat{text-align:center;padding:6px 4px;background:var(--bg3);border-radius:8px}
.week-sum-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--tx);line-height:1}
.week-sum-val.dim{color:var(--tx3)}
.week-sum-lbl{font-size:9px;color:var(--tx3);margin-top:3px;letter-spacing:.03em}
.week-sum-alert{padding:8px 10px;border-radius:7px;margin-top:6px;font-size:11px;line-height:1.4}
.week-sum-alert.warn{background:var(--rdd);color:var(--rd);border:1px solid var(--rd)}
.week-sum-alert.note{background:var(--amd);color:var(--am);border:1px solid var(--amm)}
.tag-grp-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{padding:8px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:12px;font-weight:500;transition:all .15s}
.tag.rec{background:var(--amd);color:var(--am);border-color:var(--am)}
.tag.cau{background:var(--cod);color:var(--co);border-color:var(--co)}
.tag.wrn{background:var(--rdd);color:var(--rd);border-color:var(--rd)}
.mod-box{padding:12px 14px;background:var(--bg);border:1px solid var(--amm);border-radius:10px;margin-bottom:12px}
.mod-title{font-size:10px;font-weight:600;color:var(--am);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.mod-line{font-size:12px;color:var(--tx2);margin-bottom:4px;line-height:1.4;padding-left:8px;border-left:2px solid var(--amm)}
.mod-source-engine{border-left-color:var(--bl)}.mod-source-tag{border-left-color:var(--am)}
.ex-hdr{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent;transition:border-color .15s}
.ex-hdr.open{border-bottom-color:var(--bd)}
.ex-body{padding:12px 14px;background:var(--bg)}
.chev{width:16px;height:16px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}
.warmup-card{border-color:var(--amm)}
.warmup-item{padding:8px 0;border-bottom:1px solid var(--bd)}.warmup-item:last-child{border-bottom:none;padding-bottom:0}
.warmup-name{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:2px}
.warmup-pre{font-size:11px;color:var(--am);font-family:'DM Mono',monospace}
.warmup-note{font-size:11px;color:var(--tx3);margin-top:3px;line-height:1.4}
.sided-half{margin-bottom:8px}
.sided-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 6px;border-radius:5px;margin-bottom:6px;display:inline-block}
.sided-lbl.r{background:var(--amd);color:var(--am)}.sided-lbl.l{background:var(--bld);color:var(--bl)}
.sided-sep{height:1px;background:var(--bd);margin:8px 0}
.srpe-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.srpe-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;min-width:120px;transition:border-color .15s}
.srpe-btn:active{border-color:var(--am)}
.srpe-val{font-size:16px;font-weight:500;font-family:'DM Mono',monospace;color:var(--tx)}
.srpe-unit{font-size:11px;color:var(--tx3)}.srpe-note{font-size:11px;color:var(--tx3);flex:1}
.acc{margin:0 16px 10px;padding:14px;border-radius:12px;border:1px solid var(--bd)}
.acc.good{background:var(--gnd);border-color:var(--gn)}.acc.warn{background:var(--cod);border-color:var(--co)}.acc.note{background:var(--amd);border-color:var(--am)}
.acc-title{font-size:13px;font-weight:600;margin-bottom:4px}
.acc.good .acc-title{color:var(--gn)}.acc.warn .acc-title{color:var(--co)}.acc.note .acc-title{color:var(--am)}
.acc-detail{font-size:12px;color:var(--tx2);line-height:1.5}
.acc-stat{font-size:11px;color:var(--tx3);margin-top:6px;font-family:'DM Mono',monospace}
.hflt-row{display:flex;align-items:center;gap:6px;padding:10px 16px 4px}
.hflt{display:flex;gap:6px;flex:1}
.flt{padding:6px 14px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:11px;font-weight:500;transition:all .15s}
.flt.on{background:var(--am);color:var(--bg);border-color:var(--am)}
.hent{margin:0 16px 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.hent-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.hent-hdr:active{background:var(--bg3)}.hent-body{padding:0 14px 12px}
.hex{font-size:12px;color:var(--tx3);margin-bottom:2px}.hex span{color:var(--tx2)}
.del-btn{background:none;border:1px solid transparent;border-radius:6px;color:var(--tx3);font-size:11px;padding:4px 8px;transition:all .15s}
.del-btn:active{background:var(--rdd);color:var(--rd);border-color:var(--rd)}
.del-conf{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.inj-chips{display:flex;flex-wrap:wrap;gap:6px}
.inj-chip{padding:7px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:12px;font-weight:500;transition:all .15s}
.inj-chip.on{background:var(--cod);color:var(--co);border-color:var(--co)}
.inj-status-pill{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block}
.inj-status-active{background:var(--rdd);color:var(--rd)}.inj-status-monitoring{background:var(--amd);color:var(--am)}.inj-status-resolved{background:var(--gnd);color:var(--gn)}
.empty{text-align:center;padding:60px 24px}.emi{font-size:40px;margin-bottom:12px;opacity:.3}
.emt{font-size:15px;font-weight:500;color:var(--tx2)}.ems{font-size:13px;color:var(--tx3);margin-top:4px}
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.picker-sheet{width:100%;background:var(--bg2);border-radius:20px 20px 0 0;padding-bottom:calc(var(--sb) + 8px);user-select:none;-webkit-user-select:none}
.picker-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd)}
.picker-label{font-size:15px;font-weight:600}
.picker-done{background:var(--am);color:var(--bg);border:none;border-radius:8px;padding:8px 20px;font-size:15px;font-weight:600}
.picker-cols{display:flex;justify-content:center;padding:0 24px}
.picker-col{flex:1;position:relative;height:264px;overflow:hidden;cursor:grab}
.picker-viewport{position:relative;height:264px;overflow:hidden}
.picker-list{position:absolute;left:0;right:0;top:0;will-change:transform}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'DM Mono',monospace;color:var(--tx3);font-weight:400;transition:color .1s,font-size .1s}
.picker-item.sel{color:var(--tx);font-weight:600;font-size:26px}
.picker-mask-t,.picker-mask-b{position:absolute;left:0;right:0;height:110px;pointer-events:none;z-index:2}
.picker-mask-t{top:0;background:linear-gradient(to bottom,var(--bg2) 0%,transparent 100%)}
.picker-mask-b{bottom:0;background:linear-gradient(to top,var(--bg2) 0%,transparent 100%)}
.picker-line{position:absolute;left:8%;right:8%;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--bd2);border-bottom:1px solid var(--bd2);pointer-events:none;z-index:3}
.picker-col-lbl{text-align:center;font-size:10px;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;padding:4px 0 10px;font-family:'DM Mono',monospace}
.val-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:11px 14px;transition:border-color .15s;cursor:pointer}
.val-btn:active{border-color:var(--am)}
.val-btn-num{font-size:18px;font-weight:500;font-family:'DM Mono',monospace;color:var(--tx)}
.val-btn-unit{font-size:11px;color:var(--tx3)}.val-btn-empty{font-size:14px;color:var(--tx3)}
.set-row{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.set-n{width:22px;height:22px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace;flex-shrink:0}
.plyo-done{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:13px;font-weight:500;transition:all .15s;text-align:center}
.plyo-done.done{background:var(--gnd);color:var(--gn);border-color:var(--gn)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row">
      <span class="hdr-title">Training</span>
      <span class="hdr-ver">v1.7.0</span>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="nav('schedule',this)">Schedule</button>
      <button class="tab"    onclick="nav('history',this)">History</button>
      <button class="tab"    onclick="nav('body',this)">Body</button>
    </div>
  </div>
  <div id="content">
    <div id="page-schedule" class="page on"></div>
    <div id="page-history"  class="page"></div>
    <div id="page-body"     class="page"></div>
  </div>
</div>
<div id="picker-overlay" class="picker-overlay" style="display:none" onclick="pickerBgClick(event)">
  <div class="picker-sheet">
    <div class="picker-hdr">
      <span class="picker-label" id="picker-label">Select</span>
      <button class="picker-done" onclick="pickerDone()">Done</button>
    </div>
    <div id="picker-cols" class="picker-cols"></div>
  </div>
</div>
<script>
'use strict';

// ─── GLOBAL HELPERS ─────────────────────────────────────────
// FIX [Security/Moderate]: Single escape helper applied to EVERY user-entered
// string before it touches innerHTML. One function eliminates the entire XSS
// surface — notes, injury descriptions, any free-text field.
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

// FIX [Bugs/Critical]: Replace the undocumented ×2 multiplier with an explicit
// Foster sRPE (CR10) lookup. feel 1–5 → RPE 2–10 on the standard 0–10 scale.
// Reference: Foster et al. (2001) "A New Approach to Monitoring Exercise Training".
// Numerically equivalent to the old formula so all existing stored AU values remain valid.
const FEEL_TO_RPE = [0, 2, 4, 6, 8, 10]; // index = feel (1–5); FEEL_TO_RPE[feel] = Foster RPE

// ─── PROGRAM ────────────────────────────────────────────────
let PROG = null;

// FIX [Reliability/Critical]: Split into two separate try-blocks so a network
// error and a JSON parse error are handled and reported distinctly.
// Previously, r.json() throwing SyntaxError on corrupt cached data showed the
// same generic message as a 404, making offline diagnosis impossible.
async function loadProgram() {
  let r;
  try {
    r = await fetch('program.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch(e) {
    _showProgError('Could not reach program file. Open the app once while online.');
    return;
  }
  try {
    // r.json() parse errors are now caught separately — corrupt or partial
    // JSON shows a distinct message instead of silently leaving PROG as null.
    PROG = await r.json();
  } catch(e) {
    _showProgError('Program data is corrupted (' + e.message + '). Reload while online.');
  }
}

function _showProgError(msg) {
  document.getElementById('page-schedule').innerHTML =
    `<div class="empty"><div class="emi">⚠️</div><div class="emt">Program unavailable</div><div class="ems">${msg}</div></div>`;
}

// FIX [Reliability/Critical]: Central PROG guard used at every public render
// entry-point. Previously all PROG.sessions/.tags accesses were unguarded —
// if PROG was null (parse failure, stale cache) the first render threw a silent
// TypeError that left the whole app blank with no visible error message.
function requireProg() {
  if (!PROG) { _showProgError('Program not loaded. Connect to the internet and reload.'); return null; }
  return PROG;
}

// ─── ENGINE v2 ───────────────────────────────────────────────
// Graduated tiers · directional gap rule · retry · locked sessions · past days
function assignGymDays(ballet, lockedAssignments={}, pastDays=new Set(), activeInjuries=[], acwrConstrained=false) {

  // ═══════════════════════════════════════════════════════════════
  // SCHEDULING ENGINE v2 — Full sports-medicine-compliant rewrite.
  // Failure modes fixed vs v1:
  //  [F1]  Same-day stacking: combined daily load now penalised
  //  [F2]  Weekly session cap driven by total ballet stress
  //  [F3]  General consecutive-day gap (was B→C only)
  //  [F4]  Active injury awareness — suppresses by region/severity
  //  [F5]  Recalibrated coefficients: reh 0.25/0.75, per 0.35/0.65
  //        (old reh 0.40/0.50 understated lower; old per 0.20/0.80
  //         let a 3h coaching session score as "light upper")
  //  [F6]  Systemic fatigue floor for long personal training sessions
  //  [F7]  Retry pass removed — was bypassing all protective logic
  //  [F8]  B→C gap now bidirectional (was forward-only)
  //  [F9]  48h pre-performance gym-free window (was 24h / upper allowed)
  //  [F10] Categorical awareness: AP+AL done → suppress AF, and vice versa
  //  [F11] Day D: only on light weeks (≤2 core sessions), always 'lite'
  //  [F12] ACWR-aware cap: constrained flag from generatePlan tightens cap
  // ═══════════════════════════════════════════════════════════════

  // ── 1. LOAD COMPUTATION ─────────────────────────────────────
  // [F5]: Recalibrated coefficients. Ballet is overwhelmingly lower-body
  // dominant (relevés, pliés, jumps). Old reh 0.4/0.5 understated lower
  // load and overstated upper. New 0.25/0.75 reflects dance physiology.
  // Per (personal coaching) old 0.2/0.8 caused a 3h int4 session to score
  // upper=2.4 — below "full" threshold — allowing same-day push session.
  // New 0.35/0.65 + systemic floor corrects this.
  function computeLoad(d) {
    const hrs = Math.max(parseFloat(d.hours) || 0, 0.5), int = d.intensity || 3;
    if (!d.type || d.type === 'off') return { upper:0, lower:0, hasActivity:false };
    if (d.type === 'perf')           return { upper:99, lower:99, hasActivity:true };
    if (d.type === 'reh')            return { upper:int*hrs*0.25, lower:int*hrs*0.75, hasActivity:true };
    if (d.type === 'per') {
      // [F6]: Long high-intensity coaching creates systemic CNS/cardiovascular
      // fatigue independent of muscle group focus. Add a floor to both scores.
      const floor = (hrs > 2 && int >= 3) ? 1.5 : 0;
      return { upper:int*hrs*0.35+floor, lower:int*hrs*0.65+floor, hasActivity:true };
    }
    return { upper:0, lower:0, hasActivity:false };
  }
  const loads = ballet.map(computeLoad);

  // ── 2. PERFORMANCE PROTECTION WINDOWS ───────────────────────
  const perfDays       = new Set(ballet.reduce((a,d,i) => d.type==='perf'?[...a,i]:a, []));
  // [F9]: Extend to a true 48h window. dayBeforePerf was allowing upper
  // body sessions — arm/shoulder fatigue affects port de bras and partnering.
  // Now: 2 days before → all sessions lite-max; 1 day before → no gym at all.
  const dayBeforePerf     = new Set([...perfDays].map(i=>i-1).filter(i=>i>=0));
  const twoDaysBeforePerf = new Set([...perfDays].map(i=>i-2).filter(i=>i>=0 && !dayBeforePerf.has(i)));
  const dayAfterPerf      = new Set([...perfDays].map(i=>i+1).filter(i=>i<7));

  // ── 3. INJURY SUPPRESSION ────────────────────────────────────
  // [F4]: Engine now reads active injuries. Previously the injury log was
  // completely invisible to the scheduler — Day C plyometrics would be placed
  // on a week with an active knee severity 4 entry.
  const LOWER_REGIONS = new Set(['Ankle','Knee','Hip','Lower Back','Hamstring','Groin','Foot','Achilles']);
  const UPPER_REGIONS = new Set(['Shoulder','Wrist']);
  let lowerInjSev = 0, upperInjSev = 0;
  (activeInjuries || []).forEach(inj => {
    const sev = parseInt(inj.severity) || 0;
    if (LOWER_REGIONS.has(inj.region)) lowerInjSev = Math.max(lowerInjSev, sev);
    if (UPPER_REGIONS.has(inj.region)) upperInjSev = Math.max(upperInjSev, sev);
  });
  // Suppression matrix (evidence-based conservative thresholds):
  // Lower sev ≥3: suppress C (plyometrics contraindicated), cap B to 'min'
  // Lower sev ≥4: suppress B and C entirely
  // Upper sev ≥3: cap all upper sessions to 'min'
  // Upper sev ≥4: suppress all upper assignments entirely
  const suppressLowerAll = lowerInjSev >= 4;
  const suppressC_inj    = lowerInjSev >= 3;
  const capBtoMin        = lowerInjSev === 3;
  const suppressUpperAll = upperInjSev >= 4;
  const capUpperToMin    = upperInjSev === 3;

  // ── 4. CATEGORICAL AWARENESS ─────────────────────────────────
  // [F10]: If both push AND pull are already completed this week, the upper
  // body has received its full stimulus — adding a third upper (AF) is
  // overtraining the same movement pattern. Conversely, if AF is done,
  // AP+AL are redundant. This makes split/full-body mutually exclusive.
  const lockedAP = Object.prototype.hasOwnProperty.call(lockedAssignments,'AP');
  const lockedAL = Object.prototype.hasOwnProperty.call(lockedAssignments,'AL');
  const lockedAF = Object.prototype.hasOwnProperty.call(lockedAssignments,'AF');
  const lockedB  = Object.prototype.hasOwnProperty.call(lockedAssignments,'B');
  const lockedC  = Object.prototype.hasOwnProperty.call(lockedAssignments,'C');
  const suppressAF    = lockedAP && lockedAL; // Split done → full-body redundant
  const suppressSplit = lockedAF;             // Full-body done → split redundant
  const suppressLowerNew = lockedB && lockedC; // Both lower done → no new lower

  // ── 5. WEEKLY SESSION CAP ────────────────────────────────────
  // [F2]: Compute total weekly ballet stress before placing any gym sessions.
  // Professional in-season dancer evidence base (Foster 2001, Bompa &
  // Buzzichelli 2015, Wyon 2010 dance-specific):
  //   stress < 8  (light week)    → 3 gym sessions maximum
  //   stress 8–22 (moderate)      → 3 sessions maximum
  //   stress 22–35 (heavy)        → 2 sessions maximum
  //   stress 35+  (perf-heavy)    → 1 session maximum
  const weeklyStress  = loads.reduce((s,l) => s + l.upper + l.lower, 0);
  const lockedCount   = Object.keys(lockedAssignments).filter(k => lockedAssignments[k] !== null).length;
  let sessionCap = weeklyStress < 8 ? 3 : weeklyStress < 22 ? 3 : weeklyStress < 35 ? 2 : 1;
  // [F12]: ACWR-aware reduction. If generatePlan detected that this week's
  // logged AU already approaches the historical spike threshold, tighten cap.
  if (acwrConstrained && lockedCount >= sessionCap) sessionCap = lockedCount;
  let assignedCount = lockedCount;

  // ── 6. BOOK-KEEPING ──────────────────────────────────────────
  const assigned   = {AP:null,AL:null,AF:null,B:null,C:null,D:null};
  const tiers      = {AP:null,AL:null,AF:null,B:null,C:null,D:null};
  const engineMods = {AP:null,AL:null,AF:null,B:null,C:null,D:null};
  const reasons    = {AP:'',AL:'',AF:'',B:'',C:'',D:''};
  // usedDays: prevents double-booking any slot (includes past days)
  // gymDays: only ACTUAL gym sessions — used for consecutive-day checks
  // [F3]: Keeping these separate is critical. pastDays being in usedDays
  // was causing past days to be treated as if gym had occurred there,
  // incorrectly triggering the consecutive-day block on following days.
  const usedDays = new Set();
  const gymDays  = new Set();
  Object.entries(lockedAssignments).forEach(([sk,dayIdx]) => {
    const bk = baseKey(sk);
    if (dayIdx === null) return;
    assigned[bk]=dayIdx; tiers[bk]='locked'; engineMods[bk]=null;
    reasons[bk]=`${DAYS[dayIdx]} — completed ✓`;
    usedDays.add(dayIdx); gymDays.add(dayIdx);
  });
  pastDays.forEach(i => usedDays.add(i)); // Past days block new assignment but are NOT gym days

  // ── 7. TIER SCORING HELPERS ──────────────────────────────────
  // [F1]: SAME_DAY_PENALTY is the core fix for same-day stacking.
  // Any day with ballet activity gets +2.5 added to its effective load score
  // before comparing against gym tier thresholds. This drops the tier by
  // at least one level on most rehearsal days.
  // The specific case that was reported broken:
  //   reh 2.5h int3 → lower = 3×2.5×0.75 = 5.625 → effectiveL = 8.125 → null
  //   (old engine: lower = 3×2.5×0.5 = 3.75 → below 4.0 → 'full' — WRONG)
  const SAME_DAY_PENALTY = 2.5;

  function upperTier(i) {
    if (perfDays.has(i))       return null; // Performance day — no gym
    if (dayBeforePerf.has(i))  return null; // [F9]: Was 'lite'; now fully blocked (48h window)
    const effectiveU = loads[i].upper + (loads[i].hasActivity ? SAME_DAY_PENALTY : 0); // [F1]
    if (twoDaysBeforePerf.has(i)) return effectiveU < 6.5 ? 'lite' : null; // [F9]
    if (dayAfterPerf.has(i))      return effectiveU < 6.5 ? 'lite' : null;
    if (effectiveU < 4.5) return 'full';
    if (effectiveU < 5.5) return 'lite';
    if (effectiveU < 6.5) return 'min';
    return null;
  }

  function lowerTier(i) {
    if (perfDays.has(i) || dayBeforePerf.has(i)) return null; // [F9]: dayBeforePerf fully blocked
    const effectiveL = loads[i].lower + (loads[i].hasActivity ? SAME_DAY_PENALTY : 0); // [F1]
    if (twoDaysBeforePerf.has(i)) return effectiveL < 6.5 ? 'lite' : null; // [F9]
    if (dayAfterPerf.has(i))      return effectiveL < 7.0 ? 'min'  : null;
    if (effectiveL < 4.0) return 'full';
    if (effectiveL < 5.5) return 'lite';
    if (effectiveL < 7.0) return 'min';
    return null;
  }

  // [F3]: Consecutive-day enforcement uses gymDays — not usedDays.
  // Rules (recovery physiology basis):
  //   - Three consecutive gym days: hard block regardless of tier
  //   - Two consecutive with 'full': hard block
  //   - Two consecutive with 'lite'/'min': allowed once only
  function consecutiveOk(i, proposedTier) {
    const prev = gymDays.has(i-1), twoPrev = gymDays.has(i-2);
    if (prev && twoPrev) return false; // Third consecutive — always block
    if (prev || gymDays.has(i+1)) return proposedTier !== 'full'; // Adjacent: lite/min only
    return true;
  }

  function engineModForTier(sessKey, tier) {
    if (!tier || tier === 'full') return null;
    const sess = PROG.sessions[baseKey(sessKey)];
    const lsr  = sess?.liteSetReduction || 0;
    if (tier === 'lite') return lsr > 0 ? {setReduction:lsr, rpeCap:null} : null;
    if (tier === 'min')  return {setReduction:0, rpeCap:6, isMin:true};
    return null;
  }

  function isLocked(sk) {
    return Object.prototype.hasOwnProperty.call(lockedAssignments, sk) ||
           Object.prototype.hasOwnProperty.call(lockedAssignments, sk+'_2');
  }

  // Central placement: applies cap, consecutive-day check, and mods in one call.
  // Returning false means this slot was rejected — caller handles the reason string.
  function tryPlace(sk, dayIdx, tier, reasonStr) {
    if (dayIdx === null || assignedCount >= sessionCap) return false;
    if (!consecutiveOk(dayIdx, tier)) return false;
    const bk = baseKey(sk);
    assigned[bk]=dayIdx; tiers[bk]=tier;
    engineMods[bk]=engineModForTier(sk,tier); reasons[bk]=reasonStr;
    usedDays.add(dayIdx); gymDays.add(dayIdx); assignedCount++;
    return true;
  }

  // ── 8. UPPER BODY ASSIGNMENT ─────────────────────────────────
  if (!suppressUpperAll) {
    const upperCandidates = [];
    for (let i = 0; i < 7; i++) {
      if (usedDays.has(i)) continue;
      const rawTier = upperTier(i); if (!rawTier) continue;
      const tier = capUpperToMin && rawTier !== 'min' ? 'min' : rawTier; // [F4]
      if (!consecutiveOk(i, tier)) continue; // [F3]: Pre-filter
      upperCandidates.push({idx:i, tier, score:loads[i].upper + (loads[i].hasActivity ? 1 : -1)});
    }
    upperCandidates.sort((a,b) => a.score - b.score);

    const needAP = !isLocked('AP') && !suppressSplit; // [F10]
    const needAL = !isLocked('AL') && !suppressSplit; // [F10]
    const needAF = !isLocked('AF') && !suppressAF;   // [F10]

    const splitCands = upperCandidates.filter(c => loads[c.idx].upper < 4.5);
    let s1=null, s2=null;
    if (needAP && needAL && splitCands.length >= 2) {
      outer: for (let i=0;i<splitCands.length;i++)
        for (let j=i+1;j<splitCands.length;j++)
          if (Math.abs(splitCands[i].idx-splitCands[j].idx)>=2){s1=splitCands[i];s2=splitCands[j];break outer;}
    }

    if (s1 && s2) {
      const [early,late]=s1.idx<s2.idx?[s1,s2]:[s2,s1];
      if (needAP) tryPlace('AP',early.idx,early.tier,buildUpperReason('AP',early.idx,ballet,loads,true,early.tier));
      if (needAL) tryPlace('AL',late.idx,late.tier,buildUpperReason('AL',late.idx,ballet,loads,true,late.tier));
      if (needAF) reasons.AF='Split week — Push and Pull assigned separately.';
    } else if (upperCandidates.length>=1 && needAF) {
      const bestAF=upperCandidates[0];
      tryPlace('AF',bestAF.idx,bestAF.tier,buildUpperReason('AF',bestAF.idx,ballet,loads,false,bestAF.tier));
      if (needAP) reasons.AP='Full Body assigned — push covered.';
      if (needAL) reasons.AL='Full Body assigned — pull covered.';
      const secondUp=upperCandidates.find(c=>c.idx!==bestAF.idx&&Math.abs(c.idx-bestAF.idx)>=2&&loads[c.idx].upper<5.5);
      if (secondUp && !suppressSplit) {
        const pk=secondUp.idx<bestAF.idx?'AP':'AL';
        if (!isLocked(pk)) tryPlace(pk,secondUp.idx,secondUp.tier,
          buildUpperReason(pk,secondUp.idx,ballet,loads,false,secondUp.tier)+' Secondary upper alongside Full Body.');
      }
    } else {
      const noSlotMsg='No viable upper body slot — all days have excessive load, performance protection, or injury restriction.';
      if (needAF) reasons.AF=noSlotMsg;
      if (needAP) reasons.AP=noSlotMsg;
      if (needAL) reasons.AL=noSlotMsg;
    }
  } else {
    // [F4]: Upper severity ≥4 — suppress all upper assignments
    const injMsg=`Suppressed — active upper body injury (severity ${upperInjSev}/5). See Body tab.`;
    reasons.AP=reasons.AL=reasons.AF=injMsg;
  }

  // ── 9. LOWER BODY — DAY B ────────────────────────────────────
  if (!isLocked('B') && !suppressLowerAll && !suppressLowerNew) {
    let bestB=null,bestBTier=null,bestBScore=Infinity;
    for (let i=0;i<7;i++){
      if (usedDays.has(i)) continue;
      let tier=lowerTier(i); if (!tier) continue;
      if (capBtoMin && (tier==='full'||tier==='lite')) tier='min'; // [F4]: Injury cap
      if (!consecutiveOk(i,tier)) continue; // [F3]
      const sc=loads[i].lower+(loads[i].hasActivity?1:-1);
      if (sc<bestBScore){bestBScore=sc;bestB=i;bestBTier=tier;}
    }
    if (bestB!==null) {
      tryPlace('B',bestB,bestBTier,buildLowerReason('B',bestB,ballet,loads,bestBTier));
    } else {
      reasons.B=capBtoMin
        ?`Day B capped — active lower injury (severity ${lowerInjSev}/5). No safe 'min' slot found.`
        :'No viable lower body slot — all available days exceed load threshold, performance protection, or consecutive-day constraint.';
    }
  } else if (suppressLowerAll) {
    reasons.B=`Suppressed — active lower body injury (severity ${lowerInjSev}/5). See Body tab.`;
  }

  // ── 10. LOWER BODY — DAY C (PLYOMETRICS) ─────────────────────
  // [F4]: Suppress C at lower severity ≥3 — plyometrics (approach jumps, pogos)
  // place maximal eccentric load on knee/ankle complex and are contraindicated
  // for any active lower-body injury regardless of session tier.
  if (!isLocked('C') && !suppressC_inj && !suppressLowerAll && !suppressLowerNew) {
    let bestC=null,bestCTier=null,bestCScore=Infinity;
    for (let i=0;i<7;i++){
      if (usedDays.has(i)) continue;
      const tier=lowerTier(i); if (!tier) continue;
      // [F8]: Bidirectional gap — C must be ≥2 days from B in EITHER direction.
      // Old check was: (i > assigned.B && i-assigned.B < 2) — only blocked days
      // forward of B. If B=Sat(5) and C tried Sun(6): 6>5 && 6-5=1 → correctly blocked.
      // But if C tried Fri(4) before locked B=Sat(5): 4 is NOT >5 → not blocked → gap=1 allowed.
      if (assigned.B!==null && Math.abs(i-assigned.B)<2) continue;
      if (!consecutiveOk(i,tier)) continue; // [F3]
      const sc=loads[i].lower+(loads[i].hasActivity?1:-1);
      if (sc<bestCScore){bestCScore=sc;bestC=i;bestCTier=tier;}
    }
    if (bestC!==null){
      // [F8]: Downgrade B when C precedes it by 1 day — but ONLY when B is not locked.
      // Old code attempted this downgrade even on completed locked sessions, causing
      // the change to silently vanish when the locked-restore block ran afterward.
      if (assigned.B!==null&&bestC<assigned.B&&(assigned.B-bestC)<2&&!isLocked('B')){
        const ord=['full','lite','min'];const bi=ord.indexOf(tiers.B);
        if (bi>=0&&bi<ord.length-1){
          tiers.B=ord[bi+1];engineMods.B=engineModForTier('B',tiers.B);
          reasons.B+=` Day C precedes B by 1 day — Day B auto-downgraded to ${tiers.B.toUpperCase()}.`;
        }
      }
      tryPlace('C',bestC,bestCTier,buildLowerReason('C',bestC,ballet,loads,bestCTier));
    } else {
      reasons.C='No viable plyometric slot — gap from Day B, performance protection, or consecutive-day constraint on all available days.';
    }
  } else if (suppressC_inj||suppressLowerAll) {
    reasons.C=`Suppressed — lower body injury (severity ${lowerInjSev}/5) — plyometrics contraindicated. See Body tab.`;
  }

  // ── 11. DAY D (OPTIONAL HYPERTROPHY) ─────────────────────────
  // [F7]: RETRY PASS REMOVED. The old block forced a 'min' session onto any
  // available day when coreCount<3, bypassing all protective logic — injuries,
  // consecutive-day checks, and session cap were all ignored. The correct
  // output when fewer than 3 sessions fit is: fewer sessions with clear reasons.
  //
  // [F11]: Day D now only placed when the week is genuinely light (≤2 core
  // sessions placed). Always 'lite' tier — it is optional, never mandatory.
  if (!isLocked('D')){
    const coreCount=['AP','AL','AF','B','C'].filter(k=>assigned[k]!==null).length;
    if (coreCount<=2 && assignedCount<sessionCap){
      let bestD=null,bestDS=999;
      for (let i=0;i<7;i++){
        if (usedDays.has(i)||perfDays.has(i)||dayBeforePerf.has(i)) continue;
        const total=loads[i].upper+loads[i].lower; if (total>=5) continue;
        if (!consecutiveOk(i,'lite')) continue; // [F3]
        const sc=total+(loads[i].hasActivity?1:-1);
        if (sc<bestDS){bestDS=sc;bestD=i;}
      }
      if (bestD!==null){
        // [F11]: Always 'lite' — D is supplementary. Was unconditionally 'full'.
        tryPlace('D',bestD,'lite',`${DAYS[bestD]} — light load slot. Optional supplementary hypertrophy (LITE).`);
      } else { reasons.D='No clean optional slot — Day D skipped.'; }
    } else {
      reasons.D=coreCount>2
        ?'Day D skipped — week has sufficient training volume.'
        :'Day D skipped — weekly session cap reached.';
    }
  }

  return {assigned,tiers,engineMods,reasons};
}
function buildUpperReason(sess,dayIdx,ballet,loads,isSplit,tier) {
  if (dayIdx===null) return '';
  const d=ballet[dayIdx],dn=DAYS[dayIdx],parts=[];
  if (d.type==='off') parts.push(`${dn} is a rest day — optimal upper recovery state`);
  else if (loads[dayIdx].upper<2.5) parts.push(`${dn} has light upper ballet demand`);
  else if (loads[dayIdx].upper<4.5) parts.push(`${dn} has moderate upper load — gym after class`);
  else parts.push(`${dn} has significant upper load — session compressed`);
  if (isSplit){if(sess==='AP')parts.push('Push first');if(sess==='AL')parts.push('Pull second — 48h gap from Push');}
  if (tier==='lite') parts.push('Lite volume — core exercises, 1 set reduction');
  if (tier==='min')  parts.push('Minimum dose — primary lifts only, RPE ≤ 6');
  return parts.join(' · ')+'.';
}
function buildLowerReason(sess,dayIdx,ballet,loads,tier) {
  if (dayIdx===null) return '';
  const d=ballet[dayIdx],dn=DAYS[dayIdx],parts=[];
  if (d.type==='off') parts.push(`${dn} is a rest day`);
  else if (loads[dayIdx].lower<2.5) parts.push(`${dn} has light lower ballet demand`);
  else if (loads[dayIdx].lower<4.0) parts.push(`${dn} has moderate lower load`);
  else parts.push(`${dn} has significant lower load — volume compressed`);
  if (sess==='C') { parts.push('plyometrics — clear of adjacent full rehearsals'); if (tier==='min') parts.push('Approach Jump + Pogos only — 15 min, maintains plyometric pathway.'); }
  if (tier==='lite') parts.push('Lite volume — posterior chain essentials, 1 set reduction');
  if (tier==='min'&&sess==='B') parts.push('Minimum dose — RDL + Nordic only.');
  return parts.join(' · ')+'.';
}
// ─── LOCKED ASSIGNMENTS ──────────────────────────────────────
// Reads from wk.logs — works even when wk.plan is null.
// For new logs: uses log.dayIdx. For old logs: derives from log.date.
// This is plan-independent and covers all logs ever saved.
function getLockedAssignments(wk) {
  const locked={}, monMs=viewMonday.getTime();
  Object.entries(wk.logs||{}).forEach(([sk,log])=>{
    if (!log) return;
    let dayIdx=null;
    if (log.dayIdx!==null&&log.dayIdx!==undefined) { dayIdx=log.dayIdx; }
    else if (log.date) {
      const ld=new Date(log.date); ld.setHours(0,0,0,0);
      const idx=Math.round((ld.getTime()-monMs)/(1000*60*60*24));
      if (idx>=0&&idx<=6) dayIdx=idx;
    }
    if (dayIdx!==null) locked[sk]=dayIdx;
  });
  return locked;
}
// ─── GENERATE PLAN ───────────────────────────────────────────
function generatePlan() {
  // Guard: PROG must be loaded before any render entry-point runs.
  if (!requireProg()) return;
  const wk=getWeek(viewMonday);
  const locked=getLockedAssignments(wk);
  const todayDate=new Date(); todayDate.setHours(0,0,0,0);
  const todayIdx=Math.round((todayDate.getTime()-viewMonday.getTime())/(1000*60*60*24));
  const pastDays=new Set();
  for (let i=0;i<todayIdx;i++){if(i>=0&&i<7)pastDays.add(i);}

  // [F12]: Compute this week's already-logged AU before calling the engine.
  // If the week is already at or above the historical spike threshold, pass
  // acwrConstrained=true so the engine tightens its session cap proactively —
  // instead of waiting for the post-hoc alert to fire after the damage is done.
  const currentWeekAU=Object.values(wk.logs||{}).reduce((s,lg)=>s+(lg.sRPE||0),0);
  const acwrAlert=getLoadAlert(currentWeekAU);
  const acwrConstrained=acwrAlert!==null;

  // [F4]: Filter to active/monitoring injuries and pass into the engine.
  // Previously the global injuries array was completely invisible to the
  // scheduler — plyometrics were assigned alongside active knee injuries.
  const activeInj=(injuries||[]).filter(inj=>inj.status==='active'||inj.status==='monitoring');

  const {assigned,tiers,engineMods,reasons}=assignGymDays(wk.ballet,locked,pastDays,activeInj,acwrConstrained);

  // Hard override: locked (completed) sessions always win.
  // This runs AFTER the engine so no engine output can overwrite a logged entry.
  Object.entries(locked).forEach(([sk,dayIdx])=>{
    const bk=baseKey(sk);
    assigned[bk]=dayIdx; tiers[bk]=wk.logs[sk]?.tier||'full';
    engineMods[bk]=null; reasons[bk]=`${DAYS[dayIdx]} — completed ✓`;
  });

  const newPlan={assigned,tiers,engineMods,reasons,createdAt:new Date().toISOString()};
  if (wk.plan?.extraSlots) newPlan.extraSlots=wk.plan.extraSlots;
  if (!newPlan.engineMods) newPlan.engineMods={};
  wk.plan=newPlan;
  showBalletForm=false;
  saveWeeks(); renderSchedule();
}

// Returns all assigned slot keys (including AP_2 etc.) with their day index
function getAllPlanSlots(plan) {
  if (!plan) return [];
  const slots=[];
  Object.entries(plan.assigned||{}).forEach(([sk,dayIdx])=>{ if (dayIdx!==null) slots.push({slotKey:sk,dayIdx}); });
  Object.entries(plan.extraSlots||{}).forEach(([sk,dayIdx])=>{ if (dayIdx!==null) slots.push({slotKey:sk,dayIdx}); });
  return slots;
}
// ─── WEEK SUMMARY ────────────────────────────────────────────
function buildWeekSummary(wk) {
  const logs=Object.values(wk.logs||{});
  const planned=getAllPlanSlots(wk.plan).length;
  const done=logs.length;
  if (done===0&&planned===0) return '';
  const totalLoad=logs.reduce((s,l)=>s+(l.sRPE||0),0);
  const lf2=logs.filter(l=>l.feel);
  const avgFeel=lf2.length?(lf2.reduce((s,l)=>s+l.feel,0)/lf2.length).toFixed(1):null;
  const la=logs.filter(l=>l.accuracy?.rate!==undefined);
  const avgAcc=la.length?Math.round(la.reduce((s,l)=>s+l.accuracy.rate,0)/la.length):null;
  const sc=(val,lbl)=>`<div class="week-sum-stat"><div class="week-sum-val${val==='—'?' dim':''}">${val}</div><div class="week-sum-lbl">${lbl}</div></div>`;
  const alert=totalLoad>0?getLoadAlert(totalLoad):null;
  const alertHTML=alert?`<div class="week-sum-alert ${alert.level}"><strong>${alert.level==='warn'?'⚠ Load spike':'📈 Load rising'}</strong>This week's load is ${Math.round((alert.ratio-1)*100)}% above the 4-week average.</div>`:'';
  return `<div class="week-sum-card"><div class="week-sum-title">Week at a glance</div>
    <div class="week-sum-grid">${sc(done+'/'+planned,'sessions')}${sc(totalLoad>0?totalLoad.toLocaleString():'—','load AU')}${sc(avgFeel!==null?avgFeel:'—','avg feel')}${sc(avgAcc!==null?avgAcc+'%':'—','accuracy')}</div>${alertHTML}</div>`;
}
function getLoadAlert(currentLoad) {
  const recent=[];
  for (let w=1;w<=4;w++){const m=new Date(viewMonday);m.setDate(m.getDate()-w*7);const wk=weeks[weekKey(m)];if(wk){const l=Object.values(wk.logs||{}).reduce((s,lg)=>s+(lg.sRPE||0),0);if(l>0)recent.push(l);}}
  if (recent.length<2) return null;
  const avg=recent.reduce((s,v)=>s+v,0)/recent.length, ratio=currentLoad/avg;
  if (ratio>1.25) return {level:'warn',ratio,avg}; if (ratio>1.15) return {level:'note',ratio,avg}; return null;
}

// Replace-on-assign: selecting a session REPLACES the current session on that day.
// No stacking — use addSecondSlot for a deliberate second slot.
function assignDaySession(dayIdx,sessKey) {
  const wk=getWeek(viewMonday);
  if (sessKey) {
    // Remove any existing non-extra-slot session on this day
    Object.keys(wk.plan.assigned).forEach(sk=>{
      if (wk.plan.assigned[sk]===dayIdx && baseKey(sk)!==sessKey) {
        wk.plan.assigned[sk]=null;
        wk.plan.tiers[sk]=null;
        wk.plan.engineMods[sk]=null;
      }
    });
    // Assign the new session
    wk.plan.assigned[sessKey]=dayIdx;
    const locked=getLockedAssignments(wk);
    const todayDate=new Date();todayDate.setHours(0,0,0,0);
    const todayIdx=Math.round((todayDate.getTime()-viewMonday.getTime())/(1000*60*60*24));
    const pastDays=new Set();for(let i=0;i<todayIdx;i++){if(i>=0&&i<7)pastDays.add(i);}
    const {tiers:newTiers,engineMods:newMods}=assignGymDays(wk.ballet,locked,pastDays);
    wk.plan.tiers[sessKey]=newTiers[sessKey]||'full';
    // FIX [Bugs/Moderate]: wk.plan.engineMods can be undefined on plans generated
    // before the engineMods field was introduced. Writing to undefined[key] throws
    // a TypeError. The same guard already exists in setSessionTier() — applied here too.
    if (!wk.plan.engineMods) wk.plan.engineMods = {};
    wk.plan.engineMods[sessKey]=newMods[sessKey]||null;
  } else {
    // No gym — clear all slots on this day
    Object.keys(wk.plan.assigned).forEach(sk=>{if(wk.plan.assigned[sk]===dayIdx){wk.plan.assigned[sk]=null;wk.plan.tiers[sk]=null;}});
    Object.keys(wk.plan.extraSlots||{}).forEach(sk=>{if(wk.plan.extraSlots[sk]===dayIdx)delete wk.plan.extraSlots[sk];});

}

function computeAdjSets(ex,exIdx,tagMod) {

function computeMods(tags,sessKey,exercises){
  const progTags=PROG.tags;let globalRPECap=null;
  const wk=getWeek(viewMonday);
  const em=wk.plan?.engineMods?.[lf?.slotKey]||wk.plan?.engineMods?.[baseKey(sessKey)];
  if(em?.rpeCap)globalRPECap=em.rpeCap;
  const sessionNotes=tags.map(t=>progTags[t]?.note).filter(Boolean);
  const exMods=exercises.map(ex=>{
    let setReduction=0;const notes=[];
    tags.forEach(tagKey=>{
      const tag=progTags[tagKey];if(!tag||tag.isWarning)return;
      if(tag.rpeCap)globalRPECap=globalRPECap?Math.min(globalRPECap,tag.rpeCap):tag.rpeCap;
      const aff=tag.affects||{};
      if(aff.ALL)setReduction=Math.max(setReduction,aff.ALL.setReduction||0);
      ex.regions.forEach(r=>{if(aff[r]){setReduction=Math.max(setReduction,aff[r].setReduction||0);if(aff[r].note)notes.push(aff[r].note);}});
    });
    return {setReduction,adjSets:Math.max(1,ex.sets-setReduction),notes,rpeCap:globalRPECap};

function parseRPE(s){const p=String(s).replace('–','-').split('-').map(x=>parseFloat(x.trim()));return p.length===1?{min:p[0],max:p[0]}:{min:p[0],max:p[1]};}
function computeAccuracy(exLogs,exercises,mods,sessKey){
  let totalP=0,totalD=0,rpeHigh=0,rpeLow=0;
  const wk=getWeek(viewMonday);
  const em=wk.plan?.engineMods?.[lf?.slotKey]||wk.plan?.engineMods?.[baseKey(sessKey)];
  const cap=mods?.globalRPECap||em?.rpeCap||null;
  exLogs.forEach((el,i)=>{
    const ex=exercises[i];if(!ex)return;
    const adj=mods?.exMods?.[i]?.adjSets??ex.sets;
    if(ex.sides){totalP+=adj*2;totalD+=(el.setsR?.length||0)+(el.setsL?.length||0);}
    else{totalP+=adj;totalD+=el.sets?.length||0;}
    if(ex.type==='loaded'||ex.type==='bodyweight'||ex.type==='jump'){
      const{min,max}=parseRPE(ex.rpe);const effectiveMax=cap?Math.min(max,cap):max;
      const allSets=ex.sides?[...(el.setsR||[]),...(el.setsL||[])]:(el.sets||[]);
      allSets.forEach(s=>{const r=parseFloat(s.rpe);if(!isNaN(r)){if(r>effectiveMax+0.5)rpeHigh++;if(r<min-1)rpeLow++;}});
    }
  });
  const rate=totalP>0?totalD/totalP:1;
  let verdict,detail,level;
  if(rate>=0.9&&rpeHigh===0&&rpeLow===0){verdict='Session on target';level='good';detail='Volume and intensity matched the prescription.';}
  else if(rpeHigh>=2){verdict='Intensity exceeded prescription';level='warn';detail=`${rpeHigh} set${rpeHigh>1?'s':''} above prescribed RPE. Monitor recovery.`;}
  else if(rate<0.75){verdict='Volume incomplete';level='note';detail=`${totalD}/${totalP} sets completed. If fatigue-driven, note in next week's plan.`;}
  else if(rpeLow>=3){verdict='Session felt easy';level='note';detail='RPE consistently below target. Consider a small load increase.';}

    }
  }
  return `<div class="hent"><div class="hent-hdr" onclick="expandedHist=expandedHist==='${log.id}'?null:'${log.id}';confirmDel=null;renderHistory()"><div><div style="margin-bottom:5px"><span class="badge bpre" style="margin-right:4px">${typeLabel}</span><span class="badge ${sessBadge}">${sessLabel}</span>${tierPill}</div><div class="xs dimmer">${ds} · ${ts}</div></div>${right}</div>${body}</div>`;
}
function doDelete(logId,wkKey){
  const wk=weeks[wkKey];if(!wk)return;
  Object.keys(wk.logs||{}).forEach(k=>{if(wk.logs[k].id===logId)delete wk.logs[k];});
  if(wk.presessionLogs)wk.presessionLogs=wk.presessionLogs.filter(l=>l.id!==logId);
  saveWeeks();confirmDel=null;expandedHist=null;renderHistory();
}
function exportCSV(){
  const rows=[['Date','Week','Session','Tier','Type','Feel','Duration(min)','sRPE(AU)','Volume%','Verdict','Tags','Notes']];
  Object.entries(weeks).forEach(([wk,data])=>{Object.values(data.logs||{}).forEach(log=>{rows.push([new Date(log.date).toLocaleDateString('en-GB'),wk,log.sessionKey,log.tier||'full',log.type,log.feel??'',log.duration??'',log.sRPE??'',log.accuracy?.rate??'',(log.accuracy?.verdict||'').replace(/,/g,';'),(log.tags||[]).join(' | '),(log.notes||'').replace(/,/g,';').replace(/\n/g,' ')]);});});
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`training-${new Date().toISOString().split('T')[0]}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
// ─── BODY TAB ────────────────────────────────────────────────
function renderBody(){
  const el=document.getElementById('page-body');
  const active=injuries.filter(inj=>inj.status!=='resolved');
  const resolved=injuries.filter(inj=>inj.status==='resolved');
  el.innerHTML=`<div style="padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between"><span class="sm b6">Injury Log</span>${!injuryFormOpen?`<button class="btn-g" onclick="openInjuryForm()">+ Log injury</button>`:''}</div>`
    +(injuryFormOpen?buildInjuryForm():'')
    +(active.length>0?`<div class="sec">Active (${active.length})</div>${active.map(buildInjuryEntry).join('')}`:!injuryFormOpen?`<div class="ndim"><strong>No active injuries</strong>Log any pain, tightness, or concern here. Active entries appear as passive reminders in the pre-session screen.</div>`:'')
    +(resolved.length>0?`<div class="sec">Resolved (${resolved.length})</div>${resolved.map(buildInjuryEntry).join('')}`:'')
    +'<div class="bpad"></div>';
}
function buildInjuryForm(){
  const d=injuryFormData;
  const chips=INJURY_REGIONS.map(r=>`<button class="inj-chip${d.region===r?' on':''}" onclick="injuryFormData.region='${r}';renderBody()">${r}</button>`).join('');
  const sevBtns=[1,2,3,4,5].map(v=>`<button class="rbtn${d.severity===v?' on':''}" onclick="injuryFormData.severity=${v};renderBody()">${v}</button>`).join('');
  const stOpts=[{k:'active',l:'Active'},{k:'monitoring',l:'Monitoring'},{k:'resolved',l:'Resolved'}].map(({k,l})=>`<button class="dtype-btn${d.status===k?' on-reh':''}" onclick="injuryFormData.status='${k}';renderBody()">${l}</button>`).join('');
  return `<div class="card"><div class="card-body">
    <div class="field"><label class="lbl">Body region</label><div class="inj-chips">${chips}</div></div>
    <div class="field"><label class="lbl">Severity — 1 minor tightness · 5 acute, see physio</label><div class="rating">${sevBtns}</div><div class="xs dimmer mt1" style="text-align:center">${SEVERITY_LABELS[d.severity]}</div></div>
    <div class="field"><label class="lbl">Status</label><div class="dtype-row">${stOpts}</div></div>
    <div class="field"><label class="lbl">Description (location, onset, trigger)</label><textarea placeholder="e.g. Left Achilles — tightness during relevés, onset Tuesday after long rehearsal" oninput="injuryFormData.description=this.value">${esc(d.description)}</textarea></div>
    <div style="display:flex;gap:8px"><button class="btn-p" style="flex:1;margin:0" onclick="saveInjury()">Save</button><button class="btn-g" style="flex:0 0 80px" onclick="closeInjuryForm()">Cancel</button></div>
  </div></div>`;
}
function buildInjuryEntry(inj){
  const isExp=injuryExpandedId===inj.id;
  const ds=new Date(inj.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const col=SEVERITY_COLORS[inj.severity]||'var(--tx3)';
  const sPill=inj.status==='resolved'?`<span class="inj-status-pill inj-status-resolved">resolved</span>`:inj.status==='monitoring'?`<span class="inj-status-pill inj-status-monitoring">monitoring</span>`:`<span class="inj-status-pill inj-status-active">active</span>`;
  return `<div class="hent"><div class="hent-hdr" onclick="injuryExpandedId=injuryExpandedId==='${inj.id}'?null:'${inj.id}';renderBody()"><div><div class="sm b5" style="margin-bottom:3px">${inj.region} <span style="font-size:11px;color:${col}">● ${SEVERITY_LABELS[inj.severity]}</span></div><div class="xs dimmer">${ds} · ${sPill}</div></div><svg class="chev${isExp?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg></div>${isExp?`<div class="hent-body">${inj.description?`<div class="xs" style="color:var(--tx2);margin-bottom:10px;line-height:1.5">${esc(inj.description)}</div>`:''}<div style="display:flex;gap:6px;flex-wrap:wrap">${inj.status!=='resolved'?`<button class="btn-g" style="font-size:12px" onclick="resolveInjury('${inj.id}')">✓ Mark resolved</button>`:''}<button class="btn-g" style="font-size:12px" onclick="editInjury('${inj.id}')">Edit</button><button class="del-btn" onclick="deleteInjury('${inj.id}')">Delete</button></div></div>`:''}</div>`;
}
function openInjuryForm(){injuryFormOpen=true;injuryEditId=null;injuryFormData={region:'',severity:3,description:'',status:'active'};renderBody();}
function closeInjuryForm(){injuryFormOpen=false;injuryEditId=null;renderBody();}
function editInjury(id){const inj=injuries.find(i=>i.id===id);if(!inj)return;injuryFormOpen=true;injuryEditId=id;injuryFormData={region:inj.region,severity:inj.severity,description:inj.description,status:inj.status};renderBody();}
function saveInjury(){if(!injuryFormData.region){alert('Please select a body region.');return;}if(injuryEditId){const idx=injuries.findIndex(i=>i.id===injuryEditId);if(idx>-1)injuries[idx]={...injuries[idx],...injuryFormData};}else{injuries.unshift({id:Date.now().toString(),date:new Date().toISOString(),...injuryFormData});}saveInjuries();injuryFormOpen=false;injuryEditId=null;renderBody();}
function resolveInjury(id){const inj=injuries.find(i=>i.id===id);if(inj){inj.status='resolved';inj.resolvedDate=new Date().toISOString();}saveInjuries();renderBody();}
function deleteInjury(id){injuries=injuries.filter(i=>i.id!==id);injuryExpandedId=null;saveInjuries();renderBody();}
// ─── INIT ────────────────────────────────────────────────────
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
loadProgram().then(()=>{if(PROG)renderSchedule();});
</script>
</body>
</html>
