<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0d0d0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Training v1.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0c;--bg2:#161614;--bg3:#1e1e1c;--bg4:#272724;
  --bd:#2b2b28;--bd2:#363633;
  --tx:#eeebe4;--tx2:#a6a29b;--tx3:#66625c;
  --am:#e8a020;--amd:#291e07;--amm:#48340e;
  --gn:#3aaa80;--gnd:#091e16;
  --pu:#7c6fdf;--pud:#151338;
  --co:#df6b4a;--cod:#281209;
  --rd:#e04444;--rdd:#280a0a;
  --bl:#4a9fd4;--bld:#0a1e2e;
  --fl:#9b8fe8;--fld:#1a1835;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
input,textarea,button,select{font-family:inherit}
button{cursor:pointer}

/* ── Layout ───────────────────────────────────────────── */
#app{height:100dvh;display:flex;flex-direction:column}
#hdr{background:var(--bg);border-bottom:1px solid var(--bd);padding:calc(var(--st) + 10px) 16px 0;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:4px}
.hdr-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.hdr-ver{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace}
.tabs{display:flex;margin:0 -16px}
.tab{flex:1;padding:10px 0 9px;font-size:12px;font-weight:500;color:var(--tx3);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--am);border-bottom-color:var(--am)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block}

/* ── Week nav ─────────────────────────────────────────── */
.week-nav{display:flex;align-items:center;padding:10px 16px;gap:6px;background:var(--bg2);border-bottom:1px solid var(--bd)}
.wnav-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:6px 10px;color:var(--tx2);font-size:16px;line-height:1;transition:all .15s;flex-shrink:0}
.wnav-btn:active{opacity:.7}
.wnav-btn:disabled{opacity:.3;pointer-events:none}
.week-lbl{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--tx)}
.week-tag{font-size:10px;color:var(--am);font-family:'DM Mono',monospace;display:block;text-align:center;margin-top:1px}

/* ── Cards ────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin:0 16px 10px;overflow:hidden}
.card-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.card-body{padding:14px}

/* ── Badges ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.05em;font-family:'DM Mono',monospace}
.bap{background:var(--pud);color:var(--pu)}
.bal{background:var(--bld);color:var(--bl)}
.baf{background:var(--fld);color:var(--fl)}
.bb{background:var(--gnd);color:var(--gn)}
.bc{background:var(--amd);color:var(--am)}
.bd{background:var(--cod);color:var(--co)}
.bpre{background:var(--bg4);color:var(--tx2)}

/* ── Day type selector ────────────────────────────────── */
.dtype-row{display:flex;gap:5px;flex-wrap:wrap}
.dtype-btn{padding:7px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:11px;font-weight:500;transition:all .15s;flex:1;text-align:center;min-width:0}
.dtype-btn.on-perf{background:#2a0d1e;color:#e060a0;border-color:#e060a0}
.dtype-btn.on-off{background:var(--gnd);color:var(--gn);border-color:var(--gn)}
.dtype-btn.on-reh{background:var(--amd);color:var(--am);border-color:var(--am)}
.dtype-btn.on-per{background:var(--pud);color:var(--pu);border-color:var(--pu)}

/* ── Intensity ────────────────────────────────────────── */
.int-row{display:flex;gap:4px}
.int-btn{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:13px;font-weight:500;font-family:'DM Mono',monospace;transition:all .15s}
.int-btn.on{background:var(--am);color:var(--bg);border-color:var(--am);font-weight:600}

/* ── Week schedule grid ───────────────────────────────── */
.week-grid{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.day-card{border-radius:11px;border:1px solid var(--bd);overflow:hidden;background:var(--bg2)}
.day-card-hdr{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.day-card-hdr.tappable:active{background:var(--bg3)}
.day-name{font-size:13px;font-weight:600}
.day-meta{font-size:11px;color:var(--tx3);margin-top:2px}
.day-status{display:flex;align-items:center;gap:6px}
.done-pill{background:var(--gnd);color:var(--gn);border:1px solid var(--gn);border-radius:20px;font-size:10px;font-weight:600;padding:2px 8px;font-family:'DM Mono',monospace}
.rest-pill{background:var(--bg4);color:var(--tx3);border-radius:20px;font-size:10px;padding:2px 8px}
.reason-text{font-size:11px;color:var(--tx3);padding:0 13px 10px;line-height:1.4;border-top:1px solid var(--bd);margin-top:0;padding-top:8px}

/* ── Inputs ───────────────────────────────────────────── */
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.lbl{font-size:12px;color:var(--tx3);margin-bottom:6px;display:block;letter-spacing:.02em;font-weight:500}
input[type=text],textarea{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;font-size:15px;color:var(--tx);outline:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--am)}
textarea{resize:none;min-height:60px;line-height:1.4}

/* ── Rating / quality buttons ─────────────────────────── */
.rating{display:flex;gap:5px}
.rbtn{flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:13px;font-weight:500;transition:all .15s;font-family:'DM Mono',monospace}
.rbtn.on{background:var(--am);color:var(--bg);border-color:var(--am);font-weight:600}

/* ── Buttons ──────────────────────────────────────────── */
.btn-p{width:100%;background:var(--am);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;letter-spacing:-.2px;transition:opacity .15s;margin:4px 0}
.btn-p:active{opacity:.8}
.btn-g{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--tx2);font-weight:500;transition:all .15s}
.btn-g:active{opacity:.7}
.btn-d{width:100%;background:none;border:1px dashed var(--bd2);border-radius:8px;padding:10px;color:var(--tx3);font-size:13px;transition:all .15s;margin-top:6px}
.btn-d:active{background:var(--bg3)}
.btn-back{background:none;border:none;color:var(--tx3);font-size:13px;padding:4px 0;display:flex;align-items:center;gap:4px}
.btn-skip{background:none;border:none;color:var(--tx3);font-size:12px;text-decoration:underline;padding:4px 0}

/* ── Utility ──────────────────────────────────────────── */
.sm{font-size:13px}.xs{font-size:12px}.dim{color:var(--tx2)}.dimmer{color:var(--tx3)}
.b6{font-weight:600}.b5{font-weight:500}.mono{font-family:'DM Mono',monospace}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mb1{margin-bottom:4px}
.row{display:flex;align-items:center;gap:8px}.jcb{justify-content:space-between}
.sec{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;padding:16px 18px 8px}

/* ── Edit days mode ───────────────────────────────────── */
.edit-mode-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--amd);border-bottom:1px solid var(--amm);margin-bottom:2px}
.edit-mode-lbl{font-size:12px;font-weight:600;color:var(--am)}
.edit-mode-actions{display:flex;gap:6px}
.btn-done{background:var(--am);color:var(--bg);border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:600}
.btn-undo{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500}
.day-card.editable{cursor:pointer;border-color:var(--bd2)}
.day-card.editable:active{background:var(--bg3)}
.day-card.conflict{border-color:var(--rd) !important}
.conflict-note{font-size:11px;color:var(--rd);padding:0 13px 9px;line-height:1.4}
.session-menu{background:var(--bg3);border-radius:10px;margin:0 13px 10px;overflow:hidden;border:1px solid var(--bd2)}
.session-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.session-opt:last-child{border-bottom:none}
.session-opt:active{background:var(--bg4)}
.session-opt-lbl{display:flex;align-items:center;gap:10px}
.session-tick{color:var(--gn);font-size:16px;font-weight:700;width:18px;text-align:center}
.session-tick-empty{width:18px;display:inline-block}
.bpad{height:calc(var(--sb) + 24px)}

/* ── Notices ──────────────────────────────────────────── */
.notice{margin:0 16px 10px;padding:11px 13px;background:var(--amd);border:1px solid var(--amm);border-radius:10px;font-size:12px;color:var(--am);line-height:1.5}
.notice strong{font-weight:600;display:block;margin-bottom:2px}
.ndim{margin:0 16px 10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;font-size:12px;color:var(--tx3);line-height:1.5}
.ndim strong{font-weight:600;color:var(--tx2);display:block;margin-bottom:2px}
.nred{margin:0 16px 10px;padding:11px 13px;background:var(--rdd);border:1px solid var(--rd);border-radius:10px;font-size:12px;color:var(--rd);line-height:1.5}
.nred strong{font-weight:600;display:block;margin-bottom:2px}

/* ── Week summary card ────────────────────────────────── */
.week-sum-card{margin:8px 16px 4px;padding:12px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px}
.week-sum-title{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;font-family:'DM Mono',monospace}
.week-sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.week-sum-stat{text-align:center;padding:6px 4px;background:var(--bg3);border-radius:8px}
.week-sum-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--tx);line-height:1}
.week-sum-val.dim{color:var(--tx3)}
.week-sum-lbl{font-size:9px;color:var(--tx3);margin-top:3px;letter-spacing:.03em}
.week-sum-alert{padding:8px 10px;border-radius:7px;margin-top:6px;font-size:11px;line-height:1.4}
.week-sum-alert.warn{background:var(--rdd);color:var(--rd);border:1px solid var(--rd)}
.week-sum-alert.note{background:var(--amd);color:var(--am);border:1px solid var(--amm)}

/* ── Tag chips ────────────────────────────────────────── */
.tag-grp-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{padding:8px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:12px;font-weight:500;transition:all .15s}
.tag.rec{background:var(--amd);color:var(--am);border-color:var(--am)}
.tag.cau{background:var(--cod);color:var(--co);border-color:var(--co)}
.tag.wrn{background:var(--rdd);color:var(--rd);border-color:var(--rd)}

/* ── Mod preview ──────────────────────────────────────── */
.mod-box{padding:12px 14px;background:var(--bg);border:1px solid var(--amm);border-radius:10px;margin-bottom:12px}
.mod-title{font-size:10px;font-weight:600;color:var(--am);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.mod-line{font-size:12px;color:var(--tx2);margin-bottom:4px;line-height:1.4;padding-left:8px;border-left:2px solid var(--amm)}

/* ── Exercise accordion ───────────────────────────────── */
.ex-hdr{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent;transition:border-color .15s}
.ex-hdr.open{border-bottom-color:var(--bd)}
.ex-body{padding:12px 14px;background:var(--bg)}
.chev{width:16px;height:16px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}

/* ── Warm-up card ─────────────────────────────────────── */
.warmup-card{border-color:var(--amm)}
.warmup-item{padding:8px 0;border-bottom:1px solid var(--bd)}
.warmup-item:last-child{border-bottom:none;padding-bottom:0}
.warmup-name{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:2px}
.warmup-pre{font-size:11px;color:var(--am);font-family:'DM Mono',monospace}
.warmup-note{font-size:11px;color:var(--tx3);margin-top:3px;line-height:1.4}

/* ── Sided section ────────────────────────────────────── */
.sided-half{margin-bottom:8px}
.sided-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 6px;border-radius:5px;margin-bottom:6px;display:inline-block}
.sided-lbl.r{background:var(--amd);color:var(--am)}
.sided-lbl.l{background:var(--bld);color:var(--bl)}
.sided-sep{height:1px;background:var(--bd);margin:8px 0}

/* ── Duration display ─────────────────────────────────── */
.srpe-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.srpe-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;min-width:120px;transition:border-color .15s}
.srpe-btn:active{border-color:var(--am)}
.srpe-val{font-size:16px;font-weight:500;font-family:'DM Mono',monospace;color:var(--tx)}
.srpe-unit{font-size:11px;color:var(--tx3)}
.srpe-note{font-size:11px;color:var(--tx3);flex:1}

/* ── Accuracy ─────────────────────────────────────────── */
.acc{margin:0 16px 10px;padding:14px;border-radius:12px;border:1px solid var(--bd)}
.acc.good{background:var(--gnd);border-color:var(--gn)}
.acc.warn{background:var(--cod);border-color:var(--co)}
.acc.note{background:var(--amd);border-color:var(--am)}
.acc-title{font-size:13px;font-weight:600;margin-bottom:4px}
.acc.good .acc-title{color:var(--gn)}.acc.warn .acc-title{color:var(--co)}.acc.note .acc-title{color:var(--am)}
.acc-detail{font-size:12px;color:var(--tx2);line-height:1.5}
.acc-stat{font-size:11px;color:var(--tx3);margin-top:6px;font-family:'DM Mono',monospace}

/* ── History ──────────────────────────────────────────── */
.hflt-row{display:flex;align-items:center;gap:6px;padding:10px 16px 4px}
.hflt{display:flex;gap:6px;flex:1}
.flt{padding:6px 14px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:11px;font-weight:500;transition:all .15s}
.flt.on{background:var(--am);color:var(--bg);border-color:var(--am)}
.hent{margin:0 16px 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.hent-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.hent-hdr:active{background:var(--bg3)}
.hent-body{padding:0 14px 12px}
.hex{font-size:12px;color:var(--tx3);margin-bottom:2px}
.hex span{color:var(--tx2)}
.del-btn{background:none;border:1px solid transparent;border-radius:6px;color:var(--tx3);font-size:11px;padding:4px 8px;transition:all .15s}
.del-btn:active{background:var(--rdd);color:var(--rd);border-color:var(--rd)}
.del-conf{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}

/* ── Injury log (Body tab) ────────────────────────────── */
.inj-chips{display:flex;flex-wrap:wrap;gap:6px}
.inj-chip{padding:7px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:12px;font-weight:500;transition:all .15s}
.inj-chip.on{background:var(--cod);color:var(--co);border-color:var(--co)}
.inj-status-pill{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block}
.inj-status-active{background:var(--rdd);color:var(--rd)}
.inj-status-monitoring{background:var(--amd);color:var(--am)}
.inj-status-resolved{background:var(--gnd);color:var(--gn)}

/* ── Empty & success ──────────────────────────────────── */
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.empty{text-align:center;padding:60px 24px}
.emi{font-size:40px;margin-bottom:12px;opacity:.3}
.emt{font-size:15px;font-weight:500;color:var(--tx2)}
.ems{font-size:13px;color:var(--tx3);margin-top:4px}

/* ── TOUCH PICKER ─────────────────────────────────────── */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.picker-sheet{width:100%;background:var(--bg2);border-radius:20px 20px 0 0;padding-bottom:calc(var(--sb) + 8px);user-select:none;-webkit-user-select:none}
.picker-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd)}
.picker-label{font-size:15px;font-weight:600}
.picker-done{background:var(--am);color:var(--bg);border:none;border-radius:8px;padding:8px 20px;font-size:15px;font-weight:600}
.picker-cols{display:flex;justify-content:center;padding:0 24px}
.picker-col{flex:1;position:relative;height:264px;overflow:hidden;cursor:grab}
.picker-viewport{position:relative;height:264px;overflow:hidden}
.picker-list{position:absolute;left:0;right:0;top:0;will-change:transform}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'DM Mono',monospace;color:var(--tx3);font-weight:400;transition:color .1s,font-size .1s}
.picker-item.sel{color:var(--tx);font-weight:600;font-size:26px}
.picker-mask-t,.picker-mask-b{position:absolute;left:0;right:0;height:110px;pointer-events:none;z-index:2}
.picker-mask-t{top:0;background:linear-gradient(to bottom,var(--bg2) 0%,transparent 100%)}
.picker-mask-b{bottom:0;background:linear-gradient(to top,var(--bg2) 0%,transparent 100%)}
.picker-line{position:absolute;left:8%;right:8%;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--bd2);border-bottom:1px solid var(--bd2);pointer-events:none;z-index:3}
.picker-col-lbl{text-align:center;font-size:10px;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;padding:4px 0 10px;font-family:'DM Mono',monospace}

/* ── Value buttons ────────────────────────────────────── */
.val-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:11px 14px;transition:border-color .15s;cursor:pointer}
.val-btn:active,.val-btn.active{border-color:var(--am)}
.val-btn-num{font-size:18px;font-weight:500;font-family:'DM Mono',monospace;color:var(--tx)}
.val-btn-unit{font-size:11px;color:var(--tx3)}
.val-btn-empty{font-size:14px;color:var(--tx3)}

/* ── Set row ──────────────────────────────────────────── */
.set-row{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.set-n{width:22px;height:22px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace;flex-shrink:0}
.plyo-done{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx3);font-size:13px;font-weight:500;transition:all .15s;text-align:center}
.plyo-done.done{background:var(--gnd);color:var(--gn);border-color:var(--gn)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row">
      <span class="hdr-title">Training</span>
      <span class="hdr-ver">v1.5.0</span>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="nav('schedule',this)">Schedule</button>
      <button class="tab"    onclick="nav('history',this)">History</button>
      <button class="tab"    onclick="nav('body',this)">Body</button>
    </div>
  </div>
  <div id="content">
    <div id="page-schedule" class="page on"></div>
    <div id="page-history"  class="page"></div>
    <div id="page-body"     class="page"></div>
  </div>
</div>

<!-- Picker overlay — onclick attaches pickerBgClick for backdrop dismiss -->
<div id="picker-overlay" class="picker-overlay" style="display:none" onclick="pickerBgClick(event)">
  <div class="picker-sheet">
    <div class="picker-hdr">
      <span class="picker-label" id="picker-label">Select</span>
      <button class="picker-done" onclick="pickerDone()">Done</button>
    </div>
    <div id="picker-cols" class="picker-cols"></div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// PROGRAM — loaded from program.json via service-worker cache
// No inline fallback: after first online load the SW caches
// the file. If this fails the athlete is offline pre-first-load
// and we show a clear message rather than silently load stale data.
// ═══════════════════════════════════════════════════════════
let PROG = null;

async function loadProgram() {
  try {
    const r = await fetch('program.json');
    if (r.ok) { PROG = await r.json(); return; }
    throw new Error('HTTP ' + r.status);
  } catch (e) {
    document.getElementById('page-schedule').innerHTML = `
      <div class="empty">
        <div class="emi">⚠️</div>
        <div class="emt">Program unavailable</div>
        <div class="ems">Open the app once while connected to the internet.<br>After that it works fully offline.</div>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
const save = (k, v) => { try { localStorage.setItem('bt2_' + k, JSON.stringify(v)); } catch(e) {} };
const load = k => { try { const v = localStorage.getItem('bt2_' + k); return v ? JSON.parse(v) : null; } catch(e) { return null; } };

// ═══════════════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════════════
function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}
function weekKey(monday) { return monday.toISOString().split('T')[0]; }
function fmtWeekLabel(monday) {
  const sun = new Date(monday); sun.setDate(sun.getDate() + 6);
  const opts = { day: 'numeric', month: 'short' };
  return `${monday.toLocaleDateString('en-GB', opts)} – ${sun.toLocaleDateString('en-GB', opts)}`;
}

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DTYPE_LABELS = { perf:'Performance', off:'Day Off', reh:'Full Rehearsal', per:'Personal Training' };
const DTYPE_CLASS  = { perf:'on-perf', off:'on-off', reh:'on-reh', per:'on-per' };
const SESS_LABEL   = { AP:'PUSH', AL:'PULL', AF:'FULL', B:'B', C:'C', D:'D' };
const SESS_BADGE   = { AP:'bap', AL:'bal', AF:'baf', B:'bb', C:'bc', D:'bd' };

const INJURY_REGIONS = ['Ankle','Knee','Hip','Lower Back','Hamstring','Groin','Shoulder','Wrist','Foot','Achilles','Other'];
const SEVERITY_LABELS = ['','Minor tightness','Mild pain','Moderate pain','Significant — limit training','Acute — see physio'];
const SEVERITY_COLORS = ['','var(--gn)','var(--am)','var(--co)','var(--rd)','var(--rd)'];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let viewMonday    = getMondayOf(new Date());
let weeks         = load('weeks') || {};
let injuries      = load('injuries') || [];
let histFilter    = 'all';
let expandedHist  = null;
let confirmDel    = null;
let lf            = null;   // active log flow state, null when idle

// Edit days mode
let editDaysMode     = false;
let editDayMenu      = null;
let editDaysSnapshot = null;  // single-level undo snapshot

// Injury form state
let injuryFormOpen = false;
let injuryEditId   = null;
let injuryFormData = { region: '', severity: 3, description: '', status: 'active' };
let injuryExpandedId = null;

// ═══════════════════════════════════════════════════════════
// WEEK DATA HELPERS
// ═══════════════════════════════════════════════════════════
function getWeek(monday) {
  const k = weekKey(monday);
  if (!weeks[k]) weeks[k] = {
    ballet: DAYS.map(d => ({ day: d, type: null, intensity: 3, hours: '' })),
    plan:   null,
    logs:   {}
  };
  return weeks[k];
}
function saveWeeks()    { save('weeks', weeks); }
function saveInjuries() { save('injuries', injuries); }

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function nav(name, el) {
  if (lf) { if (!confirm('Leave this session? Progress will be lost.')) return; lf = null; }
  editDaysMode = false; editDayMenu = null;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('page-' + name).classList.add('on');
  el.classList.add('on');
  if (name === 'schedule') renderSchedule();
  if (name === 'history')  renderHistory();
  if (name === 'body')     renderBody();
}

// ═══════════════════════════════════════════════════════════
// SCHEDULE PAGE
// ═══════════════════════════════════════════════════════════
function renderSchedule() {
  if (lf) { renderLogFlow(); return; }
  const el  = document.getElementById('page-schedule');
  const wk  = getWeek(viewMonday);
  const currentMonday = getMondayOf(new Date());
  const nextMonday    = new Date(currentMonday); nextMonday.setDate(nextMonday.getDate() + 7);
  const isCurrent = weekKey(viewMonday) === weekKey(currentMonday);
  const isNext    = weekKey(viewMonday) === weekKey(nextMonday);

  const leftBtn  = isNext    ? `<button class="wnav-btn" onclick="changeWeek(-1)">‹</button>` : `<div style="width:37px"></div>`;
  const rightBtn = isCurrent ? `<button class="wnav-btn" onclick="changeWeek(1)">›</button>`  : `<div style="width:37px"></div>`;
  const weekNav  = `
    <div class="week-nav">
      ${leftBtn}
      <div style="flex:1;text-align:center">
        <div class="week-lbl">${fmtWeekLabel(viewMonday)}</div>
        <div class="week-tag">${isCurrent ? 'CURRENT WEEK' : 'NEXT WEEK'}</div>
      </div>
      ${rightBtn}
    </div>`;

  el.innerHTML = weekNav + (wk.plan ? buildWeekView(wk) : buildBalletInput(wk));
}

function changeWeek(dir) {
  const cm = getMondayOf(new Date());
  const nm = new Date(cm); nm.setDate(nm.getDate() + 7);
  viewMonday = dir > 0 ? nm : cm;
  renderSchedule();
}

// ── Ballet input form ──────────────────────────────────────
function buildBalletInput(wk) {
  const daycards = wk.ballet.map((d, i) => {
    const typebtns = Object.entries(DTYPE_LABELS).map(([k, lbl]) =>
      `<button class="dtype-btn${d.type === k ? ' ' + DTYPE_CLASS[k] : ''}" onclick="setDtype(${i},'${k}')">${lbl}</button>`
    ).join('');
    const intbtns = [1,2,3,4,5].map(v =>
      `<button class="int-btn${d.intensity === v ? ' on' : ''}" onclick="setDint(${i},${v})">${v}</button>`
    ).join('');
    const showExtra = d.type && d.type !== 'off';
    return `
    <div class="card">
      <div class="card-hdr"><div class="sm b6">${d.day}</div></div>
      <div class="card-body">
        <div class="field">
          <label class="lbl">Day type</label>
          <div class="dtype-row">${typebtns}</div>
        </div>
        ${showExtra ? `
        <div class="field">
          <label class="lbl">Intensity — 1 light · 3 moderate · 5 maximum</label>
          <div class="int-row">${intbtns}</div>
        </div>
        <div class="field">
          <label class="lbl">Duration (hours, optional)</label>
          <input type="text" inputmode="decimal" value="${d.hours}" placeholder="e.g. 2.5" oninput="setDhours(${i},this.value)">
        </div>` : d.type === 'off' ? '<div class="xs dimmer" style="margin-top:-4px">Rest day — prime gym candidate.</div>' : ''}
      </div>
    </div>`;
  }).join('');

  return `
    <div class="sec">Ballet schedule</div>
    <div class="notice"><strong>Enter this week's company schedule</strong>Day type and intensity guide the auto-assignment of gym sessions.</div>
    ${daycards}
    <div style="padding:4px 16px 8px">
      <button class="btn-p" onclick="generatePlan()">Generate Gym Plan →</button>
    </div>
    <div class="bpad"></div>`;
}

function setDtype(i, v)  { getWeek(viewMonday).ballet[i].type = v; saveWeeks(); renderSchedule(); }
function setDint(i, v)   { getWeek(viewMonday).ballet[i].intensity = v; saveWeeks(); renderSchedule(); }
function setDhours(i, v) { getWeek(viewMonday).ballet[i].hours = v; saveWeeks(); }

// ═══════════════════════════════════════════════════════════
// AUTO-ASSIGNMENT ENGINE
// ═══════════════════════════════════════════════════════════
function assignGymDays(ballet) {
  function computeLoad(d) {
    const hrs = Math.max(parseFloat(d.hours) || 0, 0.5);
    const int = d.intensity || 3;
    if (!d.type || d.type === 'off')  return { upper: 0, lower: 0 };
    if (d.type === 'perf')            return { upper: 99, lower: 99 };
    if (d.type === 'reh')             return { upper: int * hrs * 0.4, lower: int * hrs * 0.5 };
    if (d.type === 'per')             return { upper: int * hrs * 0.2, lower: int * hrs * 0.8 };
    return { upper: 0, lower: 0 };
  }

  const loads   = ballet.map(computeLoad);
  const isOff   = ballet.map(d => d.type === 'off');
  const protectedDays = new Set();
  ballet.forEach((d, i) => {
    if (d.type === 'perf') { if (i > 0) protectedDays.add(i - 1); protectedDays.add(i); }
  });

  function slotBonus(i) {
    let b = 0;
    if (isOff[i]) b -= 2;
    if (i > 0 && isOff[i - 1]) b -= 1;
    return b;
  }

  const UPPER_MAX = 6.5, LOWER_MAX = 5, OPTIONAL_MAX = 5;

  const upperSlots = [];
  for (let i = 0; i < 7; i++) {
    if (protectedDays.has(i)) continue;
    if (loads[i].upper >= UPPER_MAX) continue;
    upperSlots.push({ idx: i, score: loads[i].upper + slotBonus(i) });
  }
  upperSlots.sort((a, b) => a.score - b.score);

  const assigned = {}, reasons = {};
  let splitMode = false, slot1 = null, slot2 = null;

  if (upperSlots.length >= 2) {
    outer: for (let i = 0; i < upperSlots.length; i++) {
      for (let j = i + 1; j < upperSlots.length; j++) {
        if (Math.abs(upperSlots[i].idx - upperSlots[j].idx) >= 2) {
          slot1 = upperSlots[i]; slot2 = upperSlots[j];
          splitMode = true; break outer;
        }
      }
    }
  }

  if (splitMode) {
    const [early, late] = slot1.idx < slot2.idx ? [slot1, slot2] : [slot2, slot1];
    assigned.AP = early.idx; assigned.AL = late.idx; assigned.AF = null;
    reasons.AP  = buildUpperReason('AP', early.idx, ballet, loads, true);
    reasons.AL  = buildUpperReason('AL', late.idx, ballet, loads, true);
    reasons.AF  = 'Split week — Push and Pull assigned separately.';
  } else if (upperSlots.length === 1) {
    assigned.AP = null; assigned.AL = null; assigned.AF = upperSlots[0].idx;
    reasons.AF  = buildUpperReason('AF', upperSlots[0].idx, ballet, loads, false);
    reasons.AP  = reasons.AL = 'Only one upper slot — Full Body used instead.';
  } else {
    assigned.AP = assigned.AL = assigned.AF = null;
    reasons.AP  = reasons.AL = reasons.AF = 'No viable upper body slot this week.';
  }

  const usedDays = new Set(Object.values(assigned).filter(v => v !== null));

  function scoreLowerDay(i) {
    if (protectedDays.has(i) || usedDays.has(i)) return Infinity;
    if (loads[i].lower >= LOWER_MAX) return Infinity;
    return loads[i].lower + slotBonus(i);
  }

  let bestB = null, bestBScore = Infinity;
  for (let i = 0; i < 7; i++) { const sc = scoreLowerDay(i); if (sc < bestBScore) { bestBScore = sc; bestB = i; } }
  if (bestB !== null && bestBScore < Infinity) {
    assigned.B = bestB; usedDays.add(bestB);
    reasons.B  = buildLowerReason('B', bestB, ballet, loads);
  } else {
    assigned.B = null;
    reasons.B  = 'No viable lower body slot — Day B skipped. Ballet lower load too high this week.';
  }

  let bestC = null, bestCScore = Infinity;
  for (let i = 0; i < 7; i++) {
    let sc = scoreLowerDay(i);
    if (sc === Infinity) continue;
    if (assigned.B !== null && Math.abs(i - assigned.B) < 2) continue;
    const adjReh = (i > 0 && ballet[i-1].type === 'reh') || (i < 6 && ballet[i+1].type === 'reh');
    if (adjReh) sc += 3;
    if (sc < bestCScore) { bestCScore = sc; bestC = i; }
  }
  if (bestC !== null && bestCScore < Infinity) {
    assigned.C = bestC; usedDays.add(bestC);
    reasons.C  = buildLowerReason('C', bestC, ballet, loads);
  } else {
    assigned.C = null;
    reasons.C  = 'No viable plyo slot — Day C skipped. Insufficient gap from Day B or ballet load too high.';
  }

  let bestD = null, bestDScore = 999;
  for (let i = 0; i < 7; i++) {
    if (usedDays.has(i) || protectedDays.has(i)) continue;
    const total = loads[i].upper + loads[i].lower;
    if (total >= OPTIONAL_MAX) continue;
    const sc = total + slotBonus(i);
    if (sc < bestDScore) { bestDScore = sc; bestD = i; }
  }
  if (bestD !== null && bestDScore < 999) {
    assigned.D = bestD;
    reasons.D  = `${DAYS[bestD]} — available low-load slot. Optional hypertrophy.`;
  } else {
    assigned.D = null;
    reasons.D  = 'No clean optional slot — Day D skipped.';
  }

  return { assigned, reasons };
}

function buildUpperReason(session, dayIdx, ballet, loads, isSplit) {
  if (dayIdx === null) return '';
  const d = ballet[dayIdx], dayName = DAYS[dayIdx], parts = [];
  if (d.type === 'off') parts.push(`${dayName} is a day off — lowest upper body load`);
  else if (loads[dayIdx].upper <= 2) parts.push(`${dayName} has light upper body demand from ballet`);
  else parts.push(`${dayName} has the best available upper body slot`);
  if (isSplit) {
    if (session === 'AP') parts.push('Push assigned first — overhead priority early in week');
    if (session === 'AL') parts.push('Pull assigned second — 48h gap from Push maintained');
  } else {
    parts.push('only viable upper slot — Full Body compression used');
  }
  const mn = getUpperModNote(loads[dayIdx].upper);
  if (mn) parts.push(mn);
  return parts.join(' · ') + '.';
}

function buildLowerReason(session, dayIdx, ballet, loads) {
  if (dayIdx === null) return '';
  const d = ballet[dayIdx], dayName = DAYS[dayIdx], parts = [];
  if (d.type === 'off') parts.push(`${dayName} is a day off — lowest lower body load`);
  else if (loads[dayIdx].lower <= 2) parts.push(`${dayName} has light lower body demand`);
  else parts.push(`${dayName} has the best available lower body slot`);
  if (session === 'C') parts.push('plyometrics — clear of adjacent full rehearsal days');
  const mn = getLowerModNote(loads[dayIdx].lower);
  if (mn) parts.push(mn);
  return parts.join(' · ') + '.';
}

function getUpperModNote(upperLoad) {
  if (upperLoad >= 5) return '⚠ Heavy day — gym after class, cap RPE at 7';
  if (upperLoad >= 3) return 'Moderate load — gym after class';
  return '';
}
function getLowerModNote(lowerLoad) {
  if (lowerLoad >= 3.5) return '⚠ Moderate leg load — halve sets, keep RPE';
  return '';
}

function generatePlan() {
  const wk = getWeek(viewMonday);
  const { assigned, reasons } = assignGymDays(wk.ballet);
  wk.plan = { assigned, reasons, createdAt: new Date().toISOString() };
  saveWeeks();
  renderSchedule();
}

// ── Week view (plan generated) ─────────────────────────────
function buildWeekView(wk) {
  const summary = buildWeekSummary(wk);

  const assignedArr = Object.entries(wk.plan.assigned).filter(([, idx]) => idx !== null);
  const dayToSessions = {};
  assignedArr.forEach(([sk, di]) => { if (!dayToSessions[di]) dayToSessions[di] = []; dayToSessions[di].push(sk); });
  const conflictDays = new Set(
    Object.entries(dayToSessions).filter(([, arr]) => arr.length > 1).map(([di]) => Number(di))
  );

  const editBar = editDaysMode ? `
    <div class="edit-mode-bar">
      <span class="edit-mode-lbl">✏️ Tap any day to reassign</span>
      <div class="edit-mode-actions">
        <button class="btn-undo" onclick="undoEditDays()">Undo</button>
        <button class="btn-done" onclick="exitEditDays()">Done</button>
      </div>
    </div>` : '';

  const dayCards = DAYS.map((day, i) => {
    const ballet = wk.ballet[i];
    const sessionsOnDay = dayToSessions[i] || [];
    const sessionKey = sessionsOnDay[0] || null;
    const log = sessionKey ? wk.logs[sessionKey] : null;
    const isDone = !!log;
    const isConflict = conflictDays.has(i);

    const conflictNote = isConflict
      ? `<div class="conflict-note">⚠ ${sessionsOnDay.map(sk => SESS_LABEL[sk] || sk).join(' + ')} — duplicate assignment</div>`
      : '';

    const menuHTML = (editDaysMode && editDayMenu === i) ? buildSessionMenu(i, sessionsOnDay) : '';

    if (sessionKey) {
      const sess = PROG.sessions[sessionKey];
      const reason  = !editDaysMode ? wk.plan.reasons[sessionKey] : null;
      const modNote = !editDaysMode ? getModNote(ballet) : null;
      const clickAct = editDaysMode
        ? `openEditDayMenu(${i})`
        : isDone ? `toggleHistEntry('${sessionKey}')` : `openLog('${sessionKey}',${i})`;

      return `
        <div class="day-card${editDaysMode ? ' editable' : ''}${isConflict ? ' conflict' : ''}" onclick="${clickAct}">
          <div class="day-card-hdr">
            <div>
              <div class="row">
                <span class="badge ${SESS_BADGE[sessionKey] || 'bpre'}">${SESS_LABEL[sessionKey] || sessionKey}</span>
                <span class="sm b5" style="margin-left:4px">${sess.name}</span>
              </div>
              <div class="day-meta">${day}${ballet.type ? ' · ' + DTYPE_LABELS[ballet.type] : ''}${ballet.hours ? ' · ' + ballet.hours + 'h' : ''}</div>
            </div>
            <div class="day-status">
              ${editDaysMode
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--am)" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>'
                : isDone
                  ? '<span class="done-pill">✓ Done</span>'
                  : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>'}
            </div>
          </div>
          ${conflictNote}
          ${reason ? `<div class="reason-text">🧠 ${reason}${modNote ? '<br>' + modNote : ''}</div>` : ''}
          ${!editDaysMode && isDone && expandedHist === sessionKey ? buildInlineLog(log, sessionKey) : ''}
        </div>
        ${menuHTML}`;
    } else {
      const typeLabel = ballet.type ? DTYPE_LABELS[ballet.type] : '';
      const clickAct  = editDaysMode ? `openEditDayMenu(${i})` : '';
      return `
        <div class="day-card${editDaysMode ? ' editable' : ''}"${editDaysMode ? ` onclick="${clickAct}"` : ''}>
          <div class="day-card-hdr">
            <div>
              <div class="sm b5" style="color:var(--tx3)">${day}</div>
              <div class="day-meta">${typeLabel || 'Not scheduled'}</div>
            </div>
            <span class="rest-pill">${editDaysMode ? 'Tap to assign' : ballet.type === 'perf' ? '🎭 Perf' : ballet.type === 'off' ? 'Rest' : 'No gym'}</span>
          </div>
        </div>
        ${menuHTML}`;
    }
  }).join('');

  const actionRow = editDaysMode ? '' : `
    <div style="padding:0 16px 8px;display:flex;gap:8px">
      <button class="btn-g" style="flex:1;text-align:center" onclick="editPlan()">← Edit schedule</button>
      <button class="btn-g" style="flex:1;text-align:center" onclick="enterEditDays()">✏️ Edit days</button>
    </div>`;

  return `
    ${editBar}
    ${!editDaysMode ? summary : ''}
    <div class="week-grid">${dayCards}</div>
    ${actionRow}
    <div class="bpad"></div>`;
}

// ── Weekly summary card ────────────────────────────────────
function buildWeekSummary(wk) {
  const logs = Object.values(wk.logs || {});
  const planned = Object.values(wk.plan?.assigned || {}).filter(v => v !== null).length;
  const done    = logs.length;
  if (done === 0 && planned === 0) return '';

  const totalLoad = logs.reduce((s, l) => s + (l.sRPE || 0), 0);
  const logsWithFeel = logs.filter(l => l.feel);
  const avgFeel = logsWithFeel.length > 0
    ? (logsWithFeel.reduce((s, l) => s + l.feel, 0) / logsWithFeel.length).toFixed(1) : null;
  const logsWithAcc = logs.filter(l => l.accuracy?.rate !== undefined);
  const avgAcc = logsWithAcc.length > 0
    ? Math.round(logsWithAcc.reduce((s, l) => s + l.accuracy.rate, 0) / logsWithAcc.length) : null;

  const statCell = (val, lbl) => `
    <div class="week-sum-stat">
      <div class="week-sum-val${val === '—' ? ' dim' : ''}">${val}</div>
      <div class="week-sum-lbl">${lbl}</div>
    </div>`;

  const alert = totalLoad > 0 ? getLoadAlert(totalLoad) : null;
  const alertHTML = alert ? `
    <div class="week-sum-alert ${alert.level}">
      <strong>${alert.level === 'warn' ? '⚠ Load spike' : '📈 Load rising'}</strong>
      This week's load is ${Math.round((alert.ratio - 1) * 100)}% above the 4-week average. Monitor recovery closely.
    </div>` : '';

  return `
    <div class="week-sum-card">
      <div class="week-sum-title">Week at a glance</div>
      <div class="week-sum-grid">
        ${statCell(done + '/' + planned, 'sessions')}
        ${statCell(totalLoad > 0 ? totalLoad.toLocaleString() : '—', 'load AU')}
        ${statCell(avgFeel !== null ? avgFeel : '—', 'avg feel')}
        ${statCell(avgAcc !== null ? avgAcc + '%' : '—', 'accuracy')}
      </div>
      ${alertHTML}
    </div>`;
}

// ── ACWR load alert ────────────────────────────────────────
function getLoadAlert(currentWeekLoad) {
  const recentLoads = [];
  for (let w = 1; w <= 4; w++) {
    const m = new Date(viewMonday);
    m.setDate(m.getDate() - w * 7);
    const wk = weeks[weekKey(m)];
    if (wk) {
      const load = Object.values(wk.logs || {}).reduce((s, l) => s + (l.sRPE || 0), 0);
      if (load > 0) recentLoads.push(load);
    }
  }
  if (recentLoads.length < 2) return null;
  const avg   = recentLoads.reduce((s, v) => s + v, 0) / recentLoads.length;
  const ratio = currentWeekLoad / avg;
  if (ratio > 1.25) return { level: 'warn', ratio, avg };
  if (ratio > 1.15) return { level: 'note', ratio, avg };
  return null;
}

function assignDaySession(dayIdx, sessionKey) {
  const wk = getWeek(viewMonday);
  if (sessionKey) {
    wk.plan.assigned[sessionKey] = dayIdx;
  } else {
    Object.keys(wk.plan.assigned).forEach(sk => { if (wk.plan.assigned[sk] === dayIdx) wk.plan.assigned[sk] = null; });
  }

function getModNote(ballet) {
  if (!ballet.type) return '';
  if (ballet.type === 'perf') return '⚠️ Performance day — gym not recommended.';
  if (ballet.type === 'off')  return '';
  const hrs  = Math.max(parseFloat(ballet.hours) || 0, 0.5);
  const int  = ballet.intensity || 3;
  const lowerLoad = ballet.type === 'per' ? int * hrs * 0.8 : int * hrs * 0.5;
  const upperLoad = ballet.type === 'per' ? int * hrs * 0.2 : int * hrs * 0.4;
  const dom = Math.max(lowerLoad, upperLoad);
  if (dom >= 6) return '⚠️ Heavy ballet load — halve sets, keep RPE. Gym minimum 4h after class.';
  if (dom >= 3) return 'Moderate load — monitor RPE. Gym after class.';
  return '';
}
function editPlan() { const wk = getWeek(viewMonday); wk.plan = null; saveWeeks(); renderSchedule(); }
function toggleHistEntry(key) { expandedHist = expandedHist === key ? null : key; renderSchedule(); }

// ── Inline log summary (in week view) ─────────────────────
function buildInlineLog(log, sessionKey) {
  if (!log) return '';
  const sess = PROG.sessions[sessionKey];
  const exLines = (log.exLogs || []).map((el, i) => {
    const ex = sess?.exercises?.[i];
    const name = ex?.name || `Exercise ${i+1}`;
    const cnt  = ex?.sides
      ? (el.setsR?.length || 0) + (el.setsL?.length || 0)
      : (el.sets?.length || 0);
    const fmt  = countAndFmt(el, ex);
    return `<div class="hex">${name}: <span>${cnt} sets${fmt !== '—' ? ' — ' + fmt : ''}</span></div>`;
  }).join('');
  const acc = log.accuracy;
  const ac  = acc ? (acc.level === 'good' ? 'var(--gn)' : acc.level === 'warn' ? 'var(--co)' : 'var(--am)') : 'var(--tx3)';
  const sRPENote = log.sRPE ? `<div class="xs dimmer mt1">sRPE ${log.sRPE} AU · ${log.duration} min</div>` : '';
  return `
    <div style="padding:0 14px 12px;border-top:1px solid var(--bd)">
      ${exLines}
      ${sRPENote}
      ${acc ? `<div style="margin-top:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;border-left:2px solid ${ac}">
        <div class="xs b6" style="color:${ac}">${acc.verdict}</div>
        <div class="xs dimmer mt1">${acc.detail}</div>
      </div>` : ''}
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-g" style="flex:1;text-align:center;font-size:12px" onclick="openEditLog('${sessionKey}',event)">Edit log</button>
        <button class="del-btn" onclick="promptDel('${sessionKey}',event)">Delete</button>
      </div>
    </div>`;
}

                       ex.sides ? { setsR: [], setsL: [] } : { sets: [] }),

function renderLogFlow() {

}
function backToSchedule() { lf = null; expandedHist = null; renderSchedule(); }

// ── Pre-session check-in ───────────────────────────────────
function buildPreSession() {
  const sess   = PROG.sessions[lf.sessionKey];
  const tags   = PROG.tags;
  const recTags = Object.entries(tags).filter(([, t]) => t.group === 'rec');
  const cauTags = Object.entries(tags).filter(([, t]) => t.group === 'cau' || t.group === 'warn');
  const count  = lf.tags.length;
  const hasWarn = lf.tags.includes('sharp_pain');

  // Tag limit raised to 3
  const tagBtn = (key, tag) => {
    const isOn = lf.tags.includes(key);
    const cls  = isOn ? (tag.group === 'rec' ? 'rec' : tag.group === 'warn' ? 'wrn' : 'cau') : '';
    const dis  = !isOn && count >= 3;
    return `<button class="tag${cls ? ' ' + cls : ''}" onclick="toggleTag('${key}')"${dis ? ' style="opacity:.35;pointer-events:none"' : ''}>${tag.emoji} ${tag.label}</button>`;
  };

  // Passive injury notice — informational only, never blocks
  const activeInj = injuries.filter(inj => inj.status !== 'resolved');
  const injNotice = activeInj.length > 0 ? `
    <div class="ndim"><strong>Active injury flags</strong>
      ${activeInj.map(inj =>
        `<div class="xs mt1" style="color:${SEVERITY_COLORS[inj.severity]||'var(--co)'}">● ${inj.region} — ${SEVERITY_LABELS[inj.severity]}</div>`
      ).join('')}
      <div class="xs dimmer mt1">For context only — update status in the Body tab.</div>
    </div>` : '';

  const modPrev = count > 0 ? buildModPreview() : '';

  return `
    <div style="padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between">
      <button class="btn-back" onclick="backToSchedule()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        Back
      </button>
      <button class="btn-skip" onclick="skipPresession()">Skip check-in →</button>
    </div>
    <div style="padding:0 16px 4px" class="row">
      <span class="badge ${SESS_BADGE[lf.sessionKey] || 'bpre'}" style="display:inline-flex">${SESS_LABEL[lf.sessionKey] || lf.sessionKey}</span>
      <span class="sm b5">${sess.name}</span>
    </div>
    <div class="sec" style="padding-top:12px">Pre-session check-in</div>
    ${injNotice}
    <div class="card"><div class="card-body">
      <div class="tag-grp-lbl">Recovery</div>
      <div class="tags-wrap">${recTags.map(([k, t]) => tagBtn(k, t)).join('')}</div>
      <div class="tag-grp-lbl">Caution</div>
      <div class="tags-wrap">${cauTags.map(([k, t]) => tagBtn(k, t)).join('')}</div>
      <div class="xs dimmer">${count > 0 ? count + '/3 selected — tap to deselect' : 'Select up to 3 · or skip'}</div>
    </div></div>
    ${hasWarn ? `<div class="nred"><strong>🚨 Sharp / acute pain flagged</strong>Do not train through sharp pain. Requires physiotherapist assessment before loading this pattern again.</div>` : ''}
    ${modPrev}
    ${count > 0 && !hasWarn ? `<div style="padding:0 16px 8px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-p" onclick="acceptMods()">Accept modifications & begin →</button>
      <button class="btn-g" style="width:100%;text-align:center" onclick="skipPresession()">Train as prescribed</button>
    </div>` : hasWarn ? `<div style="padding:0 16px 8px"><button class="btn-g" style="width:100%;text-align:center" onclick="skipPresession()">Proceed anyway (not recommended)</button></div>` : ''}
    <div class="bpad"></div>`;
}

function buildModPreview() {
  const mods = computeMods(lf.tags, lf.sessionKey);
  const sess = PROG.sessions[lf.sessionKey];
  const lines = [];
  sess.exercises.forEach((ex, i) => {
    const m = mods.exMods[i]; const parts = [];
    if (m.setReduction > 0) parts.push(`→ ${m.adjSets} sets (was ${ex.sets})`);
    if (m.notes.length) parts.push(...m.notes);
    if (mods.globalRPECap && (ex.type === 'loaded' || ex.type === 'bodyweight')) parts.push(`cap RPE ${mods.globalRPECap}`);
    if (parts.length) lines.push(`<div class="mod-line"><strong>${ex.name}</strong> — ${parts.join(' · ')}</div>`);
  });
  if (!lines.length) return '';
  return `<div class="card"><div class="card-body"><div class="mod-box"><div class="mod-title">Today's modifications</div>${lines.join('')}</div></div></div>`;
}

function toggleTag(key) {
  const idx = lf.tags.indexOf(key);
  if (idx > -1) lf.tags.splice(idx, 1);
  else if (lf.tags.length < 3) lf.tags.push(key);  // limit raised to 3
  renderSchedule();
}
function acceptMods() {
  lf.mods = computeMods(lf.tags, lf.sessionKey);
  lf.modsAccepted = true;
  savePresession();
  lf.step = 'logging';
  renderSchedule();
}
function skipPresession() {
  lf.mods = null; lf.modsAccepted = false;
  savePresession();
  lf.step = 'logging';
  renderSchedule();
}
function savePresession() {
  if (lf.presessionSaved || lf.isEdit || lf.tags.length === 0) return;
  const entry = {
    id: Date.now().toString(), type: 'presession', date: new Date().toISOString(),
    sessionKey: lf.sessionKey, tags: [...lf.tags], modsAccepted: lf.modsAccepted,
    sessionNotes: lf.tags.map(t => PROG.tags[t]?.note).filter(Boolean)
  };
  const wk = getWeek(viewMonday);
  if (!wk.presessionLogs) wk.presessionLogs = [];
  wk.presessionLogs.push(entry);
  lf.presessionSaved = true;
  saveWeeks();
}

// ── Log session ────────────────────────────────────────────
function buildLogSession() {
  const sess = PROG.sessions[lf.sessionKey];

  // Previous week reference
  const prevMon = new Date(viewMonday); prevMon.setDate(prevMon.getDate() - 7);
  const prevLog = weeks[weekKey(prevMon)]?.logs?.[lf.sessionKey];

  const warmupCard = buildWarmupCard(sess);

  const exCards = sess.exercises.map((ex, i) => {
    const exLog    = lf.exLogs[i];
    const isOpen   = lf.openEx === i;
    const mod      = lf.mods?.exMods?.[i];
    const adjSets  = mod?.adjSets ?? ex.sets;
    const prevEx   = prevLog?.exLogs?.[i];

    // Previous reference — handles sided and all types
    let prevRef = '';
    if (prevEx) {
      if (ex.sides) {
        const rParts = (prevEx.setsR || []).map(s => fmtSet(s, ex)).filter(v => v !== '—');
        const lParts = (prevEx.setsL || []).map(s => fmtSet(s, ex)).filter(v => v !== '—');
        if (rParts.length || lParts.length) prevRef = `R: ${rParts.join(' ') || '—'} / L: ${lParts.join(' ') || '—'}`;
      } else {
        const parts = (prevEx.sets || []).map(s => fmtSet(s, ex)).filter(v => v !== '—');
        prevRef = parts.join('  ');
      }
    }

    const loggedCount = ex.sides
      ? (exLog.setsR?.length || 0) + (exLog.setsL?.length || 0)
      : (exLog.sets?.length || 0);
    const modNote = mod && mod.setReduction > 0
      ? `<div class="xs" style="color:var(--am);margin-top:2px">↓ ${adjSets} sets today</div>` : '';

    return `
    <div class="card">
      <div class="ex-hdr${isOpen ? ' open' : ''}" onclick="toggleEx(${i})">
        <div style="flex:1;min-width:0">
          <div class="sm b5">${ex.name}</div>
          <div class="xs dimmer mt1">${ex.prescribed} · RPE ${ex.rpe}${loggedCount ? ' · ' + loggedCount + ' logged' : ''}</div>
          ${modNote}
          ${prevRef && !isOpen ? `<div class="xs mt1 mono" style="color:var(--tx3);font-size:10px">↩ ${prevRef}</div>` : ''}
        </div>
        <svg class="chev${isOpen ? ' open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isOpen ? `<div class="ex-body">
        ${prevRef ? `<div class="xs mono mb1" style="color:var(--tx3);padding:5px 8px;background:var(--bg2);border-radius:6px;font-size:10px">↩ Last: ${prevRef}</div>` : ''}
        ${ex.note ? `<div class="xs dimmer mb1" style="line-height:1.4;font-size:11px;padding:4px 0">${ex.note}</div>` : ''}
        ${buildSetRowsNew(ex, exLog, i, adjSets)}
      </div>` : ''}
    </div>`;
  }).join('');

  const feelBtns = [1,2,3,4,5].map(v =>
    `<button class="rbtn${lf.feel === v ? ' on' : ''}" onclick="lf.feel=${v};renderSchedule()">${v}</button>`
  ).join('');

  const sRPE = lf.duration > 0 ? lf.feel * 2 * lf.duration : null;
  const durationBtn = `
    <div class="srpe-row">
      <button class="srpe-btn" onclick="openDurationPicker()">
        ${lf.duration > 0
          ? `<span class="srpe-val">${lf.duration}</span><span class="srpe-unit">min</span>`
          : '<span class="val-btn-empty">Set duration</span>'}
      </button>
      <span class="srpe-note">${sRPE !== null ? `sRPE: <strong style="color:var(--tx)">${sRPE}</strong> AU` : 'Session RPE × duration = training load'}</span>
    </div>`;

  return `
    <div style="padding:12px 16px 8px;display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="${lf.isEdit ? 'backToSchedule()' : 'lf.step=\'presession\';renderSchedule()'}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        ${lf.isEdit ? 'Cancel' : 'Back'}
      </button>
      <span class="badge ${SESS_BADGE[lf.sessionKey] || 'bpre'}">${SESS_LABEL[lf.sessionKey] || lf.sessionKey}</span>
      <span class="sm b5">${sess.name}</span>
    </div>
    ${warmupCard}
    ${exCards}
    <div class="card"><div class="card-body">
      <div class="lbl">Overall session feel</div>
      <div class="rating">${feelBtns}</div>
      <div class="xs dimmer mt1" style="text-align:center">1 = Struggled · 3 = Expected · 5 = Strong</div>
      <div class="lbl" style="margin-top:12px">Session duration (for training load)</div>
      ${durationBtn}
    </div></div>
    <div class="card"><div class="card-body">
      <div class="lbl">Notes (optional)</div>
      <textarea placeholder="Anything notable..." oninput="lf.notes=this.value">${lf.notes}</textarea>
    </div></div>
    <div style="padding:0 16px 8px">
      <button class="btn-p" onclick="completeLog()">Save Session ✓</button>
    </div>
    <div class="bpad"></div>`;
}

// ── Warm-up card ───────────────────────────────────────────
function buildWarmupCard(sess) {
  if (!sess.warmup?.length) return '';
  const isOpen = lf.warmupOpen;
  const items  = sess.warmup.map(w => `
    <div class="warmup-item">
      <div class="warmup-name">${w.name}</div>
      <div class="warmup-pre">${w.prescription}</div>
      ${w.note ? `<div class="warmup-note">${w.note}</div>` : ''}
    </div>`).join('');
  return `
    <div class="card warmup-card">
      <div class="ex-hdr${isOpen ? ' open' : ''}" onclick="lf.warmupOpen=!lf.warmupOpen;renderSchedule()">
        <div style="flex:1">
          <div class="sm b5" style="color:var(--am)">▷ Warm-Up Sequence</div>
          <div class="xs dimmer mt1">${sess.warmup.length} movements · ${isOpen ? 'tap to collapse' : 'tap to expand'}</div>
        </div>
        <svg class="chev${isOpen ? ' open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isOpen ? `<div class="ex-body">${items}</div>` : ''}

// ── Set rows ───────────────────────────────────────────────
function buildSetRowsNew(ex, exLog, exIdx, adjSets) {
  // Sided exercises render two independent R / L sub-sections
  if (ex.sides) return buildSidedRows(ex, exLog, exIdx, adjSets);

  // Column header for non-sided exercises
  const colLbls = ex.type === 'loaded'
    ? ['REPS','KG','RPE']
    : ex.type === 'bodyweight' ? ['REPS','RPE']
    : ex.type === 'timed' || ex.type === 'carry' ? ['SEC','RPE']
    : ex.type === 'jump' ? (ex.measureLabel === 'cm' ? ['CM','QUAL','RPE'] : ['QUAL','RPE'])
    : null;

  const head = colLbls
    ? `<div class="xs dimmer mono mb1" style="display:flex;gap:5px;padding-left:27px">${colLbls.map(l => `<div style="flex:1;text-align:center">${l}</div>`).join('')}</div>`
    : `<div class="xs dimmer mt1 mb1" style="padding-left:4px">Prescribed: ${ex.prescribed}</div>`;

  const sets  = exLog.sets || [];
  const rows  = sets.map((set, si) => buildSetRow(ex, set, exIdx, si, null)).join('');
  const canAdd = sets.length < adjSets + 2;

  return head + rows + (canAdd ? `<button class="btn-d" onclick="addSet(${exIdx},null)">+ Add Set</button>` : '');
}

function buildSidedRows(ex, exLog, exIdx, adjSets) {
  const halves = [
    { key: 'setsR', label: 'R', cls: 'r', color: 'var(--am)' },
    { key: 'setsL', label: 'L', cls: 'l', color: 'var(--bl)' }
  ];
  return halves.map(({ key, label, cls, color }) => {
    const sets   = exLog[key] || [];
    const rows   = sets.map((set, si) => buildSetRow(ex, set, exIdx, si, label)).join('');
    const canAdd = sets.length < adjSets + 2;
    return `
      <div class="sided-half">
        <span class="sided-lbl ${cls}">${label}</span>
        ${rows}
        ${canAdd ? `<button class="btn-d" onclick="addSet(${exIdx},'${label}')">+ Add ${label}</button>` : ''}
      </div>`;
  }).join('<div class="sided-sep"></div>');
}

function buildSetRow(ex, set, exIdx, si, side) {
  const sideArg = side ? `,'${side}'` : ',null';
  const oi = `openPicker`;

  if (ex.type === 'plyo') {
    // plyo is never sided — no sideArg needed
    return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        <button class="plyo-done${set.done ? ' done' : ''}" onclick="updSet(${exIdx},${si},'done',${!set.done});renderSchedule()">${set.done ? '✓ Done' : 'Tap to mark done'}</button>
      </div>`;
  }
  if (ex.type === 'jump') {
    const usesCm = ex.measureLabel === 'cm';
    return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        ${usesCm ? `
          <button class="val-btn" onclick="${oi}('cm',${exIdx},${si}${sideArg})" style="flex:1">
            ${set.height !== undefined && set.height !== ''
              ? `<span class="val-btn-num">${set.height}</span><span class="val-btn-unit">cm</span>`
              : '<span class="val-btn-empty">Height</span>'}
          </button>` : ''}
        <button class="val-btn" onclick="${oi}('quality',${exIdx},${si}${sideArg})" style="flex:${usesCm ? '0 0 78px' : '1'}">
          ${set.quality ? `<span class="val-btn-num">${set.quality}</span><span class="val-btn-unit">Q</span>` : '<span class="val-btn-empty">Quality</span>'}
        </button>
        <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sideArg})" style="flex:0 0 62px">
          ${set.rpe ? `<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>` : '<span class="val-btn-empty">RPE</span>'}
        </button>
      </div>`;
  }
  if (ex.type === 'loaded') {
    return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        <button class="val-btn" onclick="${oi}('reps',${exIdx},${si}${sideArg})" style="flex:1">
          ${set.reps ? `<span class="val-btn-num">${set.reps}</span><span class="val-btn-unit">reps</span>` : '<span class="val-btn-empty">Reps</span>'}
        </button>
        <button class="val-btn" onclick="${oi}('weight',${exIdx},${si}${sideArg})" style="flex:1">
          ${set.weight !== undefined && set.weight !== '' ? `<span class="val-btn-num">${set.weight}</span><span class="val-btn-unit">kg</span>` : '<span class="val-btn-empty">kg</span>'}
        </button>
        <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sideArg})" style="flex:0 0 62px">
          ${set.rpe ? `<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>` : '<span class="val-btn-empty">RPE</span>'}
        </button>
      </div>`;
  }
  if (ex.type === 'bodyweight') {
    return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        <button class="val-btn" onclick="${oi}('reps',${exIdx},${si}${sideArg})" style="flex:1">
          ${set.reps ? `<span class="val-btn-num">${set.reps}</span><span class="val-btn-unit">reps</span>` : '<span class="val-btn-empty">Reps</span>'}
        </button>
        <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sideArg})" style="flex:0 0 62px">
          ${set.rpe ? `<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>` : '<span class="val-btn-empty">RPE</span>'}
        </button>
      </div>`;
  }
  // timed / carry
  return `
    <div class="set-row">
      <div class="set-n">${si+1}</div>
      <button class="val-btn" onclick="${oi}('sec',${exIdx},${si}${sideArg})" style="flex:1">
        ${set.dur ? `<span class="val-btn-num">${set.dur}</span><span class="val-btn-unit">sec</span>` : '<span class="val-btn-empty">Sec</span>'}
      </button>
      <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sideArg})" style="flex:0 0 62px">
        ${set.rpe ? `<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>` : '<span class="val-btn-empty">RPE</span>'}
      </button>
    </div>`;
}

function toggleEx(i)  { lf.openEx = lf.openEx === i ? null : i; renderSchedule(); }

function addSet(exIdx, side) {
  const ex = PROG.sessions[lf.sessionKey].exercises[exIdx];
  const empty = ex.type === 'jump'    ? { height: '', quality: '', rpe: '' }
    : ex.type === 'plyo'              ? { done: false }
    : ex.type === 'timed' || ex.type === 'carry' ? { dur: '', rpe: '' }
    : ex.type === 'bodyweight'        ? { reps: '', rpe: '' }
    : { reps: '', weight: '', rpe: '' };

  if (side) {
    const key = side === 'R' ? 'setsR' : 'setsL';
    if (!lf.exLogs[exIdx][key]) lf.exLogs[exIdx][key] = [];
    lf.exLogs[exIdx][key].push({ ...empty });
  } else {
    if (!lf.exLogs[exIdx].sets) lf.exLogs[exIdx].sets = [];
    lf.exLogs[exIdx].sets.push({ ...empty });
  }
  renderSchedule();
}

// plyo toggle (always flat sets, never sided)
function updSet(ei, si, field, val) { lf.exLogs[ei].sets[si][field] = val; }

// ── Complete log ───────────────────────────────────────────
function completeLog() {
  const acc  = computeAccuracy(lf.exLogs, lf.sessionKey, lf.mods);
  const sRPE = lf.duration > 0 ? lf.feel * 2 * lf.duration : null;
  const entry = {
    id: Date.now().toString(), type: 'training',
    date: new Date().toISOString(), sessionKey: lf.sessionKey,
    exLogs: lf.exLogs, feel: lf.feel, duration: lf.duration || null,
    sRPE, notes: lf.notes, accuracy: acc, tags: [...lf.tags], mods: lf.mods
  };
  const wk = getWeek(viewMonday);
  wk.logs[lf.sessionKey] = entry;
  lf.accuracy = acc;
  saveWeeks();
  lf.step = 'accuracy';
  renderSchedule();
}

function buildAccuracyScreen() {
  const acc = lf.accuracy;
  const cls = acc.level === 'good' ? 'good' : acc.level === 'warn' ? 'warn' : 'note';
  const sRPE = lf.duration > 0 ? lf.feel * 2 * lf.duration : null;

      ${sRPE ? `<div class="acc-stat" style="margin-top:3px">Training load: ${sRPE} AU (${lf.feel * 2} RPE × ${lf.duration} min)</div>` : ''}
    </div>
