function promptDel(sessionKey, e) { e.stopPropagation(); confirmDel = sessionKey; renderSchedule(); }

// ═══════════════════════════════════════════════════════════
// TOUCH PICKER — JS-driven, reliable in iOS fixed overlays
// ═══════════════════════════════════════════════════════════
const ITEM_H   = 44;
const VIEW_H   = 264;
const CENTER_Y = Math.floor((VIEW_H - ITEM_H) / 2);

let pickerCtx = null;
const PICKER_RANGES = {
  reps:    { items: Array.from({length:30},  (_, i) => i + 1),       label: 'Reps' },
  weight:  { items: Array.from({length:201}, (_, i) => i),            label: 'kg' },
  rpe:     { items: Array.from({length:10},  (_, i) => i + 1),       label: 'RPE' },
  sec:     { items: Array.from({length:120}, (_, i) => (i + 1) * 5), label: 'Seconds' },
  cm:      { items: Array.from({length:31},  (_, i) => i * 5),       label: 'cm' },
  quality: { items: [1, 2, 3, 4, 5],                                  label: 'Quality' },
  min:     { items: Array.from({length:34},  (_, i) => (i + 3) * 5), label: 'min' }
};

let pt = { startY:0, startOff:0, offset:0, idx:0, items:[], dragging:false, vel:0, lastY:0, lastT:0 };

function idxToOffset(idx) { return CENTER_Y - idx * ITEM_H; }
function offsetToIdx(offset, len) { return Math.max(0, Math.min(Math.round((CENTER_Y - offset) / ITEM_H), len - 1)); }

function _showPicker(range, startIdx) {
  document.getElementById('picker-cols').innerHTML = `
    <div style="flex:1">
      <div class="picker-col-lbl">${range.label}</div>
      <div class="picker-col" id="pc-main">
        <div class="picker-viewport">
          <div class="picker-list" id="picker-list">
            ${range.items.map(v => `<div class="picker-item">${v}</div>`).join('')}
          </div>
        </div>
        <div class="picker-mask-t"></div>
        <div class="picker-mask-b"></div>
        <div class="picker-line"></div>
      </div>
    </div>`;

  pt.items = range.items; pt.idx = startIdx;
  pt.offset = idxToOffset(startIdx); pt.dragging = false; pt.vel = 0;

  const list = document.getElementById('picker-list');
  list.style.transform = `translateY(${pt.offset}px)`;
  _pickerHighlight();

  const vp = document.querySelector('#pc-main .picker-viewport');
  vp.addEventListener('touchstart',  _ptStart, { passive: false });
  vp.addEventListener('touchmove',   _ptMove,  { passive: false });
  vp.addEventListener('touchend',    _ptEnd,   { passive: false });
  vp.addEventListener('touchcancel', _ptEnd,   { passive: false });

  document.getElementById('picker-overlay').style.display = 'flex';
}

function openPicker(field, exIdx, si, side) {
  pickerCtx = { field, exIdx, si, side: side || null };
  const range  = PICKER_RANGES[field];
  const storeKey = field === 'sec' ? 'dur' : field === 'cm' ? 'height' : field;

  // Smart start: current value → previous set value → sensible default
  let startVal = null;
  if (exIdx >= 0) {
    const exLog = lf.exLogs[exIdx];
    const setsArr = side
      ? (side === 'R' ? exLog.setsR : exLog.setsL)
      : exLog.sets;
    const curSet = setsArr?.[si];
    if (curSet && curSet[storeKey] !== undefined && curSet[storeKey] !== '') {
      startVal = Number(curSet[storeKey]);
    } else if (si > 0) {
      const prev = setsArr?.[si - 1];
      if (prev && prev[storeKey] !== undefined && prev[storeKey] !== '') startVal = Number(prev[storeKey]);
    }
  }
  const defaults = { rpe: 6, reps: 4, weight: 19, quality: 3, cm: 10, sec: 5, min: 8 };
  const startIdx = startVal !== null
    ? Math.max(0, range.items.indexOf(startVal))
    : (defaults[field] !== undefined ? defaults[field] : 0);

  document.getElementById('picker-label').textContent = range.label;
  _showPicker(range, startIdx);
}

function openDurationPicker() {
  pickerCtx = { field: 'min', exIdx: -1, si: -1, side: null };
  const range     = PICKER_RANGES.min;
  const startVal  = lf.duration || 45;
  let startIdx    = range.items.indexOf(startVal);
  if (startIdx < 0) startIdx = range.items.indexOf(45);
  if (startIdx < 0) startIdx = 8;
  document.getElementById('picker-label').textContent = 'Duration';
  _showPicker(range, startIdx);
}

function _ptStart(e) {
  e.preventDefault();
  pt.dragging = true; pt.startY = e.touches[0].clientY;
  pt.startOff = pt.offset; pt.vel = 0;
  pt.lastY = pt.startY; pt.lastT = Date.now();
}
function _ptMove(e) {
  e.preventDefault();
  if (!pt.dragging) return;
  const y = e.touches[0].clientY, now = Date.now();
  pt.vel = (y - pt.lastY) / Math.max(1, now - pt.lastT);
  pt.lastY = y; pt.lastT = now;
  let off = pt.startOff + (y - pt.startY);
  const maxOff = idxToOffset(0), minOff = idxToOffset(pt.items.length - 1);
  if (off > maxOff) off = maxOff + (off - maxOff) * 0.25;
  if (off < minOff) off = minOff + (off - minOff) * 0.25;
  pt.offset = off;
  const list = document.getElementById('picker-list');
  if (list) list.style.transform = `translateY(${off}px)`;
  pt.idx = offsetToIdx(off, pt.items.length);
  _pickerHighlight();
}
function _ptEnd(e) {
  e.preventDefault();
  if (!pt.dragging) return;
  pt.dragging = false;
  let snapIdx = offsetToIdx(pt.offset + pt.vel * 80, pt.items.length);
  snapIdx = Math.max(0, Math.min(snapIdx, pt.items.length - 1));
  pt.idx = snapIdx; pt.offset = idxToOffset(snapIdx);
  const list = document.getElementById('picker-list');
  if (list) {
    list.style.transition = 'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';
    list.style.transform  = `translateY(${pt.offset}px)`;
    setTimeout(() => { if (list) list.style.transition = ''; }, 250);
  }
  _pickerHighlight();
}
function _pickerHighlight() {
  document.querySelectorAll('.picker-item').forEach((el, i) => el.classList.toggle('sel', i === pt.idx));
}

function pickerDone() {
  if (!pickerCtx) { closePicker(); return; }
  const val = pt.items[pt.idx];
  const { field, exIdx, si, side } = pickerCtx;

  if (exIdx === -1) {
    // Duration picker
    lf.duration = val;
    closePicker(); renderSchedule(); return;
  }

  const storeKey = field === 'sec' ? 'dur' : field === 'cm' ? 'height' : field;
  const exLog    = lf.exLogs[exIdx];

  if (side) {
    const setsArr = side === 'R' ? exLog.setsR : exLog.setsL;
    if (setsArr?.[si] !== undefined) setsArr[si][storeKey] = val;
  } else {
    if (exLog.sets?.[si] !== undefined) exLog.sets[si][storeKey] = val;
  }
  closePicker(); renderSchedule();
}

function closePicker() {
  document.getElementById('picker-overlay').style.display = 'none';
  const vp = document.querySelector('#pc-main .picker-viewport');
  if (vp) {
    vp.removeEventListener('touchstart',  _ptStart);
    vp.removeEventListener('touchmove',   _ptMove);
    vp.removeEventListener('touchend',    _ptEnd);
    vp.removeEventListener('touchcancel', _ptEnd);
  }
  pickerCtx = null;
}

// Backdrop tap closes picker — onclick="pickerBgClick(event)" on the overlay div
function pickerBgClick(e) {
  if (e.target === document.getElementById('picker-overlay')) closePicker();
}

// ═══════════════════════════════════════════════════════════
// MODS & ACCURACY
// ═══════════════════════════════════════════════════════════
function computeMods(tags, sessionKey) {
  const sess = PROG.sessions[sessionKey];
  const progTags = PROG.tags;
  let globalRPECap = null;
  const sessionNotes = tags.map(t => progTags[t]?.note).filter(Boolean);

  const exMods = sess.exercises.map(ex => {
    let setReduction = 0; const notes = [];
    tags.forEach(tagKey => {
      const tag = progTags[tagKey];
      if (!tag || tag.isWarning) return;
      if (tag.rpeCap) globalRPECap = globalRPECap ? Math.min(globalRPECap, tag.rpeCap) : tag.rpeCap;
      const aff = tag.affects || {};
      if (aff.ALL) setReduction = Math.max(setReduction, aff.ALL.setReduction || 0);
      ex.regions.forEach(r => {
        if (aff[r]) {
          setReduction = Math.max(setReduction, aff[r].setReduction || 0);
          if (aff[r].note) notes.push(aff[r].note);
        }
      });
    });
    return { setReduction, adjSets: Math.max(1, ex.sets - setReduction), notes, rpeCap: globalRPECap };
  });
  return { exMods, globalRPECap, sessionNotes };
}

function parseRPE(rpeStr) {
  const p = String(rpeStr).replace('–', '-').split('-').map(s => parseFloat(s.trim()));
  return p.length === 1 ? { min: p[0], max: p[0] } : { min: p[0], max: p[1] };
}

function computeAccuracy(exLogs, sessionKey, mods) {
  const sess = PROG.sessions[sessionKey];
  let totalP = 0, totalD = 0, rpeHigh = 0, rpeLow = 0;

  exLogs.forEach((el, i) => {
    const ex  = sess.exercises[i];
    if (!ex) return;
    const adj = mods?.exMods?.[i]?.adjSets ?? ex.sets;

    if (ex.sides) {
      totalP += adj * 2;
      totalD += (el.setsR?.length || 0) + (el.setsL?.length || 0);
    } else {
      totalP += adj;
      totalD += el.sets?.length || 0;
    }

    // RPE check: loaded, bodyweight, jump
    if (ex.type === 'loaded' || ex.type === 'bodyweight' || ex.type === 'jump') {
      const { min, max } = parseRPE(ex.rpe);
      const allSets = ex.sides
        ? [...(el.setsR || []), ...(el.setsL || [])]
        : (el.sets || []);
      allSets.forEach(s => {
        const r = parseFloat(s.rpe);
        if (!isNaN(r)) { if (r > max + 0.5) rpeHigh++; if (r < min - 1) rpeLow++; }
      });
    }
  });

  const rate = totalP > 0 ? totalD / totalP : 1;
  let verdict, detail, level;
  if (rate >= 0.9 && rpeHigh === 0 && rpeLow === 0) {
    verdict = 'Session on target'; level = 'good';
    detail  = 'Volume and intensity matched the prescription.';
  } else if (rpeHigh >= 2) {
    verdict = 'Intensity exceeded prescription'; level = 'warn';
    detail  = `${rpeHigh} set${rpeHigh > 1 ? 's' : ''} above prescribed RPE. Monitor recovery.`;
  } else if (rate < 0.75) {
    verdict = 'Volume incomplete'; level = 'note';
    detail  = `${totalD}/${totalP} sets completed. If fatigue-driven, note in next week's plan.`;
  } else if (rpeLow >= 3) {
    verdict = 'Session felt easy'; level = 'note';
    detail  = 'RPE consistently below target. Consider a small load increase.';
  } else {
    verdict = 'Session solid'; level = 'good';
    detail  = 'Minor deviations within acceptable range.';
  }
  return { verdict, detail, level, rate: Math.round(rate * 100), totalDone: totalD, totalPrescribed: totalP };
}

// ═══════════════════════════════════════════════════════════
// FORMAT HELPERS — used in inline logs, history, and summaries
// ═══════════════════════════════════════════════════════════
function fmtSet(s, ex) {
  if (!s || !ex) return '—';
  if (ex.type === 'plyo')    return s.done ? '✓' : '—';
  if (ex.type === 'jump') {
    const parts = [];
    if (s.height !== undefined && s.height !== '') parts.push(`${s.height}cm`);
    if (s.quality) parts.push(`Q${s.quality}`);
    if (s.rpe)     parts.push(`@${s.rpe}`);
    return parts.length ? parts.join(' ') : '—';
  }
  if (ex.type === 'timed' || ex.type === 'carry') return s.dur ? `${s.dur}s` : '—';
  if (ex.type === 'bodyweight') return s.reps ? `${s.reps}r @${s.rpe || '?'}` : '—';
  // loaded
  return s.reps
    ? `${s.reps}r · ${(s.weight !== undefined && s.weight !== '') ? s.weight : '?'}kg @${s.rpe || '?'}`
    : '—';
}

function countAndFmt(exLog, ex) {
  if (!exLog) return '—';
  if (ex?.sides) {
    const rStr = (exLog.setsR || []).map(s => fmtSet(s, ex)).join('  ');
    const lStr = (exLog.setsL || []).map(s => fmtSet(s, ex)).join('  ');
    return `R: ${rStr || '—'} / L: ${lStr || '—'}`;
  }
  const sets = exLog.sets || [];
  return sets.length ? sets.map(s => fmtSet(s, ex)).join('  ') : '—';
}

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('page-history');
  const allLogs = [];
  Object.entries(weeks).forEach(([wk, data]) => {
    Object.values(data.logs || {}).forEach(l  => allLogs.push({ ...l,  weekKey: wk }));
    (data.presessionLogs || []).forEach(l      => allLogs.push({ ...l,  weekKey: wk }));
  });
  allLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
  const filtered = histFilter === 'all' ? allLogs : allLogs.filter(l => l.type === histFilter);

  const filterRow = `
    <div class="hflt-row">
      <div class="hflt">
        ${[{k:'all',l:'All'},{k:'training',l:'Training'},{k:'presession',l:'Pre-Session'}].map(({k,l}) =>
          `<button class="flt${histFilter === k ? ' on' : ''}" onclick="setHFilter('${k}')">${l}</button>`
        ).join('')}
      </div>
      ${allLogs.some(l => l.type === 'training')
        ? `<button class="btn-g" style="font-size:11px;padding:6px 10px" onclick="exportCSV()">Export CSV</button>`
        : ''}
    </div>`;

  if (!filtered.length) {
    el.innerHTML = filterRow + `<div class="empty"><div class="emi">📊</div><div class="emt">No logs yet</div><div class="ems">Complete a session to see history</div></div>`;
    return;
  }
  el.innerHTML = filterRow + `<div class="sec">${filtered.length} log${filtered.length !== 1 ? 's' : ''}</div>${filtered.map(l => buildHistEntry(l)).join('')}<div class="bpad"></div>`;
}

function setHFilter(f) { histFilter = f; expandedHist = null; confirmDel = null; renderHistory(); }

function buildHistEntry(log) {
  const isExp   = expandedHist === log.id;
  const isTrain = log.type === 'training';
  const ds = new Date(log.date).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
  const ts = new Date(log.date).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

  const sessLabel = SESS_LABEL[log.sessionKey] || log.sessionKey || '?';
  const sessBadge = SESS_BADGE[log.sessionKey] || 'bpre';
  const dayBadge  = log.sessionKey ? `<span class="badge ${sessBadge}">${sessLabel}</span>` : '';
  const typeLabel = isTrain ? 'TRAINING LOG' : 'PRE-SESSION';

  const right = isTrain
    ? `<div style="text-align:right">
        <div class="xs dimmer mb1">Feel</div>
        <div class="mono b6" style="font-size:20px;color:${log.feel >= 4 ? 'var(--gn)' : log.feel <= 2 ? 'var(--co)' : 'var(--tx2)'}">${log.feel}<span style="font-size:11px;color:var(--tx3)">/5</span></div>
        ${log.sRPE ? `<div class="xs dimmer" style="margin-top:2px">${log.sRPE} AU</div>` : ''}
      </div>`
    : `<div class="xs dimmer">${log.tags?.length || 0} tag${log.tags?.length !== 1 ? 's' : ''}</div>`;

  let body = '';
  if (isExp) {
    if (isTrain) {
      const sess = PROG.sessions[log.sessionKey];
      const exLines = (log.exLogs || []).map((el, i) => {
        const ex   = sess?.exercises?.[i];
        const name = ex?.name || `Exercise ${i+1}`;
        const cnt  = ex?.sides
          ? (el.setsR?.length || 0) + (el.setsL?.length || 0)
          : (el.sets?.length || 0);
        const fmt  = countAndFmt(el, ex);
        return `<div class="hex">${name}: <span>${cnt} sets${fmt !== '—' ? ' — ' + fmt : ''}</span></div>`;
      }).join('');
      const acc = log.accuracy;
      const ac  = acc ? (acc.level === 'good' ? 'var(--gn)' : acc.level === 'warn' ? 'var(--co)' : 'var(--am)') : 'var(--tx3)';
      const sRPELine = log.sRPE
        ? `<div class="xs dimmer mt1">sRPE ${log.sRPE} AU · ${log.duration} min · Feel ${log.feel}/5</div>` : '';
      body = `<div class="hent-body">
        ${exLines}
        ${sRPELine}
        ${acc ? `<div style="margin-top:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;border-left:2px solid ${ac}">
          <div class="xs b6" style="color:${ac}">${acc.verdict}</div>
          <div class="xs dimmer mt1">${acc.detail}</div>
        </div>` : ''}
        ${log.notes ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);font-size:12px;color:var(--tx3);font-style:italic">${log.notes}</div>` : ''}
        ${confirmDel === log.id
          ? `<div class="del-conf">
              <button class="btn-g" style="flex:1;text-align:center;color:var(--rd)" onclick="doDelete('${log.id}','${log.weekKey}')">Confirm delete</button>
              <button class="btn-g" style="flex:1;text-align:center" onclick="confirmDel=null;renderHistory()">Cancel</button>
            </div>`
          : `<button class="del-btn" onclick="confirmDel='${log.id}';expandedHist='${log.id}';renderHistory()">Delete</button>`}
      </div>`;
    } else {
      const tList = (log.tags || []).map(t =>
        `<span class="tag ${PROG.tags[t]?.group === 'warn' ? 'wrn' : 'rec'}" style="margin:2px">${PROG.tags[t]?.emoji || ''} ${PROG.tags[t]?.label || t}</span>`
      ).join('');
      body = `<div class="hent-body">
        ${tList || '<div class="xs dimmer">No tags — check-in skipped.</div>'}
        ${(log.sessionNotes || []).map(n => `<div class="xs dimmer mt1">· ${n}</div>`).join('')}
        <div class="xs dimmer mt2">Mods ${log.modsAccepted ? 'accepted' : 'not applied'}</div>
        ${confirmDel === log.id
          ? `<div class="del-conf">
              <button class="btn-g" style="flex:1;text-align:center;color:var(--rd)" onclick="doDelete('${log.id}','${log.weekKey}')">Confirm delete</button>
              <button class="btn-g" style="flex:1;text-align:center" onclick="confirmDel=null;renderHistory()">Cancel</button>
            </div>`
          : `<button class="del-btn" onclick="confirmDel='${log.id}';expandedHist='${log.id}';renderHistory()">Delete</button>`}
      </div>`;
    }
  }

  return `
    <div class="hent">
      <div class="hent-hdr" onclick="expandedHist=expandedHist==='${log.id}'?null:'${log.id}';confirmDel=null;renderHistory()">
        <div>
          <div style="margin-bottom:5px"><span class="badge bpre" style="margin-right:4px">${typeLabel}</span>${dayBadge}</div>
          <div class="xs dimmer">${ds} · ${ts}</div>
        </div>
        ${right}
      </div>
      ${body}
    </div>`;
}

function doDelete(logId, wkKey) {
  const wk = weeks[wkKey];
  if (!wk) return;
  Object.keys(wk.logs || {}).forEach(k => { if (wk.logs[k].id === logId) delete wk.logs[k]; });
  if (wk.presessionLogs) wk.presessionLogs = wk.presessionLogs.filter(l => l.id !== logId);
  saveWeeks();
  confirmDel = null; expandedHist = null;
  renderHistory();
}

// ── CSV Export ─────────────────────────────────────────────
function exportCSV() {
  const rows = [
    ['Date','Week','Session','Type','Feel','Duration(min)','sRPE(AU)','Volume%','Verdict','Tags','Notes']
  ];
  Object.entries(weeks).forEach(([wk, data]) => {
    Object.values(data.logs || {}).forEach(log => {
      rows.push([
        new Date(log.date).toLocaleDateString('en-GB'),
        wk, log.sessionKey, log.type,
        log.feel ?? '',
        log.duration ?? '',
        log.sRPE ?? '',
        log.accuracy?.rate ?? '',
        (log.accuracy?.verdict || '').replace(/,/g, ';'),
        (log.tags || []).join(' | '),
        (log.notes || '').replace(/,/g, ';').replace(/\n/g, ' ')
      ]);
    });
  });
  const csv  = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `training-${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════
// BODY TAB — INJURY LOG
// ═══════════════════════════════════════════════════════════
function renderBody() {
  const el      = document.getElementById('page-body');
  const active  = injuries.filter(inj => inj.status !== 'resolved');
  const resolved = injuries.filter(inj => inj.status === 'resolved');

  const headerRow = `
    <div style="padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between">
      <span class="sm b6">Injury Log</span>
      ${!injuryFormOpen ? `<button class="btn-g" onclick="openInjuryForm()">+ Log injury</button>` : ''}
    </div>`;

  const formHTML = injuryFormOpen ? buildInjuryForm() : '';

  const activeSection = active.length > 0
    ? `<div class="sec">Active (${active.length})</div>${active.map(inj => buildInjuryEntry(inj)).join('')}`
    : !injuryFormOpen
      ? `<div class="ndim"><strong>No active injuries</strong>Log any pain, tightness, or concern here. Entries appear in the pre-session screen as passive reminders.</div>`
      : '';

  const resolvedSection = resolved.length > 0
    ? `<div class="sec">Resolved (${resolved.length})</div>${resolved.map(inj => buildInjuryEntry(inj)).join('')}`
    : '';

  el.innerHTML = headerRow + formHTML + activeSection + resolvedSection + '<div class="bpad"></div>';
}

function buildInjuryForm() {
  const d = injuryFormData;
  const regionChips = INJURY_REGIONS.map(r =>
    `<button class="inj-chip${d.region === r ? ' on' : ''}" onclick="injuryFormData.region='${r}';renderBody()">${r}</button>`
  ).join('');
  const sevBtns = [1,2,3,4,5].map(v =>
    `<button class="rbtn${d.severity === v ? ' on' : ''}" onclick="injuryFormData.severity=${v};renderBody()">${v}</button>`
  ).join('');
  const statusOpts = [
    { k:'active', l:'Active' }, { k:'monitoring', l:'Monitoring' }, { k:'resolved', l:'Resolved' }
  ].map(({ k, l }) =>
    `<button class="dtype-btn${d.status === k ? ' on-reh' : ''}" onclick="injuryFormData.status='${k}';renderBody()">${l}</button>`
  ).join('');

  return `
    <div class="card"><div class="card-body">
      <div class="field">
        <label class="lbl">Body region</label>
        <div class="inj-chips">${regionChips}</div>
      </div>
      <div class="field">
        <label class="lbl">Severity — 1 minor tightness · 5 acute, see physio</label>
        <div class="rating">${sevBtns}</div>
        <div class="xs dimmer mt1" style="text-align:center">${SEVERITY_LABELS[d.severity]}</div>
      </div>
      <div class="field">
        <label class="lbl">Status</label>
        <div class="dtype-row">${statusOpts}</div>
      </div>
      <div class="field">
        <label class="lbl">Description (location, onset, trigger)</label>
        <textarea placeholder="e.g. Left Achilles — tightness during relevés, started Tuesday after long rehearsal" oninput="injuryFormData.description=this.value">${d.description || ''}</textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-p" style="flex:1;margin:0" onclick="saveInjury()">Save</button>
        <button class="btn-g" style="flex:0 0 80px" onclick="closeInjuryForm()">Cancel</button>
      </div>
    </div></div>`;
}

function buildInjuryEntry(inj) {
  const isExp = injuryExpandedId === inj.id;
  const ds    = new Date(inj.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  const col   = SEVERITY_COLORS[inj.severity] || 'var(--tx3)';
  const sPill = inj.status === 'resolved'
    ? `<span class="inj-status-pill inj-status-resolved">resolved</span>`
    : inj.status === 'monitoring'
      ? `<span class="inj-status-pill inj-status-monitoring">monitoring</span>`
      : `<span class="inj-status-pill inj-status-active">active</span>`;

  return `
    <div class="hent">
      <div class="hent-hdr" onclick="injuryExpandedId=injuryExpandedId==='${inj.id}'?null:'${inj.id}';renderBody()">
        <div>
          <div class="sm b5" style="margin-bottom:3px">
            ${inj.region}
            <span style="font-size:11px;color:${col}">● ${SEVERITY_LABELS[inj.severity]}</span>
          </div>
          <div class="xs dimmer">${ds} · ${sPill}</div>
        </div>
        <svg class="chev${isExp ? ' open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isExp ? `<div class="hent-body">
        ${inj.description ? `<div class="xs" style="color:var(--tx2);margin-bottom:10px;line-height:1.5">${inj.description}</div>` : ''}
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${inj.status !== 'resolved'
            ? `<button class="btn-g" style="font-size:12px" onclick="resolveInjury('${inj.id}')">✓ Mark resolved</button>` : ''}
          <button class="btn-g" style="font-size:12px" onclick="editInjury('${inj.id}')">Edit</button>
          <button class="del-btn" onclick="deleteInjury('${inj.id}')">Delete</button>
        </div>
      </div>` : ''}
    </div>`;
}

function openInjuryForm() {
  injuryFormOpen = true; injuryEditId = null;
  injuryFormData = { region: '', severity: 3, description: '', status: 'active' };
  renderBody();
}
function editInjury(id) {
  const inj = injuries.find(i => i.id === id);
  if (!inj) return;
  injuryFormOpen = true; injuryEditId = id;
  injuryFormData = { region: inj.region, severity: inj.severity, description: inj.description, status: inj.status };
  renderBody();
}
function closeInjuryForm() {
  injuryFormOpen = false; injuryEditId = null; renderBody();
}
function saveInjury() {
  if (!injuryFormData.region) { alert('Please select a body region.'); return; }
  if (injuryEditId) {
    const idx = injuries.findIndex(i => i.id === injuryEditId);
    if (idx > -1) injuries[idx] = { ...injuries[idx], ...injuryFormData };
  } else {
    injuries.unshift({ id: Date.now().toString(), date: new Date().toISOString(), ...injuryFormData });
  }
  saveInjuries();
  injuryFormOpen = false; injuryEditId = null; renderBody();
}
function resolveInjury(id) {
  const inj = injuries.find(i => i.id === id);
  if (inj) { inj.status = 'resolved'; inj.resolvedDate = new Date().toISOString(); }
  saveInjuries(); renderBody();
}
function deleteInjury(id) {
  injuries = injuries.filter(i => i.id !== id);
  injuryExpandedId = null; saveInjuries(); renderBody();
}
