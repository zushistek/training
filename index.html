<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0d0d0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Ballet Training v1.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d0c;
  --bg2:     #161614;
  --bg3:     #1e1e1c;
  --bg4:     #272724;
  --border:  #2b2b28;
  --border2: #363633;
  --text:    #eeebe4;
  --text2:   #a6a29b;
  --text3:   #66625c;
  --amber:   #e8a020;
  --amber-d: #291e07;
  --amber-m: #48340e;
  --green:   #3aaa80;
  --green-d: #091e16;
  --purple:  #7c6fdf;
  --purple-d:#151338;
  --coral:   #df6b4a;
  --coral-d: #281209;
  --red:     #e04444;
  --red-d:   #280a0a;
  --safe-t:  env(safe-area-inset-top,0px);
  --safe-b:  env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
input,textarea,button{font-family:inherit}
button{cursor:pointer}

/* ── Layout ─────────────────────────────────────────────── */
#app{height:100dvh;display:flex;flex-direction:column}
#hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:calc(var(--safe-t) + 12px) 18px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:baseline;gap:8px;padding-bottom:4px}
.hdr-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--text3)}
.hdr-ver{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:auto;align-self:center}
.tabs{display:flex;margin:0 -18px}
.tab{flex:1;padding:11px 0 10px;font-size:12px;font-weight:500;color:var(--text3);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block}

/* ── Cards ──────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin:0 16px 10px;overflow:hidden}
.card-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-body{padding:14px}

/* ── Badges ─────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.05em;font-family:'DM Mono',monospace}
.ba{background:var(--purple-d);color:var(--purple)}
.bb{background:var(--green-d);color:var(--green)}
.bc{background:var(--amber-d);color:var(--amber)}
.bd{background:var(--coral-d);color:var(--coral)}
.bpre{background:var(--bg4);color:var(--text2)}
.btrain{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

/* ── Inputs ─────────────────────────────────────────────── */
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.lbl{font-size:11px;color:var(--text3);margin-bottom:6px;display:block;letter-spacing:.03em;font-weight:500}
input[type=text],input[type=number],textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:15px;color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--amber)}
textarea{resize:none;min-height:60px;line-height:1.4}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── Rating ─────────────────────────────────────────────── */
.rating{display:flex;gap:5px}
.rbtn{flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;font-family:'DM Mono',monospace}
.rbtn.on{background:var(--amber);color:var(--bg);border-color:var(--amber);font-weight:600}

/* ── Buttons ────────────────────────────────────────────── */
.btn-p{width:100%;background:var(--amber);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;letter-spacing:-.2px;transition:opacity .15s;margin:4px 0}
.btn-p:active{opacity:.8}
.btn-g{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text2);font-weight:500;transition:all .15s}
.btn-g:active{opacity:.7}
.btn-d{width:100%;background:none;border:1px dashed var(--border2);border-radius:8px;padding:10px;color:var(--text3);font-size:13px;transition:all .15s;margin-top:6px}
.btn-d:active{background:var(--bg3)}
.btn-skip{background:none;border:none;color:var(--text3);font-size:13px;text-decoration:underline;padding:4px 0}

/* ── Utility ────────────────────────────────────────────── */
.sm{font-size:13px}.xs{font-size:11px}.dim{color:var(--text2)}.dimmer{color:var(--text3)}
.b6{font-weight:600}.b5{font-weight:500}.mono{font-family:'DM Mono',monospace}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:14px}.mb1{margin-bottom:4px}
.sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:18px 18px 8px}
.row{display:flex;align-items:center;gap:8px}
.jcb{justify-content:space-between}

/* ── Notice ─────────────────────────────────────────────── */
.notice{margin:0 16px 10px;padding:11px 13px;background:var(--amber-d);border:1px solid var(--amber-m);border-radius:10px;font-size:12px;color:var(--amber);line-height:1.5}
.notice strong{font-weight:600;display:block;margin-bottom:2px}
.notice-dim{margin:0 16px 10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;font-size:12px;color:var(--text3);line-height:1.5}
.notice-dim strong{font-weight:600;color:var(--text2);display:block;margin-bottom:2px}
.notice-red{margin:0 16px 10px;padding:11px 13px;background:var(--red-d);border:1px solid var(--red);border-radius:10px;font-size:12px;color:var(--red);line-height:1.5}
.notice-red strong{font-weight:600;display:block;margin-bottom:2px}

/* ── Week plan day cards ─────────────────────────────────── */
.drec{margin:0 16px 8px;padding:13px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:11px}
.drec-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.rec-note{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.4}
.skip{opacity:.45}

/* ── Day assignment ─────────────────────────────────────── */
.assign-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.assign-lbl{width:54px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.adays{display:flex;gap:3px;flex:1}
.aday{flex:1;padding:7px 0;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.02em;font-family:'DM Mono',monospace;transition:all .15s;text-align:center}
.aday.sa{background:var(--purple-d);color:var(--purple);border-color:var(--purple)}
.aday.sb{background:var(--green-d);color:var(--green);border-color:var(--green)}
.aday.sc{background:var(--amber-d);color:var(--amber);border-color:var(--amber)}
.aday.sd{background:var(--coral-d);color:var(--coral);border-color:var(--coral)}
.aday.off{background:var(--bg4);color:var(--text3)}

/* ── Exercise accordion ─────────────────────────────────── */
.ex-hdr{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent;transition:border-color .15s}
.ex-hdr.open{border-bottom-color:var(--border)}
.ex-body{padding:12px 14px;background:var(--bg)}
.chev{width:16px;height:16px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}

/* ── Set row inputs ─────────────────────────────────────── */
.set-row{display:flex;gap:5px;margin-bottom:6px;align-items:center}
.set-n{width:22px;height:22px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0}
.sinp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 6px;font-size:13px;color:var(--text);text-align:center;outline:none;-webkit-appearance:none;font-family:'DM Mono',monospace}
.sinp:focus{border-color:var(--amber)}
.sinp::placeholder{color:var(--text3);font-size:11px}
.plyo-set{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.plyo-done{flex:1;padding:9px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:12px;font-weight:500;transition:all .15s}
.plyo-done.done{background:var(--green-d);color:var(--green);border-color:var(--green)}

/* ── Tags ───────────────────────────────────────────────── */
.tag-group{margin-bottom:14px}
.tag-group-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:8px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.tag.on-rec{background:var(--amber-d);color:var(--amber);border-color:var(--amber)}
.tag.on-cau{background:var(--coral-d);color:var(--coral);border-color:var(--coral)}
.tag.on-warn{background:var(--red-d);color:var(--red);border-color:var(--red)}
.tag-max-note{font-size:11px;color:var(--text3);margin-top:6px}

/* ── Modification preview ───────────────────────────────── */
.mod-preview{margin:0 0 12px;padding:12px 14px;background:var(--bg);border:1px solid var(--amber-m);border-radius:10px}
.mod-title{font-size:11px;font-weight:600;color:var(--amber);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.mod-line{font-size:12px;color:var(--text2);margin-bottom:4px;line-height:1.4;padding-left:8px;border-left:2px solid var(--amber-m)}

/* ── Accuracy card ──────────────────────────────────────── */
.acc-card{margin:0 16px 10px;padding:14px;border-radius:12px;border:1px solid var(--border)}
.acc-good{background:var(--green-d);border-color:var(--green)}
.acc-warn{background:var(--coral-d);border-color:var(--coral)}
.acc-note{background:var(--amber-d);border-color:var(--amber)}
.acc-title{font-size:13px;font-weight:600;margin-bottom:4px}
.acc-good .acc-title{color:var(--green)}
.acc-warn .acc-title{color:var(--coral)}
.acc-note .acc-title{color:var(--amber)}
.acc-detail{font-size:12px;color:var(--text2);line-height:1.5}
.acc-stat{font-size:11px;color:var(--text3);margin-top:6px;font-family:'DM Mono',monospace}

/* ── History ────────────────────────────────────────────── */
.hist-filter{display:flex;gap:6px;padding:12px 16px 4px}
.flt{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:11px;font-weight:500;transition:all .15s}
.flt.on{background:var(--amber);color:var(--bg);border-color:var(--amber)}
.hist-entry{margin:0 16px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.hist-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.hist-body{padding:0 14px 12px}
.hist-ex{font-size:12px;color:var(--text3);margin-bottom:2px}
.hist-ex span{color:var(--text2)}
.del-btn{background:none;border:none;color:var(--text3);font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .15s}
.del-btn:hover,.del-btn:active{background:var(--red-d);color:var(--red);border-color:var(--red)}
.del-confirm{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* ── Insight ────────────────────────────────────────────── */
.insight{margin:0 16px 10px;padding:12px 14px;border-radius:11px;border-left:3px solid var(--amber);background:var(--amber-d)}
.insight-t{font-size:11px;font-weight:600;color:var(--amber);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.insight-b{font-size:12px;color:var(--text2);line-height:1.5}
.insight.green{border-left-color:var(--green);background:var(--green-d)}
.insight.green .insight-t{color:var(--green)}
.deload{margin:0 16px 10px;padding:11px 13px;background:#161628;border:1px solid #2a2a4a;border-radius:10px;font-size:12px;color:#9090d0;line-height:1.5}
.deload strong{font-weight:600;color:#b0b0e8;display:block;margin-bottom:2px}

/* ── Success ────────────────────────────────────────────── */
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.success{text-align:center;padding:80px 24px;animation:pop .3s ease}
.success-icon{width:64px;height:64px;background:#0f2d22;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.success-t{font-size:18px;font-weight:600}
.success-s{font-size:13px;color:var(--text3);margin-top:5px}

/* ── Empty ──────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 24px}
.empty-i{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-t{font-size:15px;font-weight:500;color:var(--text2)}
.empty-s{font-size:13px;color:var(--text3);margin-top:4px}

/* ── Conflict warning ───────────────────────────────────── */
.conflict{font-size:11px;color:var(--coral);margin-top:4px;padding:4px 8px;background:var(--coral-d);border-radius:6px}

.bpad{height:calc(var(--safe-b) + 20px)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-top">
      <span class="hdr-title">Training</span>
      <span class="hdr-sub">Ballet + Gym</span>
      <span class="hdr-ver">v1.1</span>
    </div>
    <div class="tabs">
      <button class="tab on"  onclick="nav('plan',this)">Plan Week</button>
      <button class="tab"     onclick="nav('log',this)">Log Session</button>
      <button class="tab"     onclick="nav('history',this)">History</button>
    </div>
  </div>
  <div id="content">
    <div id="page-plan"    class="page on"></div>
    <div id="page-log"     class="page"></div>
    <div id="page-history" class="page"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════

// Exercise input types:
// loaded    → reps + kg + RPE
// bodyweight→ reps + RPE (no weight)
// timed     → duration (sec) + RPE
// plyo      → set completion (done/not done)
// carry     → duration (sec) + RPE

const PROG = {
  A:{
    name:'Full Body Strength', fullName:'Day A — Full Body Strength (Push + Pull)',
    bc:'ba', color:'#7c6fdf',
    ex:[
      {n:'Overhead Barbell Press',         t:'loaded',     p:'3 × 4–5',       rpe:'7–8', sets:3},
      {n:'Weighted Pull-Ups',              t:'loaded',     p:'3 × 4–5',       rpe:'7–8', sets:3},
      {n:'Nordic Hamstring Curl',          t:'loaded',     p:'3 × 4–6',       rpe:'6–7', sets:3, isNew:true},
      {n:'Half-Kneeling Single-Arm DB Press',t:'loaded',   p:'2 × 8 ea',      rpe:'6',   sets:2, isNew:true},
      {n:'Serratus Wall Slides',           t:'bodyweight', p:'2 × 10–12',     rpe:'5–6', sets:2},
      {n:'Copenhagen Plank',               t:'timed',      p:'2 × 20–30s ea', rpe:'6',   sets:2},
    ]
  },
  B:{
    name:'Posterior Chain', fullName:'Day B — Posterior Chain, Unilateral & Trunk',
    bc:'bb', color:'#3aaa80',
    ex:[
      {n:'Romanian Deadlift',              t:'loaded',     p:'3 × 5–6',       rpe:'7',   sets:3},
      {n:'Bulgarian Split Squat',          t:'loaded',     p:'3 × 6–8 ea',    rpe:'6–7', sets:3},
      {n:'Single-Leg RDL',                 t:'loaded',     p:'2 × 6–8 ea',    rpe:'6',   sets:2},
      {n:'Hip External Rotation (cable)',  t:'loaded',     p:'3 × 12–15',     rpe:'5–6', sets:3, isNew:true},
      {n:'Pallof Press',                   t:'bodyweight', p:'3 × 10–12 ea',  rpe:'5–6', sets:3},
      {n:'Tibialis Raises + Foot Work',    t:'timed',      p:'8–10 min',      rpe:'5',   sets:1, isNew:true},
    ]
  },
  C:{
    name:'Power & Plyometrics', fullName:'Day C — Power & Plyometrics',
    bc:'bc', color:'#e8a020',
    ex:[
      {n:'Box Jumps (max height intent)',  t:'plyo',       p:'4 × 3–4',       rpe:'6–7', sets:4},
      {n:'Pogos',                          t:'plyo',       p:'3 × 20–25',     rpe:'5–6', sets:3},
      {n:'Broad Jumps',                    t:'plyo',       p:'2 × 4',         rpe:'6',   sets:2},
      {n:'Seated Cable Row (1-sec pause)', t:'loaded',     p:'2 × 8–10',      rpe:'6',   sets:2},
      {n:'Face Pulls',                     t:'loaded',     p:'2 × 12–15',     rpe:'5–6', sets:2},
      {n:"Farmer's Carries",               t:'carry',      p:'2 × 25s',       rpe:'6–7', sets:2},
    ]
  },
  D:{
    name:'Hypertrophy (Optional)', fullName:'Day D — Hypertrophy / Aesthetics (Optional)',
    bc:'bd', color:'#df6b4a',
    ex:[
      {n:'Incline DB Press',               t:'loaded',     p:'3 × 8–10',      rpe:'7',   sets:3},
      {n:'Cable Lateral Raises',           t:'loaded',     p:'3 × 12–15',     rpe:'6–7', sets:3},
      {n:'Rear Delt Fly',                  t:'loaded',     p:'3 × 12–15',     rpe:'6–7', sets:3},
      {n:'Hammer Curls + Rope Pushdowns',  t:'loaded',     p:'2–3 × 10–12',   rpe:'6–7', sets:2},
      {n:'Adductor Machine',               t:'loaded',     p:'2 × 12–15',     rpe:'6',   sets:2},
    ]
  }
};

// Body region for each exercise — drives tag modification targeting
const REG = {
  'Overhead Barbell Press':           'upper_push',
  'Weighted Pull-Ups':                'upper_pull',
  'Nordic Hamstring Curl':            'lower',
  'Half-Kneeling Single-Arm DB Press':'upper_push',
  'Serratus Wall Slides':             'upper_push',
  'Copenhagen Plank':                 'lower_core',
  'Romanian Deadlift':                'lower',
  'Bulgarian Split Squat':            'lower',
  'Single-Leg RDL':                   'lower',
  'Hip External Rotation (cable)':    'lower',
  'Pallof Press':                     'core',
  'Tibialis Raises + Foot Work':      'lower_acc',
  'Box Jumps (max height intent)':    'plyo',
  'Pogos':                            'plyo',
  'Broad Jumps':                      'plyo',
  'Seated Cable Row (1-sec pause)':   'upper_pull',
  'Face Pulls':                       'upper_pull',
  "Farmer's Carries":                 'carry',
  'Incline DB Press':                 'upper_push',
  'Cable Lateral Raises':             'upper_push',
  'Rear Delt Fly':                    'upper_pull',
  'Hammer Curls + Rope Pushdowns':    'upper_arm',
  'Adductor Machine':                 'lower',
};

// Tag definitions — data-driven, no if/else chains
// affects: region → { setReduction?, note? }  |  'ALL' → applies to every exercise
// rpeCap: hard cap on RPE for the session
// isWarning: true → shows special warning, no structural mods
const TAGS = {
  poor_sleep:{
    label:'Poor sleep', emoji:'😴', group:'rec',
    affects:{ plyo:{ setReduction:1 } },
    sessionNote:'Reduce plyometric volume by 1 set. Keep all strength work as prescribed.'
  },
  high_fatigue:{
    label:'High fatigue', emoji:'🪫', group:'rec',
    affects:{ ALL:{ setReduction:1 } },
    sessionNote:'Drop 1 set from each exercise. Keep prescribed RPE — do not reduce intensity.'
  },
  low_energy:{
    label:'Low energy', emoji:'🔋', group:'rec',
    affects:{}, rpeCap:7,
    sessionNote:'Cap all exercises at RPE 7. Volume unchanged — lower RPE ceiling is the only change.'
  },
  heavy_legs:{
    label:'Heavy legs', emoji:'🦵', group:'rec',
    affects:{ lower:{ setReduction:1 }, plyo:{ setReduction:1 }, lower_core:{ setReduction:1 } },
    sessionNote:'Reduce lower body and plyometric exercises by 1 set. Upper body unchanged.'
  },
  upper_soreness:{
    label:'Upper body soreness', emoji:'💪', group:'rec',
    affects:{ upper_push:{ setReduction:1 }, upper_pull:{ setReduction:1 }, upper_arm:{ setReduction:1 } },
    sessionNote:'Reduce upper body exercises by 1 set. DOMS is not a reason to skip — proceed.'
  },
  lower_soreness:{
    label:'Lower body soreness', emoji:'🦵', group:'rec',
    affects:{ lower:{ setReduction:1 }, lower_core:{ setReduction:1 } },
    sessionNote:'Reduce lower body exercises by 1 set. Soreness is safe to train through.'
  },
  hip_knee:{
    label:'Hip / knee tightness', emoji:'⚠️', group:'cau',
    affects:{ lower:{ note:'Shorten ROM as needed' }, plyo:{ setReduction:1, note:'Focus on landing quality' } },
    sessionNote:'Shorten ROM on lower body movements. Reduce plyometric sets by 1.'
  },
  shoulder:{
    label:'Shoulder tightness', emoji:'⚠️', group:'cau',
    affects:{ upper_push:{ note:'Reduce load ~10–15%, avoid end-range overhead' }, upper_pull:{ note:'Bodyweight only if weighted' } },
    sessionNote:'Reduce pressing load 10–15%. Pull-ups bodyweight only. Avoid end-range overhead position.'
  },
  dull_ache:{
    label:'Dull joint ache', emoji:'🔶', group:'cau',
    affects:{},
    sessionNote:'Monitor during warm-up. If pain increases during any movement, skip that pattern today and note the location.'

    label:'Sharp / acute pain', emoji:'🚨', group:'warn', isWarning:true,

const save = (k,v)=>{ try{localStorage.setItem('bt_'+k,JSON.stringify(v))}catch(e){} };
const load = k=>{ try{const v=localStorage.getItem('bt_'+k);return v?JSON.parse(v):null}catch(e){return null} };

// Log session flow — ephemeral, resets after completion

  type:       null,
  tags:       [],
  mods:       null,       // computed modifications object
  modsAccepted:false,
  exLogs:     [],         // [{sets:[...]}]

function nav(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');

function render(name) {

  if (name==='log')     renderLog();

function renderPlan() {
  document.getElementById('page-plan').innerHTML =
    planStep==='input' ? buildPlanInput() : buildPlanReview();
}

function buildPlanInput() {
  const isDeload = weekCount > 0 && (weekCount+1) % 4 === 0;

  const daycards = DAYS.map((day,i)=>{
    const d = balletSched[i];
    const rbtns = [1,2,3,4,5].map(v=>
      `<button class="rbtn${d.intensity===v?' on':''}" onclick="setInt(${i},${v})">${v}</button>`
    ).join('');
    return `
    <div class="card">
      <div class="card-hdr">
        <div class="sm b6">${day}</div>
        <div class="xs dimmer">${gymAssign[Object.keys(gymAssign).find(k=>gymAssign[k]===day)] ? 'Gym day assigned' : ''}</div>
      </div>
      <div class="card-body">
        <div class="field">
          <label class="lbl">Rehearsal length (hours)</label>
          <input type="number" step="0.5" min="0" max="12" value="${d.length}" placeholder="0"
            oninput="balletSched[${i}].length=this.value">
        </div>
        <div class="field">
          <label class="lbl">Intensity — 1 rest · 3 moderate · 5 show / heavy lift</label>
          <div class="rating">${rbtns}</div>
        </div>
        <div class="field">
          <label class="lbl">Insight (optional)</label>
          <input type="text" value="${d.insight}" placeholder="e.g. show night, full lifts, light class"
            oninput="balletSched[${i}].insight=this.value">
        </div>
      </div>
    </div>`;
  }).join('');

  const assignRows = ['A','B','C','D'].map(s=>{
    const isOpt = s==='D';
    const current = gymAssign[s];
    const dayBtns = DSHORT.map((d,i)=>{
      const full = DAYS[i];
      const sel = current===full;
      const conflict = Object.entries(gymAssign).some(([k,v])=>k!==s&&v===full);
      return `<button class="aday${sel?' s'+s.toLowerCase():''}${conflict?' opacity-50':''}"
        onclick="setGymDay('${s}','${full}')" title="${conflict?'Conflict':''}">
        ${d.slice(0,2)}</button>`;
    }).join('');
    const offBtn = `<button class="aday${!current?' off':''}" onclick="setGymDay('${s}',null)">OFF</button>`;
    return `
    <div class="assign-row">
      <div class="assign-lbl"><span class="badge ${s==='A'?'ba':s==='B'?'bb':s==='C'?'bc':'bd'}">Day ${s}</span></div>
      <div class="adays">${dayBtns}${isOpt?offBtn:''}</div>
    </div>`;
  }).join('');

  // Conflict detection
  const vals = Object.values(gymAssign).filter(Boolean);
  const hasConflict = vals.length !== new Set(vals).size;

  return `
    <div class="sec">Next week's ballet schedule</div>
    <div class="notice">
      <strong>Thursday planning workflow</strong>
      Enter your company schedule then assign gym days. The system adapts the plan to your ballet load.
    </div>
    ${isDeload?`<div class="deload"><strong>⚠ Deload week recommended</strong>Week ${weekCount+1} of training block. Keep exercises, keep RPE — reduce sets ~40%.</div>`:''}
    ${daycards}
    <div class="sec">Assign gym days</div>
    <div class="card"><div class="card-body">
      ${assignRows}
      ${hasConflict?`<div class="conflict">⚠ Two sessions share the same day — adjust above.</div>`:''}
    </div></div>
    <div style="padding:4px 16px 8px">
      <button class="btn-p" onclick="generatePlan()">Generate Week Plan →</button>
    </div>
    <div class="bpad"></div>`;
}

function setInt(i, v) { balletSched[i].intensity=v; renderPlan(); }

function setGymDay(session, day) {
  gymAssign[session] = day;
  renderPlan();
}

function generatePlan() {
  const recs = {};
  const showDays = balletSched.filter(d=>
    d.insight.toLowerCase().includes('show')||d.insight.toLowerCase().includes('performance')
  ).length;
  const isDeload = weekCount > 0 && (weekCount+1) % 4 === 0;

  // Build inverse map: day → assigned gym session
  const dayToGym = {};
  Object.entries(gymAssign).forEach(([s,d])=>{ if(d) dayToGym[d]=s; });

  DAYS.forEach((day,i)=>{
    const d = balletSched[i];
    const gymDay = dayToGym[day];
    const hours = parseFloat(d.length)||0;
    const int = d.intensity;

    if (!gymDay) { recs[day]={type:'rest',label:null,note:'Ballet class & rehearsal only.'}; return; }
    if (showDays>=2 && gymDay==='D') { recs[day]={type:'skip',label:'SKIP',note:'Show week — drop optional Day D entirely.'}; return; }
    if (isDeload) { recs[day]={type:gymDay,label:`Day ${gymDay} (DELOAD)`,note:'Deload — same exercises, same RPE, ~40% fewer sets.'}; return; }
    if (showDays>=2 && gymDay==='C') { recs[day]={type:gymDay,label:`Day ${gymDay}`,note:'Show week — 15 min power maintenance only: box jumps + pogos.'}; return; }
    if (hours>=3&&int>=4) {
      recs[day]={type:gymDay,label:`Day ${gymDay}`,note:gymDay==='C'
        ?'Heavy rehearsal — reduce to pogos + box jumps only (15 min). Gym after class.'
        :'Heavy rehearsal — halve sets, keep RPE. Minimum 4h gap after class.'};
    } else if (hours>=1.5&&int>=3) {
      recs[day]={type:gymDay,label:`Day ${gymDay}`,note:'Moderate rehearsal — full session, monitor RPE. Gym after class.'};
    } else {
      recs[day]={type:gymDay,label:`Day ${gymDay}`,note:'Light/no rehearsal — full session as prescribed.'};
    }
  });

  weekCount++;
  save('weekCount', weekCount);
  weekPlan = { weekStart:nextMonday(), balletSchedule:[...balletSched], gymAssign:{...gymAssign}, recommendations:recs, createdAt:new Date().toISOString() };
  save('weekPlan', weekPlan);
  planStep='review';
  renderPlan();
}

function nextMonday() {
  const d=new Date(); const diff=d.getDay()===0?1:8-d.getDay();
  d.setDate(d.getDate()+diff); return d.toISOString().split('T')[0];
}

function buildPlanReview() {
  if (!weekPlan) return `<div class="empty"><div class="empty-i">📅</div><div class="empty-t">No plan yet</div></div>`;
  const ds = new Date(weekPlan.weekStart+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const insight = buildProgressInsight();

  const daycards = DAYS.map(day=>{
    const rec = weekPlan.recommendations[day];
    const ballet = weekPlan.balletSchedule.find(d=>d.day===day);
    const isSkip = rec.type==='skip'||rec.type==='rest';
    const gymType = (!isSkip&&rec.type)?rec.type.charAt(0):null;
    const bi = ballet.length?`${ballet.length}h · Int ${ballet.intensity}/5${ballet.insight?' · '+ballet.insight:'`'}`:' No rehearsal';
    return `
    <div class="drec${isSkip?' skip':''}">
      <div class="drec-row">
        <div>
          <div class="sm b6">${day}</div>
          <div class="xs dimmer mt1">${bi}</div>
        </div>
        ${gymType?`<span class="badge b${gymType.toLowerCase()}">${rec.label||'Day '+gymType}</span>`
          :rec.type==='skip'?'<span class="badge" style="background:var(--bg4);color:var(--text3)">SKIP</span>':''}
      </div>
      <div class="rec-note">${rec.note}</div>
    </div>`;
  }).join('');

  return `
    <div class="sec">Week of ${ds} · Block week ${weekCount}</div>
    <div class="notice-dim"><strong>Gym always after ballet class</strong>Minimum 4h gap. Never before — fatigued proprioception raises injury risk.</div>
    ${insight}
    ${daycards}
    <div style="padding:8px 16px 4px"><button class="btn-g" onclick="planStep='input';renderPlan()">← Edit schedule</button></div>
    <div class="bpad"></div>`;
}

function buildProgressInsight() {
  if (logs.length<2) return '';
  const training = logs.filter(l=>l.type==='training').slice(0,3);
  if (!training.length) return '';
  const avg = training.reduce((s,l)=>s+l.feel,0)/training.length;
  let highRPE=0;
  training.forEach(log=>log.exLogs.forEach(ex=>ex.sets.forEach(s=>{ if(parseFloat(s.rpe)>=9) highRPE++; })));
  if (avg<=2.5||highRPE>=3) return `<div class="insight"><div class="insight-t">⚠ Fatigue signal</div><div class="insight-b">Last ${training.length} sessions averaged ${avg.toFixed(1)}/5 feel${highRPE>=3?` with ${highRPE} sets at RPE 9+`:''}. Consider extra volume reduction this week.</div></div>`;
  if (avg>=4.2) return `<div class="insight green"><div class="insight-t">↑ Recovery solid</div><div class="insight-b">Last ${training.length} sessions averaged ${avg.toFixed(1)}/5. Good week to push the upper RPE ceiling if load allows.</div></div>`;
  return '';
}

// ═══════════════════════════════════════════════════════════
// LOG — TAG / MODIFICATION LOGIC
// ═══════════════════════════════════════════════════════════

function computeMods(tags, sessionType) {
  const prog = PROG[sessionType];
  let globalRPECap = null;
  const hasWarning = tags.includes('sharp_pain');
  const sessionNotes = tags.map(t=>TAGS[t]?.sessionNote).filter(Boolean);

  const exMods = prog.ex.map(ex=>{
    const region = REG[ex.n] || 'other';
    let setReduction = 0;
    const notes = [];

    tags.forEach(tagKey=>{
      const tag = TAGS[tagKey];
      if (!tag||tag.isWarning) return;
      if (tag.rpeCap) globalRPECap = globalRPECap ? Math.min(globalRPECap, tag.rpeCap) : tag.rpeCap;
      const aff = tag.affects;
      if (aff.ALL) setReduction = Math.max(setReduction, aff.ALL.setReduction||0);
      if (aff[region]) {
        const eff = aff[region];
        setReduction = Math.max(setReduction, eff.setReduction||0);
        if (eff.note) notes.push(eff.note);
      }
    });

    const adjSets = Math.max(1, ex.sets - setReduction);
    return { setReduction, adjSets, notes, rpeCap: globalRPECap };
  });

  return { exMods, globalRPECap, sessionNotes, hasWarning };
}

function parseRPE(rpeStr) {
  const parts = rpeStr.replace('–','-').split('-').map(s=>parseFloat(s.trim()));
  return parts.length===1 ? {min:parts[0],max:parts[0]} : {min:parts[0],max:parts[1]};
}

function computeAccuracy(exLogs, sessionType, mods) {
  const prog = PROG[sessionType];
  let totalPrescribed=0, totalDone=0, rpeHigh=0, rpeLow=0;

  exLogs.forEach((exLog,i)=>{
    const ex = prog.ex[i];
    const adj = mods?.exMods?.[i]?.adjSets ?? ex.sets;
    totalPrescribed += adj;
    totalDone += exLog.sets.length;

    if (ex.t==='loaded'||ex.t==='bodyweight') {
      const {min,max} = parseRPE(ex.rpe);
      exLog.sets.forEach(s=>{
        const r = parseFloat(s.rpe);
        if (!isNaN(r)) {
          if (r > max+0.5) rpeHigh++;
          if (r < min-1)   rpeLow++;
        }
      });
    }
  });

  const rate = totalPrescribed>0 ? totalDone/totalPrescribed : 1;
  let verdict, detail, level;

  if (rate>=0.9&&rpeHigh===0&&rpeLow===0) {
    verdict='Session on target'; level='good';
    detail='Volume and intensity matched the prescription. Well executed.';
  } else if (rpeHigh>=2) {
    verdict='Intensity exceeded prescription'; level='warn';
    detail=`${rpeHigh} set${rpeHigh>1?'s':''} logged above prescribed RPE. Monitor recovery before the next session.`;
  } else if (rate<0.75) {
    verdict='Volume incomplete'; level='note';
    detail=`Completed ${totalDone} of ${totalPrescribed} prescribed sets. If fatigue-driven, flag this in next week's plan input.`;
  } else if (rpeLow>=3) {
    verdict='Session felt comfortable'; level='note';
    detail='RPE consistently below target. If this is a pattern, consider a small load increase.';
  } else {
    verdict='Session solid'; level='good';
    detail='Minor deviations within acceptable range.';
  }

  return { verdict, detail, level, rate:Math.round(rate*100), totalDone, totalPrescribed };
}

// ═══════════════════════════════════════════════════════════
// LOG — RENDER
// ═══════════════════════════════════════════════════════════
function renderLog() {
  const el = document.getElementById('page-log');
  const steps = { select:buildLogSelect, presession:buildPreSession, logging:buildLogSession, accuracy:buildAccuracy, done:buildDone };
  el.innerHTML = (steps[lf.step]||buildLogSelect)();
}

function buildLogSelect() {
  const cards = Object.entries(PROG).map(([k,p])=>`
    <div class="card" style="cursor:pointer" onclick="startLog('${k}')">
      <div class="ex-hdr">
        <div>
          <span class="badge ${p.bc}" style="margin-bottom:6px;display:inline-flex">Day ${k}</span>
          <div class="sm b5">${p.name}</div>
          <div class="xs dimmer mt1">${p.ex.length} exercises</div>
        </div>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
    </div>`).join('');
  return `<div class="sec">Which session today?</div>${cards}<div class="bpad"></div>`;
}

function startLog(type) {
  lf = {
    step:'presession', type, tags:[], mods:null, modsAccepted:false,
    exLogs: PROG[type].ex.map(()=>({ sets:[] })),
    openEx:null, feel:3, notes:'', accuracy:null, presessionId:null
  };
  renderLog();
}

function buildPreSession() {
  const p = PROG[lf.type];
  const recTags = Object.entries(TAGS).filter(([,t])=>t.group==='rec');
  const cauTags = Object.entries(TAGS).filter(([,t])=>t.group==='cau'||t.group==='warn');
  const count = lf.tags.length;

  const tagBtn = (key, tag) => {
    const isOn = lf.tags.includes(key);
    const cls = isOn ? (tag.group==='rec'?'on-rec':tag.group==='warn'?'on-warn':'on-cau') : '';
    const disabled = !isOn && count>=2;
    return `<button class="tag${cls?' '+cls:''}" onclick="toggleTag('${key}')" ${disabled?'style="opacity:.4;pointer-events:none"':''}>${tag.emoji} ${tag.label}</button>`;
  };

  const modPreview = lf.tags.length>0 ? buildModPreview() : '';

  const warn = lf.tags.includes('sharp_pain') ? `
    <div class="notice-red">
      <strong>🚨 Sharp / acute pain flagged</strong>
      Do not train through sharp pain. This requires assessment by a physiotherapist before loading that movement again. Only proceed if the pain is not associated with the session's movement patterns.
    </div>` : '';

  return `
    <div style="padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between;margin-top:6px">
      <div class="row">
        <span class="badge ${p.bc}">Day ${lf.type}</span>
        <span class="sm b5">${p.name}</span>
      </div>
      <button class="btn-skip" onclick="skipPreSession()">Skip →</button>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="tag-group">
          <div class="tag-group-lbl">Recovery</div>
          <div class="tags-wrap">${recTags.map(([k,t])=>tagBtn(k,t)).join('')}</div>
        </div>
        <div class="tag-group">
          <div class="tag-group-lbl">Caution</div>
          <div class="tags-wrap">${cauTags.map(([k,t])=>tagBtn(k,t)).join('')}</div>
        </div>
        ${count>0?`<div class="tag-max-note">${count}/2 selected — tap to deselect</div>`:'<div class="tag-max-note">Select up to 2 · or skip to train as prescribed</div>'}
      </div>
    </div>
    ${warn}
    ${modPreview}
    ${lf.tags.length>0&&!lf.tags.includes('sharp_pain')?`
    <div style="padding:0 16px 8px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-p" onclick="acceptMods()">Accept modifications & begin →</button>
      <button class="btn-g" style="width:100%;text-align:center" onclick="skipPreSession()">Train as prescribed instead</button>
    </div>`:
    lf.tags.includes('sharp_pain')?`<div style="padding:0 16px 8px"><button class="btn-g" style="width:100%;text-align:center" onclick="skipPreSession()">Proceed anyway (not recommended)</button></div>`:''}
    <div class="bpad"></div>`;
}

function buildModPreview() {
  const mods = computeMods(lf.tags, lf.type);
  const prog = PROG[lf.type];
  const lines = [];

  prog.ex.forEach((ex,i)=>{
    const m = mods.exMods[i];
    const parts = [];
    if (m.setReduction>0) parts.push(`reduce to ${m.adjSets} set${m.adjSets!==1?'s':''} (was ${ex.sets})`);
    if (m.notes.length) parts.push(...m.notes);
    if (mods.globalRPECap && (ex.t==='loaded'||ex.t==='bodyweight')) parts.push(`cap RPE at ${mods.globalRPECap}`);
    if (parts.length) lines.push(`<div class="mod-line"><strong>${ex.n}</strong> — ${parts.join(' · ')}</div>`);
  });

  if (!lines.length && !mods.globalRPECap) return '';

  return `
    <div class="card"><div class="card-body">
      <div class="mod-preview">
        <div class="mod-title">Today's modifications</div>
        ${lines.length ? lines.join('') : '<div class="mod-line" style="color:var(--text3)">No structural changes — RPE cap applies to all loaded exercises.</div>'}
      </div>
      ${mods.sessionNotes.map(n=>`<div class="xs dimmer mt1" style="line-height:1.5">· ${n}</div>`).join('')}
    </div></div>`;
}

function toggleTag(key) {
  const tag = TAGS[key];
  const idx = lf.tags.indexOf(key);
  if (idx>-1) { lf.tags.splice(idx,1); }
  else if (lf.tags.length<2) { lf.tags.push(key); }
  renderLog();
}

function acceptMods() {
  lf.mods = computeMods(lf.tags, lf.type);
  lf.modsAccepted = true;
  savePreSession(true);
  lf.step = 'logging';
  renderLog();
}

function skipPreSession() {
  lf.mods = null;
  lf.modsAccepted = false;
  savePreSession(false);
  lf.step = 'logging';
  renderLog();
}

function savePreSession(accepted) {
  if (lf.tags.length===0 && !accepted) return; // nothing to save if skipped with no tags
  const id = Date.now().toString();
  lf.presessionId = id;
  const entry = {
    id, type:'presession',
    date: new Date().toISOString(),
    sessionType: lf.type,
    tags: [...lf.tags],
    modsAccepted: accepted,
    sessionNotes: lf.tags.map(t=>TAGS[t]?.sessionNote).filter(Boolean)
  };
  logs.unshift(entry);
  save('logs', logs);
}

function buildLogSession() {
  const prog = PROG[lf.type];
  const prevTraining = logs.find(l=>l.type==='training'&&l.sessionType===lf.type);

  const exCards = prog.ex.map((ex,i)=>{
    const exLog = lf.exLogs[i];
    const isOpen = lf.openEx===i;
    const mod = lf.mods?.exMods?.[i];
    const adjSets = mod?.adjSets ?? ex.sets;
    const prevEx = prevTraining?.exLogs?.[i];
    const prevRef = prevEx?.sets?.length>0
      ? prevEx.sets.filter(s=>s.reps||s.weight||s.dur||s.done).map(s=>
          ex.t==='loaded' ? `${s.reps||'?'}r·${s.weight||'?'}kg·@${s.rpe||'?'}`
          : ex.t==='timed'||ex.t==='carry' ? `${s.dur||'?'}s·@${s.rpe||'?'}`
          : ex.t==='bodyweight' ? `${s.reps||'?'}r·@${s.rpe||'?'}`
          : s.done ? '✓' : '—'
        ).join('  ')
      : '';

    const modNote = mod && (mod.setReduction>0||mod.notes.length)
      ? `<div class="xs" style="color:var(--amber);margin-top:2px">↓ ${mod.setReduction>0?`${adjSets} sets today`:''} ${mod.notes.join(' · ')}</div>` : '';

    let setBuilder = '';
    if (isOpen) {
      setBuilder = buildSetRows(ex, exLog, i, adjSets);
    }

    return `
    <div class="card">
      <div class="ex-hdr${isOpen?' open':''}" onclick="toggleEx(${i})">
        <div style="flex:1;min-width:0">
          <div class="sm b5">${ex.n}${ex.isNew?' <span style="font-size:9px;color:var(--purple);font-weight:700;font-family:DM Mono,monospace">NEW</span>':''}</div>
          <div class="xs dimmer mt1">${ex.p} · RPE ${ex.rpe}${exLog.sets.length>0?' · '+exLog.sets.length+' logged':''}${lf.mods?.globalRPECap&&(ex.t==='loaded'||ex.t==='bodyweight')?' · cap '+lf.mods.globalRPECap:''}</div>
          ${modNote}
          ${prevRef&&!isOpen?`<div class="xs mt1 mono" style="color:var(--text3);font-size:10px">↩ Last: ${prevRef}</div>`:''}
        </div>
        <svg class="chev${isOpen?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isOpen?`<div class="ex-body">
        ${prevRef?`<div class="xs mono mb1" style="color:var(--text3);padding:5px 8px;background:var(--bg2);border-radius:6px;font-size:10px">↩ Last: ${prevRef}</div>`:''}
        ${setBuilder}
      </div>`:''}
    </div>`;
  }).join('');

  const feelBtns = [1,2,3,4,5].map(v=>
    `<button class="rbtn${lf.feel===v?' on':''}" onclick="setFeel(${v})">${v}</button>`
  ).join('');

  return `
    <div style="padding:0 16px 8px;display:flex;align-items:center;gap:10px;margin-top:6px">
      <button onclick="lf.step='presession';renderLog()" style="background:none;border:none;color:var(--text3);font-size:13px">← Check-in</button>
      <span class="badge ${PROG[lf.type].bc}">Day ${lf.type}</span>
      <span class="sm b5">${PROG[lf.type].name}</span>
    </div>
    ${exCards}
    <div class="card"><div class="card-body">
      <div class="lbl">Overall session feel</div>
      <div class="rating">${feelBtns}</div>
      <div class="xs dimmer mt1" style="text-align:center">1 = Struggled · 3 = Expected · 5 = Felt strong</div>
    </div></div>
    <div class="card"><div class="card-body">
      <div class="lbl">Session notes (optional)</div>
      <textarea placeholder="Fatigue, anything notable..." oninput="lf.notes=this.value">${lf.notes}</textarea>
    </div></div>
    <div style="padding:0 16px 8px">
      <button class="btn-p" onclick="completeLog()">Complete Session ✓</button>
    </div>
    <div class="bpad"></div>`;
}

function buildSetRows(ex, exLog, exIdx, adjSets) {
  const colHead = ex.t==='loaded'
    ? '<div class="xs dimmer mono mb1" style="display:flex;gap:5px;padding-left:27px"><div style="flex:1;text-align:center">REPS</div><div style="flex:1;text-align:center">KG</div><div style="width:62px;text-align:center">RPE</div></div>'
    : ex.t==='bodyweight'
    ? '<div class="xs dimmer mono mb1" style="display:flex;gap:5px;padding-left:27px"><div style="flex:1;text-align:center">REPS</div><div style="width:62px;text-align:center">RPE</div></div>'
    : ex.t==='timed'||ex.t==='carry'
    ? '<div class="xs dimmer mono mb1" style="display:flex;gap:5px;padding-left:27px"><div style="flex:1;text-align:center">SEC</div><div style="width:62px;text-align:center">RPE</div></div>'
    : `<div class="xs dimmer mt1 mb1" style="padding-left:4px">Tap each set to mark done. Prescribed: ${ex.p}</div>`;

  const rows = exLog.sets.map((set,si)=>{
    if (ex.t==='loaded') return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        <input class="sinp" type="number" placeholder="Reps" value="${set.reps||''}" oninput="updSet(${exIdx},${si},'reps',this.value)">
        <input class="sinp" type="number" step="0.5" placeholder="kg" value="${set.weight||''}" oninput="updSet(${exIdx},${si},'weight',this.value)">
        <input class="sinp" type="number" step="0.5" min="1" max="10" placeholder="RPE" value="${set.rpe||''}" oninput="updSet(${exIdx},${si},'rpe',this.value)" style="width:62px;flex:none">
      </div>`;
    if (ex.t==='bodyweight') return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        <input class="sinp" type="number" placeholder="Reps" value="${set.reps||''}" oninput="updSet(${exIdx},${si},'reps',this.value)">
        <input class="sinp" type="number" step="0.5" min="1" max="10" placeholder="RPE" value="${set.rpe||''}" oninput="updSet(${exIdx},${si},'rpe',this.value)" style="width:62px;flex:none">
      </div>`;
    if (ex.t==='timed'||ex.t==='carry') return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        <input class="sinp" type="number" placeholder="sec" value="${set.dur||''}" oninput="updSet(${exIdx},${si},'dur',this.value)">
        <input class="sinp" type="number" step="0.5" min="1" max="10" placeholder="RPE" value="${set.rpe||''}" oninput="updSet(${exIdx},${si},'rpe',this.value)" style="width:62px;flex:none">
      </div>`;
    // plyo
    return `
      <div class="plyo-set">
        <div class="set-n">${si+1}</div>
        <button class="plyo-done${set.done?' done':''}" onclick="updSet(${exIdx},${si},'done',${!set.done})">
          ${set.done?'✓ Done':'Tap to mark done'}
        </button>
        <input class="sinp" type="text" placeholder="notes" value="${set.note||''}" oninput="updSet(${exIdx},${si},'note',this.value)" style="width:90px;flex:none;font-size:12px">
      </div>`;
  }).join('');

  const addBtn = exLog.sets.length < adjSets+2 // allow a couple extras
    ? `<button class="btn-d" onclick="addSet(${exIdx})">+ Add Set</button>`
    : '';

  return colHead + rows + addBtn;
}

function toggleEx(i) { lf.openEx = lf.openEx===i?null:i; renderLog(); }
function addSet(i) {
  const ex = PROG[lf.type].ex[i];
  const empty = ex.t==='plyo' ? {done:false,note:''} : ex.t==='timed'||ex.t==='carry' ? {dur:'',rpe:''} : ex.t==='bodyweight' ? {reps:'',rpe:''} : {reps:'',weight:'',rpe:''};
  lf.exLogs[i].sets.push(empty);
  renderLog();
}
function updSet(ei,si,field,val) { lf.exLogs[ei].sets[si][field]=val; }
function setFeel(v) { lf.feel=v; renderLog(); }

function completeLog() {
  lf.accuracy = computeAccuracy(lf.exLogs, lf.type, lf.mods);
  const entry = {
    id: Date.now().toString(),
    type: 'training',
    date: new Date().toISOString(),
    sessionType: lf.type,
    exLogs: lf.exLogs,
    feel: lf.feel,
    notes: lf.notes,
    accuracy: lf.accuracy,
    presessionId: lf.presessionId
  };
  logs.unshift(entry);
  save('logs', logs);
  lf.step = 'accuracy';
  renderLog();
}

function buildAccuracy() {
  const acc = lf.accuracy;
  const cls = acc.level==='good'?'acc-good':acc.level==='warn'?'acc-warn':'acc-note';
  return `
    <div class="sec">Session complete</div>
    <div class="acc-card ${cls}">
      <div class="acc-title">${acc.verdict}</div>
      <div class="acc-detail">${acc.detail}</div>
      <div class="acc-stat">${acc.totalDone} / ${acc.totalPrescribed} sets · ${acc.rate}% volume · Feel ${lf.feel}/5</div>
    </div>
    ${lf.mods?.modsAccepted||lf.tags?.length>0?`<div class="notice-dim"><strong>Pre-session tags</strong>${lf.tags.map(t=>TAGS[t]?.label||t).join(' · ')||'None logged'}</div>`:''}
    <div style="padding:0 16px 8px"><button class="btn-p" onclick="resetLog()">Done</button></div>
    <div class="bpad"></div>`;
}

function buildDone() {
  return `<div class="success"><div class="success-icon">✓</div><div class="success-t">Session logged</div><div class="success-s">History updated</div></div>`;
}

function resetLog() {
  lf = { step:'select', type:null, tags:[], mods:null, modsAccepted:false, exLogs:[], openEx:null, feel:3, notes:'', accuracy:null, presessionId:null };
  renderLog();
}

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('page-history');
  const filtered = histFilter==='all' ? logs
    : logs.filter(l=>l.type===histFilter);

  if (!filtered.length) {
    el.innerHTML=`
      <div class="hist-filter">
        ${filterBtns()}
      </div>
      <div class="empty"><div class="empty-i">📊</div><div class="empty-t">No ${histFilter==='all'?'':'matching '}logs yet</div></div>`;
    return;
  }

  const entries = filtered.map(log=>buildHistEntry(log)).join('');
  el.innerHTML=`
    <div class="hist-filter">${filterBtns()}</div>
    <div class="sec">${filtered.length} log${filtered.length!==1?'s':''}</div>
    ${entries}
    <div class="bpad"></div>`;
}

function filterBtns() {
  return ['all','presession','training'].map(f=>{
    const labels = {all:'All', presession:'Pre-Session', training:'Training Log'};
    return `<button class="flt${histFilter===f?' on':''}" onclick="setFilter('${f}')">${labels[f]}</button>`;
  }).join('');
}

function setFilter(f) { histFilter=f; expandedHist=null; confirmDelete=null; renderHistory(); }

function buildHistEntry(log) {
  const isExpanded = expandedHist===log.id;
  const isPending = confirmDelete===log.id;
  const isTraining = log.type==='training';
  const isPre = log.type==='presession';

  const dateStr = new Date(log.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  const timeStr = new Date(log.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  // Title badges
  const typeBadge = isTraining
    ? `<span class="badge btrain" style="margin-right:4px">TRAINING LOG</span>`
    : `<span class="badge bpre" style="margin-right:4px">PRE-SESSION</span>`;
  const dayBadge = log.sessionType
    ? `<span class="badge b${log.sessionType.toLowerCase()}">Day ${log.sessionType}</span>` : '';

  // Right side
  const rightSide = isTraining
    ? `<div style="text-align:right"><div class="xs dimmer mb1">Feel</div><div class="mono b6" style="font-size:20px;color:${log.feel>=4?'var(--green)':log.feel<=2?'var(--coral)':'var(--text2)'}">${log.feel}<span style="font-size:11px;color:var(--text3)">/5</span></div></div>`
    : `<div style="text-align:right;font-size:11px;color:var(--text3)">${log.tags?.length||0} tag${log.tags?.length!==1?'s':''}</div>`;

  // Expanded body
  let body = '';
  if (isExpanded) {
    if (isTraining) {
      const exLines = (log.exLogs||[]).map(ex=>{
        const prog = PROG[log.sessionType];
        const exDef = prog?.ex.find(e=>e.n===ex.sets?.[0]?.name)||null;
        const setsStr = ex.sets.filter(s=>s.reps||s.weight||s.dur||s.done).map(s=>
          s.done!==undefined ? (s.done?'✓':'—')
          : s.dur ? `${s.dur}s@${s.rpe||'?'}`
          : `${s.reps||'?'}r${s.weight?'·'+s.weight+'kg':''}@${s.rpe||'?'}`
        ).join('  ');
        const name = PROG[log.sessionType]?.ex.find((_,i)=>(log.exLogs||[]).indexOf(ex)===i)?.n || '—';
        return `<div class="hist-ex">${name}: <span>${ex.sets.length} set${ex.sets.length!==1?'s':''}${setsStr?' — '+setsStr:''}</span></div>`;
      }).join('');

      const acc = log.accuracy;
      const accCls = acc ? (acc.level==='good'?'var(--green)':acc.level==='warn'?'var(--coral)':'var(--amber)') : 'var(--text3)';
      body = `
        <div class="hist-body">
          ${exLines}
          ${acc?`<div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:8px;border-left:2px solid ${accCls}">
            <div class="xs b6" style="color:${accCls}">${acc.verdict}</div>
            <div class="xs dimmer mt1">${acc.detail}</div>
          </div>`:''}
          ${log.notes?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);font-style:italic">${log.notes}</div>`:''}
          ${isPending?`
            <div class="del-confirm">
              <button class="btn-g" style="flex:1;text-align:center;color:var(--red)" onclick="confirmDel('${log.id}')">Delete this log</button>
              <button class="btn-g" style="flex:1;text-align:center" onclick="cancelDel()">Cancel</button>
            </div>
          `:`<button class="del-btn" onclick="promptDelete('${log.id}')">Delete</button>`}
        </div>`;
    }
    if (isPre) {
      const tagList = (log.tags||[]).map(t=>`<span class="tag ${t==='sharp_pain'?'on-warn':'on-rec'}" style="margin:2px">${TAGS[t]?.emoji||''} ${TAGS[t]?.label||t}</span>`).join('');
      body = `
        <div class="hist-body">
          ${tagList?`<div style="margin-bottom:8px">${tagList}</div>`:'<div class="xs dimmer">No tags selected — skipped check-in.</div>'}
          ${(log.sessionNotes||[]).map(n=>`<div class="xs dimmer mt1" style="line-height:1.5">· ${n}</div>`).join('')}
          <div class="xs dimmer mt2">Modifications ${log.modsAccepted?'accepted':'not applied'}</div>
          ${isPending?`
            <div class="del-confirm">
              <button class="btn-g" style="flex:1;text-align:center;color:var(--red)" onclick="confirmDel('${log.id}')">Delete this log</button>
              <button class="btn-g" style="flex:1;text-align:center" onclick="cancelDel()">Cancel</button>
            </div>
          `:`<button class="del-btn" onclick="promptDelete('${log.id}')">Delete</button>`}
        </div>`;
    }
  }

  return `
    <div class="hist-entry">
      <div class="hist-hdr" onclick="toggleHist('${log.id}')">
        <div>
          <div style="margin-bottom:5px">${typeBadge}${dayBadge}</div>
          <div class="xs dimmer">${dateStr} · ${timeStr}</div>
        </div>
        ${rightSide}
      </div>
      ${body}
    </div>`;
}

function toggleHist(id) {
  expandedHist = expandedHist===id ? null : id;
  confirmDelete = null;
  renderHistory();
}
function promptDelete(id) { confirmDelete=id; renderHistory(); }
function cancelDel() { confirmDelete=null; renderHistory(); }
function confirmDel(id) {
  logs = logs.filter(l=>l.id!==id);
  save('logs', logs);
  confirmDelete=null;
  expandedHist=null;
  renderHistory();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
renderPlan();
</script>
</body>
