// ── Week summary card ──────────────────────────────────────
function buildWeekSummary(wk) {
  const logs    = Object.values(wk.logs || {});
  const planned = Object.values(wk.plan?.assigned || {}).filter(v => v !== null).length;
  const done    = logs.length;
  if (done === 0 && planned === 0) return '';
  const totalLoad = logs.reduce((s,l) => s + (l.sRPE||0), 0);
  const logsWithFeel = logs.filter(l => l.feel);
  const avgFeel = logsWithFeel.length
    ? (logsWithFeel.reduce((s,l) => s+l.feel, 0) / logsWithFeel.length).toFixed(1) : null;
  const logsWithAcc = logs.filter(l => l.accuracy?.rate !== undefined);
  const avgAcc = logsWithAcc.length
    ? Math.round(logsWithAcc.reduce((s,l) => s+l.accuracy.rate, 0) / logsWithAcc.length) : null;

  const sc = (val, lbl) => `
    <div class="week-sum-stat">
      <div class="week-sum-val${val==='—'?' dim':''}">${val}</div>
      <div class="week-sum-lbl">${lbl}</div>
    </div>`;

  const alert = totalLoad > 0 ? getLoadAlert(totalLoad) : null;
  const alertHTML = alert ? `
    <div class="week-sum-alert ${alert.level}">
      <strong>${alert.level==='warn'?'⚠ Load spike':'📈 Load rising'}</strong>
      This week's load is ${Math.round((alert.ratio-1)*100)}% above the 4-week average. Monitor recovery.
    </div>` : '';

  return `
    <div class="week-sum-card">
      <div class="week-sum-title">Week at a glance</div>
      <div class="week-sum-grid">
        ${sc(done+'/'+planned,'sessions')}
        ${sc(totalLoad>0?totalLoad.toLocaleString():'—','load AU')}
        ${sc(avgFeel!==null?avgFeel:'—','avg feel')}
        ${sc(avgAcc!==null?avgAcc+'%':'—','accuracy')}
      </div>
      ${alertHTML}
    </div>`;
}

function getLoadAlert(currentLoad) {
  const recentLoads = [];
  for (let w = 1; w <= 4; w++) {
    const m = new Date(viewMonday); m.setDate(m.getDate() - w*7);
    const wk = weeks[weekKey(m)];
    if (wk) {
      const l = Object.values(wk.logs||{}).reduce((s,lg) => s+(lg.sRPE||0), 0);
      if (l > 0) recentLoads.push(l);
    }
  }
  if (recentLoads.length < 2) return null;
  const avg   = recentLoads.reduce((s,v) => s+v, 0) / recentLoads.length;
  const ratio = currentLoad / avg;
  if (ratio > 1.25) return { level:'warn', ratio, avg };
  if (ratio > 1.15) return { level:'note', ratio, avg };
  return null;
}

// ── Session menu (edit days) ───────────────────────────────
// In edit mode the user has full freedom — any session can be assigned
// to any day regardless of whether it has been logged. Done sessions
// are shown with a ✓ marker for context but are fully tappable.
// The engine's locking only applies when regenerating the suggestion —
// NOT here. The user's manual override is always authoritative.
function buildSessionMenu(dayIdx, sessionsOnDay, wk) {
  const opts = Object.entries(PROG.sessions).map(([key,sess]) => {
    const hasLog    = !!wk.logs[key];
    const isCurrent = sessionsOnDay.includes(key);
    return `
      <div class="session-opt" onclick="assignDaySession(${dayIdx},'${key}');event.stopPropagation()">
        <div class="session-opt-lbl">
          <span class="badge ${SESS_BADGE[key]||'bpre'}">${SESS_LABEL[key]||key}</span>
          <span class="sm">${sess.name}</span>
          ${hasLog ? '<span style="font-size:10px;color:var(--gn);margin-left:4px">✓ done</span>' : ''}
        </div>
        ${isCurrent
          ? '<span class="session-tick">✓</span>'
          : '<span class="session-tick-empty"></span>'}
      </div>`;
  }).join('');

  // Tier picker — shown only when a session is currently assigned to this day
  const currentKey = sessionsOnDay[0] || null;
  const currentTier = currentKey ? (wk.plan.tiers?.[currentKey] || 'full') : null;
  const tierPicker = currentKey ? `
    <div style="padding:8px 14px;border-top:1px solid var(--bd)">
      <div class="xs dimmer" style="margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;font-size:9px">Session volume</div>
      <div style="display:flex;gap:5px">
        ${['full','lite','min'].map(t => `
          <button style="flex:1;padding:7px 0;border-radius:7px;border:1px solid;font-size:11px;font-weight:600;font-family:var(--mono,'DM Mono',monospace);transition:all .15s;
            background:${currentTier===t?(t==='full'?'var(--gnd)':t==='lite'?'var(--amd)':'var(--cod)'):'var(--bg4)'};
            color:${currentTier===t?(t==='full'?'var(--gn)':t==='lite'?'var(--am)':'var(--co)'):'var(--tx3)'};
            border-color:${currentTier===t?(t==='full'?'var(--gn)':t==='lite'?'var(--am)':'var(--co)'):'var(--bd2)'}"
            onclick="setSessionTier(${dayIdx},'${currentKey}','${t}');event.stopPropagation()">
            ${t==='full'?'FULL':t==='lite'?'LITE':'MIN'}
          </button>`).join('')}
      </div>
    </div>` : '';

  const noGym = `
    <div class="session-opt" onclick="assignDaySession(${dayIdx},null);event.stopPropagation()">
      <div class="session-opt-lbl">
        <span class="badge bpre">—</span>
        <span class="sm dim">No gym this day</span>
      </div>
      ${sessionsOnDay.length===0
        ? '<span class="session-tick">✓</span>'
        : '<span class="session-tick-empty"></span>'}
    </div>`;
  return `<div class="session-menu">${opts}${noGym}${tierPicker}</div>`;
}

function enterEditDays() {
  editDaysMode = true; editDayMenu = null;
  const wk = getWeek(viewMonday);
  // Snapshot both assigned days and tiers so undo restores the full state,
  // including any tier the user manually changed during this edit session.
  editDaysSnapshot = {
    assigned: JSON.parse(JSON.stringify(wk.plan.assigned)),
    tiers:    JSON.parse(JSON.stringify(wk.plan.tiers || {}))
  };
  renderSchedule();
}
function exitEditDays() {
  editDaysMode = false; editDayMenu = null; editDaysSnapshot = null;
  saveWeeks(); renderSchedule();
}
function undoEditDays() {
  const wk = getWeek(viewMonday);
  wk.plan.assigned = JSON.parse(JSON.stringify(editDaysSnapshot.assigned));
  wk.plan.tiers    = JSON.parse(JSON.stringify(editDaysSnapshot.tiers));
  editDaysMode = false; editDayMenu = null; editDaysSnapshot = null;
  saveWeeks(); renderSchedule();
}
function openEditDayMenu(dayIdx) {
  editDayMenu = editDayMenu === dayIdx ? null : dayIdx;
  renderSchedule();
}
function assignDaySession(dayIdx, sessionKey) {
  const wk = getWeek(viewMonday);

  if (sessionKey) {
    wk.plan.assigned[sessionKey] = dayIdx;
    const locked = getLockedAssignments(wk);
    // Compute past days so tier recalculation respects the current point in
    // the week — same logic as generatePlan.
    const todayDate = new Date(); todayDate.setHours(0,0,0,0);
    const todayDayIdx = Math.round((todayDate - viewMonday) / (1000*60*60*24));
    const pastDays = new Set();
    for (let i = 0; i < todayDayIdx; i++) { if (i >= 0 && i < 7) pastDays.add(i); }
    const { tiers: newTiers, engineMods: newMods } = assignGymDays(wk.ballet, locked, pastDays);
    wk.plan.tiers[sessionKey]      = newTiers[sessionKey] || 'full';
    wk.plan.engineMods[sessionKey] = newMods[sessionKey]  || null;
  } else {
    // "No gym" — clears all sessions on this day
    Object.keys(wk.plan.assigned).forEach(sk => {
      if (wk.plan.assigned[sk] === dayIdx) {
        wk.plan.assigned[sk]   = null;
        wk.plan.tiers[sk]      = null;
        wk.plan.engineMods[sk] = null;
      }
    });
  }
  editDayMenu = null;
  saveWeeks();
  renderSchedule();
}

// Manually override the tier for a session — user's explicit choice.
// Stored without '-manual' suffix for display, but we track it as a
// manual override so day reassignment doesn't overwrite it.
function setSessionTier(dayIdx, sessionKey, tier) {
  const wk = getWeek(viewMonday);
  if (!sessionKey || wk.plan.assigned[sessionKey] !== dayIdx) return;
  wk.plan.tiers[sessionKey] = tier;
  // Derive engine mods from the manually chosen tier
  const sess = PROG.sessions[sessionKey];
  if (tier === 'lite') {
    const lsr = sess.liteSetReduction || 0;
    wk.plan.engineMods[sessionKey] = lsr > 0 ? { setReduction: lsr, rpeCap: null } : null;
  } else if (tier === 'min') {
    wk.plan.engineMods[sessionKey] = { setReduction: 0, rpeCap: 6, isMin: true };
  } else {
    wk.plan.engineMods[sessionKey] = null;
  }
  saveWeeks();
  renderSchedule();
}

function editPlan()        { getWeek(viewMonday).plan = null; saveWeeks(); renderSchedule(); }
function toggleHistEntry(k){ expandedHist = expandedHist===k ? null : k; renderSchedule(); }

// ── Inline log ─────────────────────────────────────────────
function buildInlineLog(log, sessionKey, wk) {
  if (!log) return '';
  const exercises = log.exerciseIds
    ? log.exerciseIds.map(id => PROG.sessions[sessionKey].exercises.find(e => e.id===id)).filter(Boolean)
    : PROG.sessions[sessionKey].exercises;
  const exLines = (log.exLogs||[]).map((el,i) => {
    const ex   = exercises[i];
    const name = ex?.name || `Exercise ${i+1}`;
    const cnt  = ex?.sides ? (el.setsR?.length||0)+(el.setsL?.length||0) : (el.sets?.length||0);
    const fmt  = countAndFmt(el, ex);
    return `<div class="hex">${name}: <span>${cnt} sets${fmt!=='—'?' — '+fmt:''}</span></div>`;
  }).join('');
  const acc = log.accuracy;
  const ac  = acc ? (acc.level==='good'?'var(--gn)':acc.level==='warn'?'var(--co)':'var(--am)') : 'var(--tx3)';
  const tierNote = log.tier && log.tier !== 'full'
    ? `<div class="xs dimmer mt1">${TIER_LABEL[log.tier]} session</div>` : '';
  const sRPENote = log.sRPE
    ? `<div class="xs dimmer mt1">sRPE ${log.sRPE} AU · ${log.duration} min</div>` : '';
  return `
    <div style="padding:0 14px 12px;border-top:1px solid var(--bd)">
      ${tierNote}${exLines}${sRPENote}
      ${acc ? `<div style="margin-top:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;border-left:2px solid ${ac}">
        <div class="xs b6" style="color:${ac}">${acc.verdict}</div>
        <div class="xs dimmer mt1">${acc.detail}</div>
      </div>` : ''}
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-g" style="flex:1;text-align:center;font-size:12px" onclick="openEditLog('${sessionKey}',event)">Edit log</button>
        <button class="del-btn" onclick="promptDel('${sessionKey}',event)">Delete</button>
      </div>
    </div>`;
}

function promptDel(k, e) { e.stopPropagation(); confirmDel = k; renderSchedule(); }

// ═══════════════════════════════════════════════════════════
// LOG FLOW
// ═══════════════════════════════════════════════════════════
function getSessionExercises(sessionKey, tier) {
  const all = PROG.sessions[sessionKey].exercises;
  // 'locked' is an engine marker for completed sessions — treat as full
  // (the actual exercises used are recovered from log.exerciseIds anyway)
  if (!tier || tier === 'full' || tier === 'locked') return all;
  if (tier === 'lite') return all.filter(ex => ex.lite === true);
  if (tier === 'min')  return all.filter(ex => ex.minDose === true);
  return all;
}

function openLog(sessionKey, dayIdx) {
  editDaysMode = false; editDayMenu = null;
  const wk       = getWeek(viewMonday);
  const existing = wk.logs[sessionKey];
  // Tier resolution priority:
  // 1. If editing an existing log, use the tier stored on that log
  //    (the tier at the time of logging is the ground truth for exercise selection)
  // 2. If plan tier is 'locked' (engine marker for completed session), fall back to 'full'
  // 3. Otherwise use the plan tier
  const planTier = wk.plan?.tiers?.[sessionKey] || 'full';
  const tier     = existing?.tier || (planTier === 'locked' ? 'full' : planTier);
  const exercises = getSessionExercises(sessionKey, tier);

  lf = {
    sessionKey, dayIdx, tier,
    exercises,                    // filtered list — all rendering uses this
    step:         'presession',
    tags:         [],
    mods:         null,
    modsAccepted: false,
    exLogs:       exercises.map(ex => ex.sides ? { setsR:[], setsL:[] } : { sets:[] }),
    openEx:       null,
    warmupOpen:   false,
    feel:         3,
    duration:     0,
    notes:        '',
    accuracy:     null,
    isEdit:       false,
    presessionSaved: false
  };

  if (existing) {
    lf.isEdit    = true;
    lf.step      = 'logging';
    lf.exLogs    = JSON.parse(JSON.stringify(existing.exLogs));
    lf.feel      = existing.feel;
    lf.duration  = existing.duration || 0;
    lf.notes     = existing.notes;
    lf.mods      = existing.mods || null;
    lf.tags      = existing.tags || [];
    // Restore exercise list from stored IDs for accurate edit display
    if (existing.exerciseIds) {
      lf.exercises = existing.exerciseIds
        .map(id => PROG.sessions[sessionKey].exercises.find(e => e.id===id))
        .filter(Boolean);
    }
  }
  renderSchedule();
}

function openEditLog(sessionKey, e) {
  e.stopPropagation();
  const wk  = getWeek(viewMonday);
  // Read dayIdx from the stored log — safer than plan.assigned which may be
  // null if the user cleared the plan via editPlan() before editing.
  const dayIdx = wk.logs[sessionKey]?.dayIdx ?? wk.plan?.assigned?.[sessionKey] ?? null;
  openLog(sessionKey, dayIdx);
}
function renderLogFlow() {
  const el = document.getElementById('page-schedule');
  const steps = { presession:buildPreSession, logging:buildLogSession, accuracy:buildAccuracyScreen };
  el.innerHTML = (steps[lf.step] || buildPreSession)();
}
function backToSchedule() { lf = null; expandedHist = null; renderSchedule(); }

// ── Pre-session ────────────────────────────────────────────
function buildPreSession() {
  const sess   = PROG.sessions[lf.sessionKey];
  const tags   = PROG.tags;
  const count  = lf.tags.length;
  const hasWarn = lf.tags.includes('sharp_pain');
  const recTags = Object.entries(tags).filter(([,t]) => t.group==='rec');
  const cauTags = Object.entries(tags).filter(([,t]) => t.group==='cau'||t.group==='warn');

  const tagBtn = (key, tag) => {
    const isOn = lf.tags.includes(key);
    const cls  = isOn ? (tag.group==='rec'?'rec':tag.group==='warn'?'wrn':'cau') : '';
    const dis  = !isOn && count >= 3;
    return `<button class="tag${cls?' '+cls:''}" onclick="toggleTag('${key}')"${dis?' style="opacity:.35;pointer-events:none"':''}>${tag.emoji} ${tag.label}</button>`;
  };

  const activeInj = injuries.filter(inj => inj.status !== 'resolved');
  const injNotice = activeInj.length > 0 ? `
    <div class="ndim"><strong>Active injury flags</strong>
      ${activeInj.map(inj =>
        `<div class="xs mt1" style="color:${SEVERITY_COLORS[inj.severity]||'var(--co)'}">● ${inj.region} — ${SEVERITY_LABELS[inj.severity]}</div>`
      ).join('')}
      <div class="xs dimmer mt1">For context only — update in the Body tab.</div>
    </div>` : '';

  // Engine tier notice — explains pre-filtered exercises to athlete
  const tierNotice = (lf.tier && lf.tier !== 'full') ? `
    <div class="ndim" style="border-color:var(--bl)"><strong style="color:var(--bl)">
      ${lf.tier==='lite'?'🔵 Lite session':'🟠 Minimum dose session'}
    </strong>
    ${lf.tier==='lite'
      ? `The engine assigned lite volume based on this week's ballet load — ${lf.exercises.length} core exercises. Tags may apply further modifications.`
      : `Minimum dose assigned — ${lf.exercises.length} essential exercises only, RPE capped at 6. This preserves the training stimulus during a high-load week.`}
    </div>` : '';

  const modPrev = count > 0 ? buildModPreview() : '';

  return `
    <div style="padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between">
      <button class="btn-back" onclick="backToSchedule()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>Back
      </button>
      <button class="btn-skip" onclick="skipPresession()">Skip check-in →</button>
    </div>
    <div style="padding:0 16px 4px" class="row">
      <span class="badge ${SESS_BADGE[lf.sessionKey]||'bpre'}">${SESS_LABEL[lf.sessionKey]||lf.sessionKey}</span>
      ${lf.tier&&lf.tier!=='full'?`<span class="tier-pill ${TIER_CSS[lf.tier]}">${TIER_LABEL[lf.tier]}</span>`:''}
      <span class="sm b5">${sess.name}</span>
    </div>
    <div class="sec" style="padding-top:12px">Pre-session check-in</div>
    ${tierNotice}${injNotice}
    <div class="card"><div class="card-body">
      <div class="tag-grp-lbl">Recovery</div>
      <div class="tags-wrap">${recTags.map(([k,t]) => tagBtn(k,t)).join('')}</div>
      <div class="tag-grp-lbl">Caution</div>
      <div class="tags-wrap">${cauTags.map(([k,t]) => tagBtn(k,t)).join('')}</div>
      <div class="xs dimmer">${count>0?count+'/3 selected — tap to deselect':'Select up to 3 · or skip'}</div>
    </div></div>
    ${hasWarn?`<div class="nred"><strong>🚨 Sharp / acute pain flagged</strong>Do not train through sharp pain. Requires physiotherapist assessment before loading again.</div>`:''}
    ${modPrev}
    ${count>0&&!hasWarn?`<div style="padding:0 16px 8px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-p" onclick="acceptMods()">Accept modifications & begin →</button>
      <button class="btn-g" style="width:100%;text-align:center" onclick="skipPresession()">Train as prescribed</button>
    </div>`:hasWarn?`<div style="padding:0 16px 8px"><button class="btn-g" style="width:100%;text-align:center" onclick="skipPresession()">Proceed anyway (not recommended)</button></div>`:''}
    <div class="bpad"></div>`;
}

// ── Mod preview — engine + tag sources visually separated ──
function buildModPreview() {
  const mods = computeMods(lf.tags, lf.sessionKey, lf.exercises);
  const lines = [];

  // Engine tier mods (shown separately)
  const wk = getWeek(viewMonday);
  const em = wk.plan?.engineMods?.[lf.sessionKey];
  if (em) {
    if (em.isMin) lines.push(`<div class="mod-line mod-source-engine">🔵 Engine: minimum dose — essential exercises only${em.rpeCap?', RPE ≤ '+em.rpeCap:''}</div>`);
    else if (em.setReduction > 0) lines.push(`<div class="mod-line mod-source-engine">🔵 Engine: lite volume — −${em.setReduction} set per exercise</div>`);
  }

  // Tag mods per exercise
  lf.exercises.forEach((ex,i) => {
    const m = mods.exMods[i]; const parts = [];
    if (m.setReduction > 0) parts.push(`→ ${m.adjSets} sets (was ${ex.sets})`);
    if (m.notes.length) parts.push(...m.notes);
    if (mods.globalRPECap && (ex.type==='loaded'||ex.type==='bodyweight')) parts.push(`cap RPE ${mods.globalRPECap}`);
    if (parts.length) lines.push(`<div class="mod-line mod-source-tag">${ex.name} — ${parts.join(' · ')}</div>`);
  });

  if (!lines.length) return '';
  return `<div class="card"><div class="card-body"><div class="mod-box"><div class="mod-title">Today's modifications</div>${lines.join('')}</div></div></div>`;
}

function toggleTag(key) {
  const idx = lf.tags.indexOf(key);
  if (idx > -1) lf.tags.splice(idx, 1);
  else if (lf.tags.length < 3) lf.tags.push(key);
  renderSchedule();
}
function acceptMods() {
  lf.mods = computeMods(lf.tags, lf.sessionKey, lf.exercises);
  lf.modsAccepted = true;
  savePresession();
  lf.step = 'logging';
  renderSchedule();
}
function skipPresession() {
  lf.mods = null; lf.modsAccepted = false;
  savePresession();
  lf.step = 'logging';
  renderSchedule();
}
function savePresession() {
  if (lf.presessionSaved || lf.isEdit || lf.tags.length === 0) return;
  const wk = getWeek(viewMonday);
  if (!wk.presessionLogs) wk.presessionLogs = [];
  wk.presessionLogs.push({
    id: Date.now().toString(), type:'presession', date:new Date().toISOString(),
    sessionKey:lf.sessionKey, tags:[...lf.tags], modsAccepted:lf.modsAccepted,
    sessionNotes: lf.tags.map(t => PROG.tags[t]?.note).filter(Boolean)
  });
  lf.presessionSaved = true;
  saveWeeks();
}

// ── Log session ────────────────────────────────────────────
function buildLogSession() {
  const sess = PROG.sessions[lf.sessionKey];
  const prevMon = new Date(viewMonday); prevMon.setDate(prevMon.getDate()-7);
  const prevLog = weeks[weekKey(prevMon)]?.logs?.[lf.sessionKey];
  const warmupCard = buildWarmupCard(sess);

  // lf.exercises is the tier-filtered list — all rendering uses it
  const exCards = lf.exercises.map((ex, i) => {
    const exLog   = lf.exLogs[i];
    const isOpen  = lf.openEx === i;
    const mod     = lf.mods?.exMods?.[i];
    const adjSets = computeAdjSets(ex, i, mod);

    // Previous week reference — match by exercise id, not position
    let prevRef = '';
    if (prevLog?.exerciseIds) {
      const prevIdx = prevLog.exerciseIds.indexOf(ex.id);
      if (prevIdx > -1) {
        const prevEx = prevLog.exLogs[prevIdx];
        prevRef = buildPrevRef(prevEx, ex);
      }
    } else if (prevLog?.exLogs) {
      // Legacy: positional match
      const prevEx = prevLog.exLogs[i];
      if (prevEx) prevRef = buildPrevRef(prevEx, ex);
    }

    const loggedCount = ex.sides
      ? (exLog.setsR?.length||0)+(exLog.setsL?.length||0)
      : (exLog.sets?.length||0);
    const modNote = mod && mod.setReduction > 0
      ? `<div class="xs" style="color:var(--am);margin-top:2px">↓ ${adjSets} sets today</div>` : '';

    return `
    <div class="card">
      <div class="ex-hdr${isOpen?' open':''}" onclick="toggleEx(${i})">
        <div style="flex:1;min-width:0">
          <div class="sm b5">${ex.name}</div>
          <div class="xs dimmer mt1">${ex.prescribed} · RPE ${ex.rpe}${loggedCount?' · '+loggedCount+' logged':''}</div>
          ${modNote}
          ${prevRef&&!isOpen?`<div class="xs mt1 mono" style="color:var(--tx3);font-size:10px">↩ ${prevRef}</div>`:''}
        </div>
        <svg class="chev${isOpen?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isOpen?`<div class="ex-body">
        ${prevRef?`<div class="xs mono mb1" style="color:var(--tx3);padding:5px 8px;background:var(--bg2);border-radius:6px;font-size:10px">↩ Last: ${prevRef}</div>`:''}
        ${ex.note?`<div class="xs dimmer mb1" style="line-height:1.4;font-size:11px;padding:4px 0">${ex.note}</div>`:''}
        ${buildSetRowsNew(ex, exLog, i, adjSets)}
      </div>`:''}
    </div>`;
  }).join('');

  const feelBtns = [1,2,3,4,5].map(v =>
    `<button class="rbtn${lf.feel===v?' on':''}" onclick="lf.feel=${v};renderSchedule()">${v}</button>`
  ).join('');
  const sRPE = lf.duration > 0 ? lf.feel * 2 * lf.duration : null;
  const durationBtn = `
    <div class="srpe-row">
      <button class="srpe-btn" onclick="openDurationPicker()">
        ${lf.duration>0
          ?`<span class="srpe-val">${lf.duration}</span><span class="srpe-unit">min</span>`
          :'<span class="val-btn-empty">Set duration</span>'}
      </button>
      <span class="srpe-note">${sRPE!==null?`sRPE: <strong style="color:var(--tx)">${sRPE}</strong> AU`:'Session RPE × duration = training load'}</span>
    </div>`;

  const tierBadge = lf.tier && lf.tier !== 'full'
    ? `<span class="tier-pill ${TIER_CSS[lf.tier]}">${TIER_LABEL[lf.tier]}</span>` : '';

  return `
    <div style="padding:12px 16px 8px;display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="${lf.isEdit?'backToSchedule()':'lf.step=\'presession\';renderSchedule()'}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        ${lf.isEdit?'Cancel':'Back'}
      </button>
      <span class="badge ${SESS_BADGE[lf.sessionKey]||'bpre'}">${SESS_LABEL[lf.sessionKey]||lf.sessionKey}</span>
      ${tierBadge}
      <span class="sm b5">${sess.name}</span>
    </div>
    ${warmupCard}
    ${exCards}
    <div class="card"><div class="card-body">
      <div class="lbl">Overall session feel</div>
      <div class="rating">${feelBtns}</div>
      <div class="xs dimmer mt1" style="text-align:center">1 = Struggled · 3 = Expected · 5 = Strong</div>
      <div class="lbl" style="margin-top:12px">Session duration (for training load)</div>
      ${durationBtn}
    </div></div>
    <div class="card"><div class="card-body">
      <div class="lbl">Notes (optional)</div>
      <textarea placeholder="Anything notable..." oninput="lf.notes=this.value">${lf.notes}</textarea>
    </div></div>
    <div style="padding:0 16px 8px"><button class="btn-p" onclick="completeLog()">Save Session ✓</button></div>
    <div class="bpad"></div>`;
}

function buildPrevRef(prevEx, ex) {
  if (!prevEx) return '';
  if (ex.sides) {
    const r = (prevEx.setsR||[]).map(s => fmtSet(s,ex)).filter(v => v!=='—');
    const l = (prevEx.setsL||[]).map(s => fmtSet(s,ex)).filter(v => v!=='—');
    return (r.length||l.length) ? `R: ${r.join(' ')||'—'} / L: ${l.join(' ')||'—'}` : '';
  }
  const parts = (prevEx.sets||[]).map(s => fmtSet(s,ex)).filter(v => v!=='—');
  return parts.join('  ');
}

// Compute adjusted sets — merges engine tier reduction + tag reduction, takes max
function computeAdjSets(ex, exIdx, tagMod) {
  const wk = getWeek(viewMonday);
  const em = wk.plan?.engineMods?.[lf.sessionKey];
  const engineRed = (em && !em.isMin) ? (em.setReduction || 0) : 0;
  const tagRed    = tagMod?.setReduction || 0;
  const totalRed  = Math.max(engineRed, tagRed);
  return Math.max(1, ex.sets - totalRed);
}

// ── Warm-up card ───────────────────────────────────────────
function buildWarmupCard(sess) {
  if (!sess.warmup?.length) return '';
  const isOpen = lf.warmupOpen;
  const items  = sess.warmup.map(w => `
    <div class="warmup-item">
      <div class="warmup-name">${w.name}</div>
      <div class="warmup-pre">${w.prescription}</div>
      ${w.note?`<div class="warmup-note">${w.note}</div>`:''}
    </div>`).join('');
  return `
    <div class="card warmup-card">
      <div class="ex-hdr${isOpen?' open':''}" onclick="lf.warmupOpen=!lf.warmupOpen;renderSchedule()">
        <div style="flex:1">
          <div class="sm b5" style="color:var(--am)">▷ Warm-Up Sequence</div>
          <div class="xs dimmer mt1">${sess.warmup.length} movements · ${isOpen?'tap to collapse':'tap to expand'}</div>
        </div>
        <svg class="chev${isOpen?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isOpen?`<div class="ex-body">${items}</div>`:''}
    </div>`;
}

// ── Set rows ───────────────────────────────────────────────
function buildSetRowsNew(ex, exLog, exIdx, adjSets) {
  if (ex.sides) return buildSidedRows(ex, exLog, exIdx, adjSets);
  const colLbls = ex.type==='loaded' ? ['REPS','KG','RPE']
    : ex.type==='bodyweight' ? ['REPS','RPE']
    : ex.type==='timed'||ex.type==='carry' ? ['SEC','RPE']
    : ex.type==='jump' ? (ex.measureLabel==='cm'?['CM','QUAL','RPE']:['QUAL','RPE'])
    : null;
  const head = colLbls
    ? `<div class="xs dimmer mono mb1" style="display:flex;gap:5px;padding-left:27px">${colLbls.map(l=>`<div style="flex:1;text-align:center">${l}</div>`).join('')}</div>`
    : `<div class="xs dimmer mt1 mb1" style="padding-left:4px">Prescribed: ${ex.prescribed}</div>`;
  const sets = exLog.sets||[];
  const rows = sets.map((set,si) => buildSetRow(ex,set,exIdx,si,null)).join('');
  const canAdd = sets.length < adjSets+2;
  return head + rows + (canAdd?`<button class="btn-d" onclick="addSet(${exIdx},null)">+ Add Set</button>`:'');
}

function buildSidedRows(ex, exLog, exIdx, adjSets) {
  return [
    { key:'setsR', label:'R', cls:'r' },
    { key:'setsL', label:'L', cls:'l' }
  ].map(({key,label,cls}) => {
    const sets   = exLog[key]||[];
    const rows   = sets.map((set,si) => buildSetRow(ex,set,exIdx,si,label)).join('');
    const canAdd = sets.length < adjSets+2;
    return `
      <div class="sided-half">
        <span class="sided-lbl ${cls}">${label}</span>
        ${rows}
        ${canAdd?`<button class="btn-d" onclick="addSet(${exIdx},'${label}')">+ Add ${label}</button>`:''}
      </div>`;
  }).join('<div class="sided-sep"></div>');
}

function buildSetRow(ex, set, exIdx, si, side) {
  const sa  = side ? `,'${side}'` : ',null';
  const oi  = 'openPicker';
  if (ex.type === 'plyo') return `
    <div class="set-row">
      <div class="set-n">${si+1}</div>
      <button class="plyo-done${set.done?' done':''}" onclick="updSet(${exIdx},${si},'done',${!set.done});renderSchedule()">${set.done?'✓ Done':'Tap to mark done'}</button>
    </div>`;
  if (ex.type === 'jump') {
    const cm = ex.measureLabel === 'cm';
    return `
      <div class="set-row">
        <div class="set-n">${si+1}</div>
        ${cm?`<button class="val-btn" onclick="${oi}('cm',${exIdx},${si}${sa})" style="flex:1">
          ${set.height!==undefined&&set.height!==''?`<span class="val-btn-num">${set.height}</span><span class="val-btn-unit">cm</span>`:'<span class="val-btn-empty">Height</span>'}
        </button>`:''}
        <button class="val-btn" onclick="${oi}('quality',${exIdx},${si}${sa})" style="flex:${cm?'0 0 78px':'1'}">
          ${set.quality?`<span class="val-btn-num">${set.quality}</span><span class="val-btn-unit">Q</span>`:'<span class="val-btn-empty">Quality</span>'}
        </button>
        <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sa})" style="flex:0 0 62px">
          ${set.rpe?`<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>`:'<span class="val-btn-empty">RPE</span>'}
        </button>
      </div>`;
  }
  if (ex.type === 'loaded') return `
    <div class="set-row">
      <div class="set-n">${si+1}</div>
      <button class="val-btn" onclick="${oi}('reps',${exIdx},${si}${sa})" style="flex:1">
        ${set.reps?`<span class="val-btn-num">${set.reps}</span><span class="val-btn-unit">reps</span>`:'<span class="val-btn-empty">Reps</span>'}
      </button>
      <button class="val-btn" onclick="${oi}('weight',${exIdx},${si}${sa})" style="flex:1">
        ${set.weight!==undefined&&set.weight!==''?`<span class="val-btn-num">${set.weight}</span><span class="val-btn-unit">kg</span>`:'<span class="val-btn-empty">kg</span>'}
      </button>
      <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sa})" style="flex:0 0 62px">
        ${set.rpe?`<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>`:'<span class="val-btn-empty">RPE</span>'}
      </button>
    </div>`;
  if (ex.type === 'bodyweight') return `
    <div class="set-row">
      <div class="set-n">${si+1}</div>
      <button class="val-btn" onclick="${oi}('reps',${exIdx},${si}${sa})" style="flex:1">
        ${set.reps?`<span class="val-btn-num">${set.reps}</span><span class="val-btn-unit">reps</span>`:'<span class="val-btn-empty">Reps</span>'}
      </button>
      <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sa})" style="flex:0 0 62px">
        ${set.rpe?`<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>`:'<span class="val-btn-empty">RPE</span>'}
      </button>
    </div>`;
  return `
    <div class="set-row">
      <div class="set-n">${si+1}</div>
      <button class="val-btn" onclick="${oi}('sec',${exIdx},${si}${sa})" style="flex:1">
        ${set.dur?`<span class="val-btn-num">${set.dur}</span><span class="val-btn-unit">sec</span>`:'<span class="val-btn-empty">Sec</span>'}
      </button>
      <button class="val-btn" onclick="${oi}('rpe',${exIdx},${si}${sa})" style="flex:0 0 62px">
        ${set.rpe?`<span class="val-btn-num">${set.rpe}</span><span class="val-btn-unit">RPE</span>`:'<span class="val-btn-empty">RPE</span>'}
      </button>
    </div>`;
}

function toggleEx(i)  { lf.openEx = lf.openEx===i ? null : i; renderSchedule(); }

function addSet(exIdx, side) {
  const ex    = lf.exercises[exIdx];
  const empty = ex.type==='jump'    ? { height:'', quality:'', rpe:'' }
    : ex.type==='plyo'              ? { done:false }
    : ex.type==='timed'||ex.type==='carry' ? { dur:'', rpe:'' }
    : ex.type==='bodyweight'        ? { reps:'', rpe:'' }
    : { reps:'', weight:'', rpe:'' };
  if (side) {
    const key = side==='R' ? 'setsR' : 'setsL';
    if (!lf.exLogs[exIdx][key]) lf.exLogs[exIdx][key] = [];
    lf.exLogs[exIdx][key].push({...empty});
  } else {
    if (!lf.exLogs[exIdx].sets) lf.exLogs[exIdx].sets = [];
    lf.exLogs[exIdx].sets.push({...empty});
  }
  renderSchedule();
}

function updSet(ei, si, field, val) { lf.exLogs[ei].sets[si][field] = val; }

// ── Complete log ───────────────────────────────────────────
function completeLog() {
  const acc  = computeAccuracy(lf.exLogs, lf.exercises, lf.mods, lf.sessionKey);
  const sRPE = lf.duration > 0 ? lf.feel * 2 * lf.duration : null;
  const entry = {
    id: Date.now().toString(), type:'training',
    date: new Date().toISOString(), sessionKey: lf.sessionKey,
    // dayIdx stored on the log so locked assignments survive plan being cleared
    // by editPlan(). getLockedAssignments reads this directly from wk.logs,
    // independently of wk.plan state.
    dayIdx: lf.dayIdx,
    tier: lf.tier,
    exerciseIds: lf.exercises.map(e => e.id),
    exLogs: lf.exLogs, feel: lf.feel, duration: lf.duration||null,
    sRPE, notes: lf.notes, accuracy: acc, tags:[...lf.tags], mods: lf.mods
  };
  getWeek(viewMonday).logs[lf.sessionKey] = entry;
  lf.accuracy = acc;
  saveWeeks();
  lf.step = 'accuracy';
  renderSchedule();
}

function buildAccuracyScreen() {
  const acc  = lf.accuracy;
  const cls  = acc.level==='good'?'good':acc.level==='warn'?'warn':'note';
  const sRPE = lf.duration > 0 ? lf.feel * 2 * lf.duration : null;
  const tierNote = lf.tier && lf.tier !== 'full'
    ? `<div class="xs dimmer mt1">${TIER_LABEL[lf.tier]} session</div>` : '';
  return `
    <div style="padding:12px 16px 8px"><button class="btn-back" onclick="backToSchedule()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>Back to schedule</button>
    </div>
    <div class="sec">Session saved</div>
    <div class="acc ${cls}">
      <div class="acc-title">${acc.verdict}</div>
      <div class="acc-detail">${acc.detail}</div>
      ${tierNote}
      <div class="acc-stat">${acc.totalDone}/${acc.totalPrescribed} sets · ${acc.rate}% volume · Feel ${lf.feel}/5</div>
      ${sRPE?`<div class="acc-stat" style="margin-top:3px">Training load: ${sRPE} AU (${lf.feel*2} RPE × ${lf.duration} min)</div>`:''}
    </div>
    ${lf.tags.length?`<div class="ndim"><strong>Pre-session tags</strong>${lf.tags.map(t=>PROG.tags[t]?.label||t).join(' · ')}</div>`:''}
    <div style="padding:0 16px 8px"><button class="btn-p" onclick="backToSchedule()">Back to schedule ✓</button></div>
    <div class="bpad"></div>`;
}

// ═══════════════════════════════════════════════════════════
// TOUCH PICKER
// ═══════════════════════════════════════════════════════════
const ITEM_H   = 44;
const VIEW_H   = 264;
const CENTER_Y = Math.floor((VIEW_H - ITEM_H) / 2);

let pickerCtx = null;
const PICKER_RANGES = {
  reps:    { items: Array.from({length:30},  (_,i) => i+1),       label:'Reps' },
  weight:  { items: Array.from({length:201}, (_,i) => i),          label:'kg' },
  rpe:     { items: Array.from({length:10},  (_,i) => i+1),       label:'RPE' },
  sec:     { items: Array.from({length:120}, (_,i) => (i+1)*5),   label:'Seconds' },
  cm:      { items: Array.from({length:31},  (_,i) => i*5),       label:'cm' },
  quality: { items: [1,2,3,4,5],                                    label:'Quality' },
  min:     { items: Array.from({length:34},  (_,i) => (i+3)*5),   label:'min' }
};

let pt = { startY:0, startOff:0, offset:0, idx:0, items:[], dragging:false, vel:0, lastY:0, lastT:0 };

function idxToOffset(idx) { return CENTER_Y - idx * ITEM_H; }
function offsetToIdx(off, len) { return Math.max(0, Math.min(Math.round((CENTER_Y - off) / ITEM_H), len-1)); }

function _showPicker(range, startIdx) {
  document.getElementById('picker-cols').innerHTML = `
    <div style="flex:1">
      <div class="picker-col-lbl">${range.label}</div>
      <div class="picker-col" id="pc-main">
        <div class="picker-viewport">
          <div class="picker-list" id="picker-list">
            ${range.items.map(v => `<div class="picker-item">${v}</div>`).join('')}
          </div>
        </div>
        <div class="picker-mask-t"></div>
        <div class="picker-mask-b"></div>
        <div class="picker-line"></div>
      </div>
    </div>`;
  pt.items = range.items; pt.idx = startIdx;
  pt.offset = idxToOffset(startIdx); pt.dragging = false; pt.vel = 0;
  const list = document.getElementById('picker-list');
  list.style.transform = `translateY(${pt.offset}px)`;
  _pickerHighlight();
  const vp = document.querySelector('#pc-main .picker-viewport');
  vp.addEventListener('touchstart',  _ptStart, {passive:false});
  vp.addEventListener('touchmove',   _ptMove,  {passive:false});
  vp.addEventListener('touchend',    _ptEnd,   {passive:false});
  vp.addEventListener('touchcancel', _ptEnd,   {passive:false});
  document.getElementById('picker-overlay').style.display = 'flex';
}

function openPicker(field, exIdx, si, side) {
  pickerCtx = { field, exIdx, si, side: side||null };
  const range    = PICKER_RANGES[field];
  const storeKey = field==='sec'?'dur':field==='cm'?'height':field;
  let startVal   = null;
  if (exIdx >= 0) {
    const exLog   = lf.exLogs[exIdx];
    const setsArr = side ? (side==='R'?exLog.setsR:exLog.setsL) : exLog.sets;
    const curSet  = setsArr?.[si];
    if (curSet && curSet[storeKey]!==undefined && curSet[storeKey]!=='') startVal = Number(curSet[storeKey]);
    else if (si > 0) { const prev=setsArr?.[si-1]; if (prev&&prev[storeKey]!==undefined&&prev[storeKey]!=='') startVal=Number(prev[storeKey]); }
  }
  const defaults = { rpe:6, reps:4, weight:19, quality:3, cm:10, sec:5, min:8 };
  const startIdx = startVal!==null
    ? Math.max(0, range.items.indexOf(startVal))
    : (defaults[field]!==undefined ? defaults[field] : 0);
  document.getElementById('picker-label').textContent = range.label;
  _showPicker(range, startIdx);
}

function openDurationPicker() {
  pickerCtx = { field:'min', exIdx:-1, si:-1, side:null };
  const range = PICKER_RANGES.min;
  const sv    = lf.duration || 45;
  let si      = range.items.indexOf(sv);
  if (si < 0) si = range.items.indexOf(45);
  if (si < 0) si = 8;
  document.getElementById('picker-label').textContent = 'Duration';
  _showPicker(range, si);
}

function _ptStart(e) {
  e.preventDefault();
  pt.dragging=true; pt.startY=e.touches[0].clientY;
  pt.startOff=pt.offset; pt.vel=0; pt.lastY=pt.startY; pt.lastT=Date.now();
}
function _ptMove(e) {
  e.preventDefault();
  if (!pt.dragging) return;
  const y=e.touches[0].clientY, now=Date.now();
  pt.vel=(y-pt.lastY)/Math.max(1,now-pt.lastT); pt.lastY=y; pt.lastT=now;
  let off = pt.startOff+(y-pt.startY);
  const maxOff=idxToOffset(0), minOff=idxToOffset(pt.items.length-1);
  if (off>maxOff) off=maxOff+(off-maxOff)*0.25;
  if (off<minOff) off=minOff+(off-minOff)*0.25;
  pt.offset=off;
  const list=document.getElementById('picker-list');
  if (list) list.style.transform=`translateY(${off}px)`;
  pt.idx=offsetToIdx(off, pt.items.length);
  _pickerHighlight();
}
function _ptEnd(e) {
  e.preventDefault();
  if (!pt.dragging) return;
  pt.dragging=false;
  let snap=offsetToIdx(pt.offset+pt.vel*80, pt.items.length);
  snap=Math.max(0, Math.min(snap, pt.items.length-1));
  pt.idx=snap; pt.offset=idxToOffset(snap);
  const list=document.getElementById('picker-list');
  if (list) {
    list.style.transition='transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';
    list.style.transform=`translateY(${pt.offset}px)`;
    setTimeout(()=>{ if(list) list.style.transition=''; }, 250);
  }
  _pickerHighlight();
}
function _pickerHighlight() {
  document.querySelectorAll('.picker-item').forEach((el,i) => el.classList.toggle('sel', i===pt.idx));
}

function pickerDone() {
  if (!pickerCtx) { closePicker(); return; }
  const val = pt.items[pt.idx];
  const { field, exIdx, si, side } = pickerCtx;
  if (exIdx === -1) { lf.duration=val; closePicker(); renderSchedule(); return; }
  const storeKey = field==='sec'?'dur':field==='cm'?'height':field;
  const exLog    = lf.exLogs[exIdx];
  if (side) {
    const arr = side==='R' ? exLog.setsR : exLog.setsL;
    if (arr?.[si]!==undefined) arr[si][storeKey]=val;
  } else {
    if (exLog.sets?.[si]!==undefined) exLog.sets[si][storeKey]=val;
  }
  closePicker(); renderSchedule();
}

function closePicker() {
  document.getElementById('picker-overlay').style.display='none';
  const vp = document.querySelector('#pc-main .picker-viewport');
  if (vp) {
    vp.removeEventListener('touchstart',  _ptStart);
    vp.removeEventListener('touchmove',   _ptMove);
    vp.removeEventListener('touchend',    _ptEnd);
    vp.removeEventListener('touchcancel', _ptEnd);
  }
  pickerCtx=null;
}
function pickerBgClick(e) { if (e.target===document.getElementById('picker-overlay')) closePicker(); }

// ═══════════════════════════════════════════════════════════
// MODS & ACCURACY
// computeMods now receives the filtered exercises list
// ═══════════════════════════════════════════════════════════
function computeMods(tags, sessionKey, exercises) {
  const progTags = PROG.tags;
  let globalRPECap = null;
  const sessionNotes = tags.map(t => progTags[t]?.note).filter(Boolean);

  // Also apply min-dose RPE cap from engine if present
  const wk = getWeek(viewMonday);
  const em = wk.plan?.engineMods?.[sessionKey];
  if (em?.rpeCap) globalRPECap = em.rpeCap;

  const exMods = exercises.map(ex => {
    let setReduction = 0; const notes = [];
    tags.forEach(tagKey => {
      const tag = progTags[tagKey];
      if (!tag || tag.isWarning) return;
      if (tag.rpeCap) globalRPECap = globalRPECap ? Math.min(globalRPECap, tag.rpeCap) : tag.rpeCap;
      const aff = tag.affects || {};
      if (aff.ALL) setReduction = Math.max(setReduction, aff.ALL.setReduction||0);
      ex.regions.forEach(r => {
        if (aff[r]) {
          setReduction = Math.max(setReduction, aff[r].setReduction||0);
          if (aff[r].note) notes.push(aff[r].note);
        }
      });
    });
    return { setReduction, adjSets: Math.max(1, ex.sets - setReduction), notes, rpeCap: globalRPECap };
  });

  return { exMods, globalRPECap, sessionNotes };
}

function parseRPE(s) {
  const p = String(s).replace('–','-').split('-').map(x => parseFloat(x.trim()));
  return p.length===1 ? { min:p[0], max:p[0] } : { min:p[0], max:p[1] };
}

// computeAccuracy now receives exercises list explicitly — no internal PROG lookup
function computeAccuracy(exLogs, exercises, mods, sessionKey) {
  let totalP=0, totalD=0, rpeHigh=0, rpeLow=0;

  // Apply min-dose RPE cap from engine for cap-checking
  const wk  = getWeek(viewMonday);
  const em  = wk.plan?.engineMods?.[sessionKey];
  const cap = mods?.globalRPECap || em?.rpeCap || null;

  exLogs.forEach((el,i) => {
    const ex  = exercises[i];
    if (!ex) return;
    const adj = mods?.exMods?.[i]?.adjSets ?? ex.sets;

    if (ex.sides) {
      totalP += adj * 2;
      totalD += (el.setsR?.length||0) + (el.setsL?.length||0);
    } else {
      totalP += adj;
      totalD += el.sets?.length||0;
    }

    if (ex.type==='loaded'||ex.type==='bodyweight'||ex.type==='jump') {
      const { min, max } = parseRPE(ex.rpe);
      const effectiveMax = cap ? Math.min(max, cap) : max;
      const allSets = ex.sides
        ? [...(el.setsR||[]),...(el.setsL||[])]
        : (el.sets||[]);
      allSets.forEach(s => {
        const r = parseFloat(s.rpe);
        if (!isNaN(r)) {
          if (r > effectiveMax + 0.5) rpeHigh++;
          if (r < min - 1) rpeLow++;
        }
      });
    }
  });

  const rate = totalP > 0 ? totalD / totalP : 1;
  let verdict, detail, level;
  if (rate>=0.9 && rpeHigh===0 && rpeLow===0) {
    verdict='Session on target'; level='good';
    detail='Volume and intensity matched the prescription.';
  } else if (rpeHigh >= 2) {
    verdict='Intensity exceeded prescription'; level='warn';
    detail=`${rpeHigh} set${rpeHigh>1?'s':''} above prescribed RPE. Monitor recovery.`;
  } else if (rate < 0.75) {
    verdict='Volume incomplete'; level='note';
    detail=`${totalD}/${totalP} sets completed. If fatigue-driven, note in next week's plan.`;
  } else if (rpeLow >= 3) {
    verdict='Session felt easy'; level='note';
    detail='RPE consistently below target. Consider a small load increase next session.';
  } else {
    verdict='Session solid'; level='good';
    detail='Minor deviations within acceptable range.';
  }
  return { verdict, detail, level, rate:Math.round(rate*100), totalDone:totalD, totalPrescribed:totalP };
}

// ═══════════════════════════════════════════════════════════
// FORMAT HELPERS
// ═══════════════════════════════════════════════════════════
function fmtSet(s, ex) {
  if (!s||!ex) return '—';
  if (ex.type==='plyo') return s.done?'✓':'—';
  if (ex.type==='jump') {
    const p=[];
    if (s.height!==undefined&&s.height!=='') p.push(`${s.height}cm`);
    if (s.quality) p.push(`Q${s.quality}`);
    if (s.rpe)     p.push(`@${s.rpe}`);
    return p.length?p.join(' '):'—';
  }
  if (ex.type==='timed'||ex.type==='carry') return s.dur?`${s.dur}s`:'—';
  if (ex.type==='bodyweight') return s.reps?`${s.reps}r @${s.rpe||'?'}`:'—';
  return s.reps?`${s.reps}r · ${(s.weight!==undefined&&s.weight!=='')?s.weight:'?'}kg @${s.rpe||'?'}`:'—';
}

function countAndFmt(exLog, ex) {
  if (!exLog) return '—';
  if (ex?.sides) {
    const r=(exLog.setsR||[]).map(s=>fmtSet(s,ex)).join('  ');
    const l=(exLog.setsL||[]).map(s=>fmtSet(s,ex)).join('  ');
    return `R: ${r||'—'} / L: ${l||'—'}`;
  }
  const sets=exLog.sets||[];
  return sets.length?sets.map(s=>fmtSet(s,ex)).join('  '):'—';
}

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('page-history');
  const allLogs = [];
  Object.entries(weeks).forEach(([wk,data]) => {
    Object.values(data.logs||{}).forEach(l  => allLogs.push({...l, weekKey:wk}));
    (data.presessionLogs||[]).forEach(l      => allLogs.push({...l, weekKey:wk}));
  });
  allLogs.sort((a,b) => new Date(b.date)-new Date(a.date));
  const filtered = histFilter==='all' ? allLogs : allLogs.filter(l => l.type===histFilter);

  const filterRow = `
    <div class="hflt-row">
      <div class="hflt">
        ${[{k:'all',l:'All'},{k:'training',l:'Training'},{k:'presession',l:'Pre-Session'}].map(({k,l}) =>
          `<button class="flt${histFilter===k?' on':''}" onclick="setHFilter('${k}')">${l}</button>`
        ).join('')}
      </div>
      ${allLogs.some(l=>l.type==='training')
        ?`<button class="btn-g" style="font-size:11px;padding:6px 10px" onclick="exportCSV()">Export CSV</button>`:''}
    </div>`;

  if (!filtered.length) {
    el.innerHTML = filterRow + `<div class="empty"><div class="emi">📊</div><div class="emt">No logs yet</div><div class="ems">Complete a session to see history</div></div>`;
    return;
  }
  el.innerHTML = filterRow + `<div class="sec">${filtered.length} log${filtered.length!==1?'s':''}</div>` +
    filtered.map(l => buildHistEntry(l)).join('') + '<div class="bpad"></div>';
}

function setHFilter(f) { histFilter=f; expandedHist=null; confirmDel=null; renderHistory(); }

function buildHistEntry(log) {
  const isExp   = expandedHist === log.id;
  const isTrain = log.type === 'training';
  const ds = new Date(log.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  const ts = new Date(log.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const sessLabel = SESS_LABEL[log.sessionKey] || log.sessionKey || '?';
  const sessBadge = SESS_BADGE[log.sessionKey] || 'bpre';
  const typeLabel = isTrain ? 'TRAINING LOG' : 'PRE-SESSION';
  const tierPill  = (log.tier&&log.tier!=='full')
    ? `<span class="tier-pill ${TIER_CSS[log.tier]}">${TIER_LABEL[log.tier]}</span>` : '';

  const right = isTrain ? `
    <div style="text-align:right">
      <div class="xs dimmer mb1">Feel</div>
      <div class="mono b6" style="font-size:20px;color:${log.feel>=4?'var(--gn)':log.feel<=2?'var(--co)':'var(--tx2)'}">${log.feel}<span style="font-size:11px;color:var(--tx3)">/5</span></div>
      ${log.sRPE?`<div class="xs dimmer" style="margin-top:2px">${log.sRPE} AU</div>`:''}
    </div>` : `<div class="xs dimmer">${log.tags?.length||0} tag${log.tags?.length!==1?'s':''}</div>`;

  let body = '';
  if (isExp) {
    if (isTrain) {
      // Use stored exerciseIds for accurate name lookup
      const exercises = log.exerciseIds
        ? log.exerciseIds.map(id => PROG.sessions[log.sessionKey]?.exercises.find(e=>e.id===id)).filter(Boolean)
        : (PROG.sessions[log.sessionKey]?.exercises || []);
      const exLines = (log.exLogs||[]).map((el,i) => {
        const ex   = exercises[i];
        const name = ex?.name || `Exercise ${i+1}`;
        const cnt  = ex?.sides?(el.setsR?.length||0)+(el.setsL?.length||0):(el.sets?.length||0);
        const fmt  = countAndFmt(el, ex);
        return `<div class="hex">${name}: <span>${cnt} sets${fmt!=='—'?' — '+fmt:''}</span></div>`;
      }).join('');
      const acc = log.accuracy;
      const ac  = acc?(acc.level==='good'?'var(--gn)':acc.level==='warn'?'var(--co)':'var(--am)'):'var(--tx3)';
      const sRPELine = log.sRPE ? `<div class="xs dimmer mt1">sRPE ${log.sRPE} AU · ${log.duration} min · Feel ${log.feel}/5</div>` : '';
      body = `<div class="hent-body">
        ${log.tier&&log.tier!=='full'?`<div class="xs dimmer mb1">${TIER_LABEL[log.tier]} session</div>`:''}
        ${exLines}${sRPELine}
        ${acc?`<div style="margin-top:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;border-left:2px solid ${ac}">
          <div class="xs b6" style="color:${ac}">${acc.verdict}</div>
          <div class="xs dimmer mt1">${acc.detail}</div>
        </div>`:''}
        ${log.notes?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);font-size:12px;color:var(--tx3);font-style:italic">${log.notes}</div>`:''}
        ${confirmDel===log.id
          ?`<div class="del-conf">
              <button class="btn-g" style="flex:1;text-align:center;color:var(--rd)" onclick="doDelete('${log.id}','${log.weekKey}')">Confirm delete</button>
              <button class="btn-g" style="flex:1;text-align:center" onclick="confirmDel=null;renderHistory()">Cancel</button>
            </div>`
          :`<button class="del-btn" onclick="confirmDel='${log.id}';expandedHist='${log.id}';renderHistory()">Delete</button>`}
      </div>`;
    } else {
      const tList=(log.tags||[]).map(t=>
        `<span class="tag ${PROG.tags[t]?.group==='warn'?'wrn':'rec'}" style="margin:2px">${PROG.tags[t]?.emoji||''} ${PROG.tags[t]?.label||t}</span>`
      ).join('');
      body=`<div class="hent-body">
        ${tList||'<div class="xs dimmer">No tags — check-in skipped.</div>'}
        ${(log.sessionNotes||[]).map(n=>`<div class="xs dimmer mt1">· ${n}</div>`).join('')}
        <div class="xs dimmer mt2">Mods ${log.modsAccepted?'accepted':'not applied'}</div>
        ${confirmDel===log.id
          ?`<div class="del-conf">
              <button class="btn-g" style="flex:1;text-align:center;color:var(--rd)" onclick="doDelete('${log.id}','${log.weekKey}')">Confirm delete</button>
              <button class="btn-g" style="flex:1;text-align:center" onclick="confirmDel=null;renderHistory()">Cancel</button>
            </div>`
          :`<button class="del-btn" onclick="confirmDel='${log.id}';expandedHist='${log.id}';renderHistory()">Delete</button>`}
      </div>`;
    }
  }

  return `
    <div class="hent">
      <div class="hent-hdr" onclick="expandedHist=expandedHist==='${log.id}'?null:'${log.id}';confirmDel=null;renderHistory()">
        <div>
          <div style="margin-bottom:5px">
            <span class="badge bpre" style="margin-right:4px">${typeLabel}</span>
            <span class="badge ${sessBadge}">${sessLabel}</span>
            ${tierPill}
          </div>
          <div class="xs dimmer">${ds} · ${ts}</div>
        </div>
        ${right}
      </div>
      ${body}
    </div>`;
}

function doDelete(logId, wkKey) {
  const wk = weeks[wkKey];
  if (!wk) return;
  Object.keys(wk.logs||{}).forEach(k => { if (wk.logs[k].id===logId) delete wk.logs[k]; });
  if (wk.presessionLogs) wk.presessionLogs = wk.presessionLogs.filter(l => l.id!==logId);
  saveWeeks();
  confirmDel=null; expandedHist=null;
  renderHistory();
}

function exportCSV() {
  const rows = [['Date','Week','Session','Tier','Type','Feel','Duration(min)','sRPE(AU)','Volume%','Verdict','Tags','Notes']];
  Object.entries(weeks).forEach(([wk,data]) => {
    Object.values(data.logs||{}).forEach(log => {
      rows.push([
        new Date(log.date).toLocaleDateString('en-GB'),
        wk, log.sessionKey, log.tier||'full', log.type,
        log.feel??'', log.duration??'', log.sRPE??'',
        log.accuracy?.rate??'',
        (log.accuracy?.verdict||'').replace(/,/g,';'),
        (log.tags||[]).join(' | '),
        (log.notes||'').replace(/,/g,';').replace(/\n/g,' ')
      ]);
    });
  });
  const csv  = rows.map(r => r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`training-${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function renderBody() {
  const el       = document.getElementById('page-body');
  const active   = injuries.filter(inj => inj.status!=='resolved');
  const resolved = injuries.filter(inj => inj.status==='resolved');

  const headerRow = `
    <div style="padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between">
      <span class="sm b6">Injury Log</span>
      ${!injuryFormOpen?`<button class="btn-g" onclick="openInjuryForm()">+ Log injury</button>`:''}
    </div>`;

  el.innerHTML = headerRow
    + (injuryFormOpen ? buildInjuryForm() : '')
    + (active.length>0
        ? `<div class="sec">Active (${active.length})</div>${active.map(buildInjuryEntry).join('')}`
        : !injuryFormOpen
          ? `<div class="ndim"><strong>No active injuries</strong>Log any pain, tightness, or concern here. Active entries appear as passive reminders in the pre-session screen.</div>`
          : '')
    + (resolved.length>0 ? `<div class="sec">Resolved (${resolved.length})</div>${resolved.map(buildInjuryEntry).join('')}` : '')
    + '<div class="bpad"></div>';
}

function buildInjuryForm() {
  const d = injuryFormData;
  const chips   = INJURY_REGIONS.map(r =>
    `<button class="inj-chip${d.region===r?' on':''}" onclick="injuryFormData.region='${r}';renderBody()">${r}</button>`
  ).join('');
  const sevBtns = [1,2,3,4,5].map(v =>
    `<button class="rbtn${d.severity===v?' on':''}" onclick="injuryFormData.severity=${v};renderBody()">${v}</button>`
  ).join('');
  const stOpts  = [{k:'active',l:'Active'},{k:'monitoring',l:'Monitoring'},{k:'resolved',l:'Resolved'}].map(({k,l}) =>
    `<button class="dtype-btn${d.status===k?' on-reh':''}" onclick="injuryFormData.status='${k}';renderBody()">${l}</button>`
  ).join('');
  return `
    <div class="card"><div class="card-body">
      <div class="field"><label class="lbl">Body region</label><div class="inj-chips">${chips}</div></div>
      <div class="field">
        <label class="lbl">Severity — 1 minor tightness · 5 acute, see physio</label>
        <div class="rating">${sevBtns}</div>
        <div class="xs dimmer mt1" style="text-align:center">${SEVERITY_LABELS[d.severity]}</div>
      </div>
      <div class="field"><label class="lbl">Status</label><div class="dtype-row">${stOpts}</div></div>
      <div class="field">
        <label class="lbl">Description (location, onset, trigger)</label>
        <textarea placeholder="e.g. Left Achilles — tightness during relevés, onset Tuesday after long rehearsal" oninput="injuryFormData.description=this.value">${d.description||''}</textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-p" style="flex:1;margin:0" onclick="saveInjury()">Save</button>
        <button class="btn-g" style="flex:0 0 80px" onclick="closeInjuryForm()">Cancel</button>
      </div>
    </div></div>`;
}

function buildInjuryEntry(inj) {
  const isExp = injuryExpandedId === inj.id;
  const ds    = new Date(inj.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const col   = SEVERITY_COLORS[inj.severity]||'var(--tx3)';
  const sPill = inj.status==='resolved'
    ? `<span class="inj-status-pill inj-status-resolved">resolved</span>`
    : inj.status==='monitoring'
      ? `<span class="inj-status-pill inj-status-monitoring">monitoring</span>`
      : `<span class="inj-status-pill inj-status-active">active</span>`;
  return `
    <div class="hent">
      <div class="hent-hdr" onclick="injuryExpandedId=injuryExpandedId==='${inj.id}'?null:'${inj.id}';renderBody()">
        <div>
          <div class="sm b5" style="margin-bottom:3px">${inj.region} <span style="font-size:11px;color:${col}">● ${SEVERITY_LABELS[inj.severity]}</span></div>
          <div class="xs dimmer">${ds} · ${sPill}</div>
        </div>
        <svg class="chev${isExp?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      ${isExp?`<div class="hent-body">
        ${inj.description?`<div class="xs" style="color:var(--tx2);margin-bottom:10px;line-height:1.5">${inj.description}</div>`:''}
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${inj.status!=='resolved'?`<button class="btn-g" style="font-size:12px" onclick="resolveInjury('${inj.id}')">✓ Mark resolved</button>`:''}
          <button class="btn-g" style="font-size:12px" onclick="editInjury('${inj.id}')">Edit</button>
          <button class="del-btn" onclick="deleteInjury('${inj.id}')">Delete</button>
        </div>
      </div>`:''}
    </div>`;
}

function openInjuryForm()  { injuryFormOpen=true; injuryEditId=null; injuryFormData={region:'',severity:3,description:'',status:'active'}; renderBody(); }
function closeInjuryForm() { injuryFormOpen=false; injuryEditId=null; renderBody(); }
function editInjury(id) {
  const inj=injuries.find(i=>i.id===id); if(!inj) return;
  injuryFormOpen=true; injuryEditId=id;
  injuryFormData={region:inj.region,severity:inj.severity,description:inj.description,status:inj.status};
  renderBody();
}
function saveInjury() {
  if (!injuryFormData.region) { alert('Please select a body region.'); return; }
  if (injuryEditId) {
    const idx=injuries.findIndex(i=>i.id===injuryEditId);
    if (idx>-1) injuries[idx]={...injuries[idx],...injuryFormData};
  } else {
    injuries.unshift({id:Date.now().toString(),date:new Date().toISOString(),...injuryFormData});
  }
  saveInjuries(); injuryFormOpen=false; injuryEditId=null; renderBody();
}
function resolveInjury(id) {
  const inj=injuries.find(i=>i.id===id);
  if (inj) { inj.status='resolved'; inj.resolvedDate=new Date().toISOString(); }
  saveInjuries(); renderBody();
}
function deleteInjury(id) {
  injuries=injuries.filter(i=>i.id!==id);
  injuryExpandedId=null; saveInjuries(); renderBody();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
loadProgram().then(() => { if (PROG) renderSchedule(); });
</script>
